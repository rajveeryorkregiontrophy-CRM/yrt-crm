<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Detail — YRT CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;--sidebar:#0a0c0f;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#c4cad6;--text-3:#9098a8;
    --brass:#e7ebf3;--brass-2:#f4f6fb;--brass-bg:rgba(231,235,243,.10);
    --art:#ff6b35;--due:#ffb627;--approved:#3ddc84;--process:#3da5ff;--invoice:#b06bff;--nodata:#5a6273;--danger:#ff4d4d;
    --radius:11px;--radius-sm:8px;--shadow-sm:0 2px 8px rgba(0,0,0,.4);
    --font-display:'Archivo',system-ui,sans-serif;--font-body:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;
    --ink:var(--text);--slate-900:var(--bg-2);--slate-700:var(--bg-3);--paper:var(--bg);--paper-2:var(--bg-2);
    --line-strong:var(--line-2);--muted:var(--text-3);--muted-2:var(--text-3);
    --st-art-bg:var(--art);--st-due-bg:var(--due);--st-approved-bg:var(--approved);--st-process-bg:var(--process);--st-invoice-bg:var(--invoice);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}

  .topbar{height:58px;background:var(--paper-2);border-bottom:2px solid var(--line-2);display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:30;}
  .back{display:inline-flex;align-items:center;gap:7px;color:var(--muted);text-decoration:none;font-weight:600;font-size:13px;padding:7px 11px;border-radius:var(--radius-sm);border:1px solid var(--line-strong);background:var(--paper-2);}
  .back:hover{border-color:var(--brass);color:var(--brass-2);}
  .topbar .title{font-family:var(--font-display);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:16px;}
  .topbar .title .id{color:var(--brass-2);}
  .topbar .actions{margin-left:auto;display:flex;gap:8px;}
  .btn{padding:8px 14px;border-radius:var(--radius-sm);font-weight:600;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--line-strong);background:var(--paper-2);color:var(--ink);display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{border-color:var(--brass-2);}
  .btn-danger{color:var(--danger);border-color:transparent;}
  .btn-danger:hover{border-color:var(--danger);background:rgba(255,77,77,.10);}
  .btn-dark{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border-color:#f4f6fb;}
  .btn-dark:hover{filter:brightness(1.04);}
  .btn-brass{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border-color:#f4f6fb;}
  .btn-brass:hover{background:#c3cad8;}

  .wrap{max-width:1340px;margin:0 auto;padding:16px 22px 90px;}
  /* at-a-glance summary strip */
  .summary{max-width:1340px;margin:0 auto;padding:0 22px;}
  .summary-inner{display:flex;align-items:stretch;gap:0;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-top:14px;}
  .sum-cell{padding:11px 18px;border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;min-width:0;}
  .sum-cell:last-child{border-right:none;}
  .sum-cell .k{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:3px;}
  .sum-cell .v{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sum-cell.grow{flex:1;}
  .sum-cell .v.accent{color:var(--brass-2);font-family:var(--fm);}
  .grid{display:grid;grid-template-columns:1fr 300px;gap:14px;align-items:start;}
  @media(max-width:1000px){.grid{grid-template-columns:1fr;}}

  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:13px;overflow:visible;}
  .card-h{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .card-h h3{font-family:var(--font-display);font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#aab2c4;}
  .card-b{padding:14px 16px;}

  /* client header block */
  .client-block{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .field{margin-bottom:10px;}
  .field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;margin-bottom:4px;}
  .field .val{font-size:14px;font-weight:500;}
  .field .val.big{font-size:17px;font-weight:700;font-family:var(--font-display);}
  .field .val.mono{font-family:var(--font-mono);}
  .field-row{display:flex;gap:14px;}
  .field-row .field{flex:1;}

  /* line items */
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;padding:9px 10px;border-bottom:1px solid var(--line);background:var(--paper);}
  thead th.num{text-align:right;}
  tbody td{padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  .li-input{width:100%;border:1px solid transparent;background:transparent;padding:6px 7px;border-radius:5px;font-size:13px;font-family:inherit;color:var(--ink);}
  .li-desc{resize:none;overflow:hidden;line-height:1.4;min-height:30px;white-space:pre-wrap;word-break:break-word;}
  .cb-cell{position:relative;}
  .cb-menu{display:none;position:fixed;min-width:240px;max-width:340px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.5);z-index:9000;overflow:hidden;max-height:260px;overflow-y:auto;}
  .cb-menu.open{display:block;}
  .cb-opt{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line);}
  .cb-opt:last-child{border-bottom:none;}
  .cb-opt:hover{background:var(--bg-3);}
  .cb-opt .cb-main{font-weight:600;color:var(--text);font-size:13px;}
  .cb-opt .cb-side{font-family:var(--fm);font-size:11px;color:var(--text-3);white-space:nowrap;}
  .disc-cell{white-space:nowrap;}
  .li-disc{background:var(--paper);border:1px solid var(--line);color:var(--ink);border-radius:5px;padding:5px 6px;font-size:12px;font-family:inherit;cursor:pointer;}
  .li-disc:focus{outline:none;border-color:var(--brass);}
  .disc-waived{font-family:var(--fm);font-size:10.5px;color:var(--danger);margin-top:3px;}
  .disc-waived.waived-full{color:var(--brass-2);font-weight:700;font-family:var(--fd);text-transform:uppercase;letter-spacing:.03em;}
  .sup-id-tag{font-family:var(--fm);font-size:10px;color:var(--brass-2);margin-top:2px;font-weight:700;}
  .lines-scroll{max-height:340px;overflow-y:auto;}
  .lines-scroll::-webkit-scrollbar{width:9px;}.lines-scroll::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:5px;border:2px solid var(--paper-2);}
  .lines-scroll thead th{position:sticky;top:0;background:var(--paper-2);z-index:2;}
  /* inline totals under product listing (modern CRM style) */
  .listing-foot{display:flex;align-items:stretch;justify-content:space-between;gap:24px;border-top:1px solid var(--line);margin-top:4px;padding:18px;}
  .listing-foot .meta-foot{border:none;background:transparent;padding:0;align-self:flex-end;flex:0 0 auto;}
  .order-totals{display:flex;justify-content:flex-end;padding:0;flex:1;}
  .ot-inner{width:320px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:16px 18px;}
  .ot-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;}
  .ot-row .ot-lbl{color:var(--muted);font-weight:500;}
  .ot-row .ot-amt{font-family:var(--fm);font-weight:600;color:var(--ink);}
  .ot-grand{border-top:1px solid var(--line-2);margin-top:8px;padding-top:12px;}
  .ot-grand .ot-lbl{font-family:var(--fd);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:12.5px;color:var(--ink);}
  .ot-grand .ot-amt{font-family:var(--fd);font-weight:800;font-size:19px;color:var(--brass-2);}
  .cb-cell.in-po .cb-sup{color:var(--danger);font-weight:700;}
  .cb-sup{text-overflow:ellipsis;}
  /* fulfillment colour: the status pill carries the colour; the split summary count tints to match */
  .fs-placed .alloc-count{color:#e0883a !important;font-weight:700;}
  .fs-inpo .alloc-count{color:#ff4d4d !important;font-weight:700;}
  .fs-issued .alloc-count{color:#8a92a2 !important;font-weight:700;}
  .fs-instock .alloc-count{color:#3da5ff !important;font-weight:700;}
  .instock-tag{font-size:9.5px;font-weight:800;color:#3da5ff;margin-top:2px;text-transform:uppercase;letter-spacing:.03em;}
  .sup-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
  .sup-id-tag{font-family:var(--fm);font-size:10px;color:var(--text-3);font-weight:700;}
  .fs-pill{display:inline-block;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:.03em;line-height:1.3;white-space:nowrap;}
  .fs-pill-placed{color:#e0883a;background:rgba(224,136,58,.16);}
  .fs-pill-partial{color:#e0883a;background:rgba(224,136,58,.16);}
  .fs-pill-in_po{color:#ff4d4d;background:rgba(255,77,77,.14);}
  .fs-pill-issued{color:#8a92a2;background:rgba(138,146,162,.18);}
  .fs-pill-received{color:#3ddc84;background:rgba(61,220,132,.16);}
  .fs-pill-backordered{color:#b06bff;background:rgba(176,107,255,.16);}
  .fs-pill-instock{color:#3da5ff;background:rgba(61,165,255,.16);}
  .fs-arrived .cb-sup,.fs-arrived .sup-id-tag,.fs-arrived .alloc-count{color:#ffb627 !important;font-weight:700;}
  .fs-verified .cb-sup,.fs-verified .sup-id-tag,.fs-verified .alloc-count{color:#3ddc84 !important;font-weight:700;}
  .fs-backordered .cb-sup,.fs-backordered .sup-id-tag,.fs-backordered .alloc-count{color:#b06bff !important;font-weight:700;}
  .legend{margin-left:auto;display:flex;gap:13px;flex-wrap:wrap;}
  .legend .lg{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted);font-weight:600;}
  .legend .lg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .alloc-btn{margin-top:5px;font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text-3);cursor:pointer;font-family:inherit;}
  .alloc-btn:hover{border-color:var(--brass);color:var(--brass-2);}
  .alloc-btn.locked{opacity:.4;cursor:not-allowed;}
  .alloc-btn.locked:hover{border-color:var(--line-2);color:var(--text-3);}
  .alloc-summary{display:flex;flex-direction:column;gap:2px;cursor:pointer;}
  .alloc-summary .alloc-count{font-size:12px;font-weight:700;color:var(--brass-2);}
  .alloc-summary .alloc-edit{font-size:10px;color:var(--text-3);}
  /* split allocation modal */
  .split-overlay{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:250;padding:20px;}
  .split-overlay.open{display:flex;}
  .split-modal{background:var(--paper-2);border:1px solid var(--line-2);border-radius:14px;width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
  .split-head{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);}
  .split-head h3{font-family:var(--fd);font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:.03em;}
  .split-x{margin-left:auto;background:var(--bg-4);border:none;color:var(--text-2);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:17px;}
  .split-body{padding:18px 22px;overflow-y:auto;}
  .split-meta{font-size:13px;color:var(--text-2);margin-bottom:14px;padding:10px 13px;background:var(--bg);border:1px solid var(--line);border-radius:8px;}
  .split-meta b{color:var(--ink);}
  .split-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
  .split-row .sr-sup{flex:1;position:relative;}
  .split-row input,.split-row .sr-supinput{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--ink);}
  .split-row input:focus{outline:none;border-color:var(--brass);}
  .split-row .sr-qty{width:90px;}
  .split-row .sr-del{background:transparent;border:none;color:var(--danger);cursor:pointer;font-size:18px;padding:0 4px;}
  .split-row .sr-label{width:60px;font-size:12.5px;font-weight:700;color:var(--text-2);flex-shrink:0;}
  .split-row .sr-qty{flex:1;}
  .sr-menu{display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--paper-2);border:1px solid var(--line-2);border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.5);z-index:30;max-height:200px;overflow-y:auto;}
  .sr-menu.open{display:block;}
  .sr-opt{padding:9px 12px;cursor:pointer;display:flex;justify-content:space-between;font-size:13px;}
  .sr-opt:hover{background:var(--bg-3);}.sr-opt .sr-side{font-family:var(--fm);color:var(--text-3);font-size:11px;}
  .split-add{width:100%;padding:9px;border:1px dashed var(--line-strong);background:transparent;border-radius:7px;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;margin-top:4px;}
  .split-add:hover{border-color:var(--brass);color:var(--brass-2);}
  .split-tally{margin-top:14px;font-size:13px;font-weight:600;text-align:right;}
  .split-tally.ok{color:var(--approved);}.split-tally.bad{color:var(--danger);}.split-tally.partial{color:var(--brass-2);}
  .split-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .split-row .sr-qty{width:90px;background:var(--paper);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;}
  .split-row .sr-arrow{color:var(--text-3);font-size:14px;}
  .split-row .sr-po{flex:1;background:var(--paper);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:8px 10px;font-size:12.5px;font-family:inherit;cursor:pointer;}
  .split-row .sr-nopo{flex:1;font-size:11.5px;color:var(--text-3);font-style:italic;}
  .split-row .sr-del{background:transparent;border:none;color:var(--danger);cursor:pointer;font-size:18px;padding:0 4px;}
  .split-foot{display:flex;align-items:center;gap:10px;padding:16px 22px;border-top:1px solid var(--line);justify-content:flex-end;}
  .split-msg{margin-right:auto;font-size:12.5px;color:var(--danger);}
  .popick-list{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
  .popick-line{display:flex;align-items:center;gap:12px;border:1px solid var(--line-2);border-radius:10px;padding:12px 14px;}
  .popick-line .pl-info{flex:1;min-width:0;}
  .popick-line .pl-name{font-size:13px;color:var(--ink);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .popick-line .pl-sub{font-size:11.5px;color:var(--text-3);margin-top:2px;}
  .popick-line .pl-po{width:200px;background:var(--paper);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:8px 10px;font-size:12.5px;font-family:inherit;cursor:pointer;}
  .partial-tag{font-size:9.5px;font-weight:800;color:#e0883a;margin-top:2px;text-transform:uppercase;letter-spacing:.03em;}
  .li-input:hover{border-color:var(--line-2);}
  .li-input:focus{outline:none;border-color:var(--brass);background:var(--bg);}
  .li-input.num{text-align:right;font-family:var(--font-mono);}
  .li-input.cat{font-family:var(--font-mono);font-size:12px;color:var(--brass);font-weight:600;}
  .li-amt{text-align:right;font-family:var(--font-mono);font-weight:600;font-size:13px;padding-right:10px;white-space:nowrap;}
  .li-del{border:none;background:transparent;color:var(--muted-2);cursor:pointer;padding:5px;border-radius:5px;font-size:15px;line-height:1;}
  .li-del:hover{background:var(--st-art-bg);color:var(--danger);}
  .add-line{margin:12px 18px 4px;padding:9px;width:calc(100% - 36px);border:1px dashed var(--line-strong);background:transparent;border-radius:var(--radius-sm);color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;}
  .add-line:hover{border-color:var(--brass);color:var(--brass-2);}

  /* totals sidebar */
  .status-pick{display:flex;flex-direction:column;gap:13px;}
  .seg{display:flex;flex-direction:column;gap:7px;}
  .seg label{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;}
  select.input,input.input{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;font-family:inherit;color:var(--ink);}
  select.input:focus,input.input:focus{outline:none;border-color:var(--brass-2);}

  .badge-st{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.02em;padding:7px 13px;border-radius:8px;text-transform:uppercase;font-family:var(--font-display);}
  .badge-st::before{content:'';width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,.45);}
  .st-send_art{background:var(--art);color:#1a0f08;}
  .st-approval_due{background:var(--due);color:#231803;}
  .st-approved{background:var(--approved);color:#04130a;}
  .st-in_process{background:var(--process);color:#03101f;}
  .st-invoice{background:var(--invoice);color:#15071f;}

  .totals{padding:4px 0;}
  .totals .t-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13.5px;}
  .totals .t-row .lbl{color:var(--muted);}
  .totals .t-row .amt{font-family:var(--font-mono);font-weight:600;}
  .totals .t-grand{border-top:2px solid var(--text);margin-top:6px;padding-top:12px;}
  .totals .t-grand .lbl{font-family:var(--font-display);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:13px;}
  .totals .t-grand .amt{font-family:var(--font-display);font-weight:800;font-size:21px;color:var(--brass-2);}

  .state{padding:60px;text-align:center;color:var(--muted);}
  .pipeline{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
  .pip{flex:1;min-width:60px;text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;padding:7px 4px;border-radius:5px;background:var(--paper);color:var(--muted-2);border:1px solid var(--line);cursor:pointer;}
  .rtype{display:flex;gap:5px;}
  .rt{flex:1;text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:9px 4px;border-radius:6px;background:var(--paper);color:var(--muted-2);border:1px solid var(--line-strong);cursor:pointer;font-family:var(--fd);}
  .rt:hover{border-color:var(--brass);color:var(--text);}
  .rt.on{background:#f4f6fb;color:#15171c;border-color:#f4f6fb;}
  .pip.on{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border-color:var(--brass-2);}
  .meta-foot{display:flex;gap:18px;flex-wrap:wrap;font-size:11.5px;color:var(--muted-2);padding:12px 18px;border-top:1px solid var(--line);background:var(--paper);}
  .meta-foot b{color:var(--muted);font-weight:600;}
  .save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--paper-2);border-top:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:12px;justify-content:flex-end;z-index:40;box-shadow:0 -2px 10px rgba(20,23,28,.05);}
  .save-bar .status-msg{margin-right:auto;font-size:13px;color:var(--muted);}
  .save-bar .status-msg.saved{color:var(--st-approved);}
  .save-bar .status-msg.err{color:var(--danger);}
  /* white calendar icon + full-field click */
  input[type="date"]{cursor:pointer;}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.85;cursor:pointer;}
  input[type="date"]:hover::-webkit-calendar-picker-indicator{opacity:1;}

  /* ---- In-app modal system ---- */
  .modal-overlay{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .16s;z-index:200;padding:20px;}
  .modal-overlay.open{opacity:1;pointer-events:auto;}
  .modal{background:var(--paper-2);border:1px solid var(--line-strong);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.6);width:100%;max-width:420px;transform:translateY(8px) scale(.98);transition:transform .16s;overflow:hidden;}
  .modal-overlay.open .modal{transform:translateY(0) scale(1);}
  .modal-ico{width:46px;height:46px;border-radius:11px;display:grid;place-items:center;margin:22px auto 0;}
  .modal-ico svg{width:24px;height:24px;}
  .modal-ico.warn{background:rgba(255,182,39,.14);color:var(--due);}
  .modal-ico.danger{background:rgba(255,77,77,.14);color:var(--danger);}
  .modal-ico.info{background:rgba(61,165,255,.14);color:var(--process);}
  .modal-body{padding:16px 26px 4px;text-align:center;}
  .modal-title{font-family:var(--fd);font-size:17px;font-weight:800;color:var(--text);margin-bottom:7px;letter-spacing:.01em;}
  .modal-msg{font-size:13.5px;color:var(--text-2);line-height:1.55;}
  .modal-foot{display:flex;gap:10px;padding:22px 26px;}
  .modal-foot .btn{flex:1;justify-content:center;padding:11px;}
  .modal-btn-primary{flex:1;justify-content:center;padding:11px;border-radius:var(--radius-sm);font-weight:700;font-size:13.5px;font-family:inherit;cursor:pointer;border:none;background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;}
  .modal-btn-primary:hover{filter:brightness(1.04);}
  .modal-btn-danger{background:var(--danger);color:#fff;}
  .modal-foot.single{justify-content:center;}
  .modal-foot.stacked{flex-direction:column;gap:9px;}
  .modal-foot.stacked .btn,.modal-foot.stacked .modal-btn-primary{width:100%;}
  .modal-plain{background:transparent;border-color:transparent;color:var(--text-3);}
  .modal-plain:hover{color:var(--text);border-color:transparent;}
</style>
</head>
<body>

  <div class="modal" id="modal">
    <div class="modal-ico" id="modal-ico"></div>

<template id="tpl">
<div class="grid">

  <!-- Sidebar: status + totals -->
  <div>

        <div class="status-pick">
          <div class="seg">

            <div class="rtype" id="rtype">
              <button class="rt" data-r="inquiry">Inquiry</button>
              <button class="rt" data-r="quote">Quotation</button>

            <label>Production Stage</label>
            <div class="pipeline" id="pipeline">
              <div class="pip" data-s="send_art">Send Art</div>
              <div class="pip" data-s="approval_due">Approval</div>
              <div class="pip" data-s="approved">Approved</div>
              <div class="pip" data-s="in_process">Process</div>

            <label>Order State</label>

              <option value="active">Active</option>
              <option value="on_hold">On Hold</option>
              <option value="completed">Completed</option>

</div>
</template>

<div class="save-bar">
  <span class="status-msg" id="save-msg">No changes</span>
  <button class="btn" id="btn-cancel">Cancel</button>
  <button class="btn-dark btn" id="btn-save">Save Order</button>

<script type="module">
import { supabase as db, requireAuth, signOut, currentUser, subscribeFulfillment } from './auth.js';
await requireAuth();

const HST_RATE = 0.13;
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const money=n=>'$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=d=>{if(!d)return '—';const x=new Date(d+'T00:00:00');return DOW[x.getDay()]+', '+x.getDate()+' '+MON[x.getMonth()]+' '+x.getFullYear();};
const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};

// ---- In-app modal helpers (replace browser confirm/alert) ----
const ICONS={
  warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  danger:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
};
function showModal({type='info',title='',msg='',confirmText='OK',cancelText=null,danger=false}){
  return new Promise(resolve=>{
    const ov=document.getElementById('modal-overlay');
    document.getElementById('modal-ico').className='modal-ico '+type;
    document.getElementById('modal-ico').innerHTML=ICONS[type]||ICONS.info;
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-msg').innerHTML=msg;
    const foot=document.getElementById('modal-foot');
    foot.className='modal-foot'+(cancelText?'':' single');
    foot.innerHTML=(cancelText?`<button class="btn" id="m-cancel">${esc(cancelText)}</button>`:'')+
      `<button class="${danger?'modal-btn-primary modal-btn-danger':'modal-btn-primary'}" id="m-ok">${esc(confirmText)}</button>`;
    const close=v=>{ov.classList.remove('open');setTimeout(()=>resolve(v),120);};
    foot.querySelector('#m-ok').onclick=()=>close(true);
    if(cancelText)foot.querySelector('#m-cancel').onclick=()=>close(false);
    ov.onclick=e=>{if(e.target===ov&&cancelText)close(false);};
    ov.classList.add('open');
  });
}
const confirmModal=(title,msg,opts={})=>showModal({type:opts.danger?'danger':'warn',title,msg,confirmText:opts.confirmText||'Confirm',cancelText:opts.cancelText||'Cancel',danger:opts.danger});
const alertModal=(title,msg,type='info')=>showModal({type,title,msg,confirmText:'Got it'});

// multi-option modal — returns the key of the button clicked (or null)
function choiceModal(title,msg,buttons){
  return new Promise(resolve=>{
    const ov=document.getElementById('modal-overlay');
    document.getElementById('modal-ico').className='modal-ico info';
    document.getElementById('modal-ico').innerHTML=ICONS.info;
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-msg').innerHTML=msg;
    const foot=document.getElementById('modal-foot');
    foot.className='modal-foot stacked';
    foot.innerHTML=buttons.map(b=>`<button class="${b.primary?'modal-btn-primary':(b.plain?'btn modal-plain':'btn')}" data-k="${b.key}">${esc(b.label)}</button>`).join('');
    const close=v=>{ov.classList.remove('open');setTimeout(()=>resolve(v),120);};
    foot.querySelectorAll('button').forEach(btn=>btn.onclick=()=>close(btn.dataset.k));
    ov.onclick=e=>{if(e.target===ov)close(null);};
    ov.classList.add('open');
  });
}

const params=new URLSearchParams(location.search);
const ORDER_ID=params.get('id');

let ORDER=null, LINES=[], DIRTY=false, PRODUCTS=[], SUPPLIERS=[];

function markDirty(){DIRTY=true;const m=document.getElementById('save-msg');m.textContent='Unsaved changes';m.className='status-msg';}

async function load(){
  if(!ORDER_ID){document.getElementById('wrap').innerHTML='<div class="state">No order specified. <a href="index.html">Back to inbox</a></div>';return;}
  const {data,error}=await db.from('quotes')
    .select('*, clients(*), contacts(*)')
    .eq('id',ORDER_ID).single();
  if(error||!data){document.getElementById('wrap').innerHTML=`<div class="state">Couldn't load this order.<br>${error?.message||''}</div>`;return;}
  ORDER=data;
  // load catalogues first (needed to resolve line-item displays)
  const {data:prods}=await db.from('products').select('category_code,category_name,style_number,name,unit,base_price,default_supplier_id').order('category_name').order('name');
  PRODUCTS=prods||[];
  const {data:sups}=await db.from('suppliers').select('id,supplier_number,company_name,short_name').order('company_name');
  SUPPLIERS=sups||[];
  const {data:items}=await db.from('quote_items').select('*').eq('quote_id',ORDER_ID).order('line_order');
  LINES=items||[];
  // resolve supplier display info for any line that has a supplier_id
  LINES.forEach(l=>{ if(l.supplier_id){ const s=SUPPLIERS.find(x=>x.id===l.supplier_id); if(s){ l._supplier_name=s.company_name||s.short_name||''; l._supplier_number=s.supplier_number; } } });
  await loadAllocations();
  render();
}

// Pull split allocations for the current line items (multi-PO support)
async function loadAllocations(){
  const ids=LINES.map(l=>l.id).filter(Boolean);
  if(!ids.length)return;
  const {data:allocs}=await db.from('quote_item_allocations').select('*').in('quote_item_id',ids);
  if(!allocs||!allocs.length)return;
  const byItem={};
  allocs.forEach(a=>{
    const s=SUPPLIERS.find(x=>x.id===a.supplier_id);
    (byItem[a.quote_item_id]=byItem[a.quote_item_id]||[]).push({
      id:a.id, supplier_id:a.supplier_id, quantity:a.quantity, in_po:a.in_po, po_id:a.po_id, status:a.status,
      _supplier_name:s?(s.company_name||s.short_name||''):'', _supplier_number:s?s.supplier_number:null
    });
  });
  LINES.forEach(l=>{ if(byItem[l.id]&&byItem[l.id].length>=1){ l._allocations=byItem[l.id]; } });
}

function applyRecordType(){
  const T={inquiry:'Inquiry',quote:'Quotation',order:'Sales Order'};
  document.querySelector('.topbar .title').childNodes[0].nodeValue=(T[ORDER.record_type]||'Record')+' ';
  // stage pipeline only relevant for sales orders
  const stageSeg=document.getElementById('stage-seg');
  if(stageSeg)stageSeg.style.display=ORDER.record_type==='order'?'':'none';
  // Print Quotation: allowed on quote + order, NOT inquiry
  const bq=document.getElementById('btn-quote');
  if(bq)bq.style.display=ORDER.record_type==='inquiry'?'none':'';
  // Convert to Invoice only really makes sense on an order
  const bi=document.getElementById('btn-invoice');
  if(bi)bi.style.display=ORDER.record_type==='order'?'':'none';
  // Supplier column (PO linking) only on Sales Orders
  applySupplierColVisibility();
}

function applySupplierColVisibility(){
  const isOrder=ORDER&&ORDER.record_type==='order';
  document.querySelectorAll('.sup-col').forEach(el=>{ el.style.display=isOrder?'':'none'; });
}

function render(){
  const wrap=document.getElementById('wrap');
  wrap.innerHTML='';
  wrap.appendChild(document.getElementById('tpl').content.cloneNode(true));

  document.getElementById('t-id').textContent='#'+ORDER.stage_id;
  document.getElementById('t-badge').innerHTML=`<span class="badge-st st-${ORDER.art_status}">${label(ORDER.art_status)}</span>`;
  document.getElementById('summary-wrap').style.display='block';
  updateSummary();
  applyRecordType();

  // record type switcher
  document.querySelectorAll('.rt').forEach(b=>{
    b.classList.toggle('on',b.dataset.r===ORDER.record_type);
    b.addEventListener('click',()=>{
      ORDER.record_type=b.dataset.r;
      document.querySelectorAll('.rt').forEach(x=>x.classList.toggle('on',x.dataset.r===ORDER.record_type));
      applyRecordType();updateSummary();markDirty();
    });
  });

  // editable header fields
  const subj=document.getElementById('i-subject');subj.value=ORDER.subject||'';subj.addEventListener('input',()=>{ORDER.subject=subj.value;markDirty();});
  const stf=document.getElementById('i-staff');stf.value=ORDER.serviced_by||'';stf.addEventListener('input',()=>{ORDER.serviced_by=stf.value;markDirty();});
  const po=document.getElementById('i-po');po.value=ORDER.po_number||'';po.addEventListener('input',()=>{ORDER.po_number=po.value;markDirty();});
  const qd=document.getElementById('i-qdate');qd.value=ORDER.quote_date||'';qd.addEventListener('click',()=>{try{qd.showPicker&&qd.showPicker();}catch(e){}});qd.addEventListener('change',()=>{ORDER.quote_date=qd.value||null;markDirty();});
  const sh=document.getElementById('i-ship');sh.value=ORDER.ship_mode||'pickup';sh.addEventListener('change',()=>{ORDER.ship_mode=sh.value;markDirty();});
  populateClients();

  // status controls
  document.querySelectorAll('.pip').forEach(p=>{
    if(p.dataset.s===ORDER.art_status)p.classList.add('on');
    p.addEventListener('click',()=>{ORDER.art_status=p.dataset.s;document.querySelectorAll('.pip').forEach(x=>x.classList.toggle('on',x.dataset.s===ORDER.art_status));document.getElementById('t-badge').innerHTML=`<span class="badge-st st-${ORDER.art_status}">${label(ORDER.art_status)}</span>`;markDirty();});
  });
  const ip=document.getElementById('i-pickup');ip.value=ORDER.pickup_date||'';
  const ev=document.getElementById('i-event');ev.value=ORDER.event_date||'';
  // click anywhere on the field opens the native calendar
  [ip,ev].forEach(el=>el.addEventListener('click',()=>{try{el.showPicker&&el.showPicker();}catch(e){}}));
  ip.addEventListener('change',async()=>{
    // pickup can't be AFTER the event date
    if(ev.value&&ip.value&&ip.value>ev.value){
      await alertModal('Invalid dates','The pick-up date can’t be after the event date. Please choose a pick-up date on or before '+fmtD(ev.value)+'.','warn');
      ip.value=ORDER.pickup_date||'';return;
    }
    ORDER.pickup_date=ip.value||null;markDirty();
  });
  ev.addEventListener('change',async()=>{
    // event can't be BEFORE the pickup date
    if(ip.value&&ev.value&&ev.value<ip.value){
      await alertModal('Invalid dates','The event date can’t be earlier than the pick-up date ('+fmtD(ip.value)+'). Please choose a later event date.','warn');
      ev.value=ORDER.event_date||'';return;
    }
    ORDER.event_date=ev.value||null;markDirty();
  });
  const is=document.getElementById('i-sent');is.value=ORDER.sent_status||'not_sent';is.addEventListener('change',()=>{ORDER.sent_status=is.value;markDirty();});
  const ia=document.getElementById('i-active');ia.value=ORDER.active_status||'active';ia.addEventListener('change',()=>{ORDER.active_status=ia.value;markDirty();});

  document.getElementById('add-line').addEventListener('click',addLine);
  document.getElementById('btn-save').addEventListener('click',save);
  document.getElementById('btn-quote').addEventListener('click',printQuotation);
  document.getElementById('btn-invoice').addEventListener('click',convertToInvoice);
  document.getElementById('btn-delete').addEventListener('click',deleteOrder);

  // meta footer
  document.getElementById('meta').innerHTML=
    `<span><b>Created</b> ${fmtD(ORDER.created_at?.slice(0,10))} ${ORDER.created_by?'· '+esc(ORDER.created_by):''}</span>
     <span><b>Modified</b> ${fmtD(ORDER.modified_at?.slice(0,10))}</span>
     <span><b>Record</b> ${esc(ORDER.record_type)}</span>`;

  renderLines();
}


let CLIENT_LIST=[];
async function populateClients(){
  if(!CLIENT_LIST.length){
    const {data}=await db.from('clients').select('id,company_name,bill_address,bill_city,bill_province,bill_postal, contacts(id,first_name,last_name,tel1,email1)').order('company_name');
    CLIENT_LIST=data||[];
  }
  const sel=document.getElementById('i-client');

function recompute(i,tr){
  LINES[i].amount=(parseFloat(LINES[i].quantity)||0)*(parseFloat(LINES[i].unit_price)||0);
  LINES[i].net_amount=LINES[i].amount-(LINES[i].amount*((parseFloat(LINES[i].discount_pct)||0)/100));
  if(tr)tr.querySelector('.li-amt').textContent=money(LINES[i].net_amount);

}

// ---- Combobox: type freely, see catalogue suggestions, click to autofill ----
// position a fixed dropdown menu right under its input, flipping up if near the bottom
function positionMenu(inp,menu){
  const r=inp.getBoundingClientRect();
  menu.style.left=r.left+'px';
  menu.style.width=Math.max(r.width,240)+'px';
  const spaceBelow=window.innerHeight-r.bottom;
  if(spaceBelow<260 && r.top>260){
    menu.style.top='';menu.style.bottom=(window.innerHeight-r.top+2)+'px';
  }else{
    menu.style.bottom='';menu.style.top=(r.bottom+2)+'px';
  }
}

function wireCombo(inp,kind){
  const i=+inp.dataset.i;
  const menu=inp.parentElement.querySelector('.cb-menu');
  const close=()=>{menu.classList.remove('open');menu.innerHTML='';};
  const open=()=>{
    const q=inp.value.toLowerCase().trim();
    let matches;
    if(kind==='cat'){
      // unique categories from products
      const seen=new Set();matches=[];
      PRODUCTS.forEach(p=>{const key=(p.category_name||'')+'|'+(p.category_code||'');
        if(seen.has(key))return;seen.add(key);
        const label=p.category_name||p.category_code||'';
        if(!q||label.toLowerCase().includes(q)||(p.category_code||'').toLowerCase().includes(q))matches.push({label,code:p.category_code,name:p.category_name});
      });
      matches=matches.slice(0,8);
    }else{
      // styles within the line's chosen category (if any), else all
      const cat=(LINES[i].category_name||'').toLowerCase();
      matches=PRODUCTS.filter(p=>{
        if(cat&&(p.category_name||'').toLowerCase()!==cat)return false;
        if(!q)return true;
        return (p.style_number||'').toLowerCase().includes(q)||(p.name||'').toLowerCase().includes(q);
      }).slice(0,8);
    }
    if(!matches.length){close();return;}
    positionMenu(inp,menu);
    menu.innerHTML=matches.map((m,idx)=>{
      if(kind==='cat')return `<div class="cb-opt" data-idx="${idx}"><span class="cb-main">${esc(m.label)}</span>${m.code?`<span class="cb-side">${esc(m.code)}</span>`:''}</div>`;
      return `<div class="cb-opt" data-idx="${idx}"><span class="cb-main">${esc(m.style_number||'—')}</span><span class="cb-side">${esc(m.name||'')}</span></div>`;
    }).join('');
    menu.classList.add('open');
    menu.querySelectorAll('.cb-opt').forEach(opt=>opt.addEventListener('mousedown',e=>{
      e.preventDefault();const m=matches[+opt.dataset.idx];
      if(kind==='cat'){
        LINES[i].category_name=m.name||m.label;LINES[i].category_code=m.code||null;
        inp.value=m.name||m.label;
        // reset style if it no longer belongs (optional, keep simple: leave as-is)
      }else{
        LINES[i].style_number=m.style_number||'';
        LINES[i].category_name=m.category_name||LINES[i].category_name;
        LINES[i].category_code=m.category_code||LINES[i].category_code;
        LINES[i].description=m.name||LINES[i].description;
        LINES[i].unit=m.unit||LINES[i].unit||'Pc';
        LINES[i].unit_price=m.base_price!=null?m.base_price:LINES[i].unit_price;
        LINES[i].amount=(parseFloat(LINES[i].quantity)||0)*(parseFloat(LINES[i].unit_price)||0);
        LINES[i].net_amount=LINES[i].amount-(LINES[i].amount*((parseFloat(LINES[i].discount_pct)||0)/100));
        // #6 — auto-fill the supplier from the product's default (only if user hasn't already set one)
        if(ORDER.record_type==='order' && m.default_supplier_id && !LINES[i].supplier_id && !(LINES[i]._allocations&&LINES[i]._allocations.length)){
          const sup=SUPPLIERS.find(s=>s.id===m.default_supplier_id);
          if(sup){
            LINES[i].supplier_id=sup.id;
            LINES[i]._supplier_name=sup.company_name||sup.short_name||'';
            LINES[i]._supplier_number=sup.supplier_number;
            // default supplier qty to the order qty if not yet set
            if(LINES[i].supplier_quantity==null||LINES[i].supplier_quantity==='') LINES[i].supplier_quantity=parseFloat(LINES[i].quantity)||0;
          }
        }
        inp.value=m.style_number||'';
      }
      close();renderLines();recalc();markDirty();
    }));
  };
  inp.addEventListener('focus',open);
  inp.addEventListener('input',()=>{
    LINES[i][inp.dataset.k==='category'?'category_name':'style_number']=inp.value;
    if(inp.dataset.k==='category')LINES[i].category_code=null; // typed custom; clear code unless a pick sets it
    // #6 — if they typed an exact style code, auto-fill supplier from that product's default
    if(inp.dataset.k==='style' && ORDER.record_type==='order'){
      const typed=inp.value.trim().toLowerCase();
      const prod=PRODUCTS.find(p=>(p.style_number||'').toLowerCase()===typed);
      if(prod && prod.default_supplier_id && !LINES[i].supplier_id && !(LINES[i]._allocations&&LINES[i]._allocations.length)){
        const sup=SUPPLIERS.find(s=>s.id===prod.default_supplier_id);
        if(sup){
          LINES[i].supplier_id=sup.id;LINES[i]._supplier_name=sup.company_name||sup.short_name||'';LINES[i]._supplier_number=sup.supplier_number;
          if(LINES[i].supplier_quantity==null||LINES[i].supplier_quantity==='') LINES[i].supplier_quantity=parseFloat(LINES[i].quantity)||0;
          renderLines();
        }
      }
    }
    open();markDirty();
  });
  inp.addEventListener('blur',()=>setTimeout(close,120));
}

function autoGrow(el){ if(!el)return; el.style.height='auto'; el.style.height=(el.scrollHeight)+'px'; }
function addLine(){LINES.push({category_code:'',category_name:'',style_number:'',description:'',quantity:1,unit:'Pc',unit_price:0,amount:0,discount_pct:0,net_amount:0,line_order:LINES.length+1});renderLines();markDirty();}

// fulfillment colour system: placed(amber) -> in_po(red) -> issued(grey) -> received(green); backordered(violet); instock(blue); partial(amber)
const FULFILL={placed:'fs-placed',partial:'fs-placed',in_po:'fs-inpo',issued:'fs-issued',received:'fs-verified',backordered:'fs-backordered',instock:'fs-instock'};
const FULFILL_LABEL={placed:'OPEN PO REQ',partial:'PARTIALLY IN PO',in_po:'IN PO',issued:'ISSUED',received:'RECEIVED',backordered:'BACK ORDER',instock:'IN STOCK'};
function fulfillState(ln){
  // split lines: derive from their allocations
  if(ln._allocations&&ln._allocations.length){
    const assigned=ln._allocations.reduce((s,a)=>s+(parseFloat(a.quantity)||0),0);
    const need=parseFloat(ln.supplier_quantity)||0;
    // surface any committed allocation status (issued/received/backordered) first
    const statuses=ln._allocations.map(a=>a.status).filter(Boolean);
    if(statuses.includes('backordered')) return 'backordered';
    if(statuses.length && statuses.every(s=>s==='received')) return 'received';
    if(statuses.includes('issued')) return 'issued';
    if(need>0 && assigned<need) return 'partial';   // not the whole qty is in a PO yet
    return 'in_po';                                  // fully allocated into PO(s)
  }
  const fs=ln.fulfillment_status;
  if(fs&&fs!=='none'&&fs!=='in_po') return fs;        // issued/received/backordered
  if(!ln.supplier_id) return null;
  const sq=ln.supplier_quantity;
  if(sq!=null&&sq!==''&&Number(sq)===0) return 'instock';
  if(ln.in_po||fs==='in_po') return 'in_po';
  return 'placed';
}
function fulfillClass(ln){const s=fulfillState(ln);return s?FULFILL[s]||'':'';}
function fulfillTag(ln){const s=fulfillState(ln);if(!s)return '';return `<span class="fs-pill fs-pill-${s}">${FULFILL_LABEL[s]||''}</span>`;}

// ---------- Split / allocations (one fixed supplier, supplier-qty across multiple POs) ----------
let SPLIT_I=null, SPLIT_ROWS=[], SPLIT_SUP=null, SPLIT_POS=[];
async function openSplit(i){
  if(ORDER.record_type!=='order'){ alertModal('Sales Orders only','Splitting items across POs is available on Sales Orders only.','info'); return; }
  const ln=LINES[i]; if(!ln){return;}
  const st=fulfillState(ln);
  if(st==='issued'||st==='received'||st==='backordered'){
    alertModal('Split locked','This line has already been issued to the supplier, so its purchase-order split can no longer be changed.<br><br>If the supplier cannot fulfill it, use <b>Back Order</b> in the Receiving area instead.','info');
    return;
  }
  if(!ln.supplier_id && !(ln._allocations&&ln._allocations.length)){
    alertModal('Pick a supplier first','Choose the supplier for this line, then split its supplier quantity across multiple purchase orders.','info');
    return;
  }
  SPLIT_I=i;
  if(ln._allocations&&ln._allocations.length){
    SPLIT_SUP={id:ln._allocations[0].supplier_id,name:ln._allocations[0]._supplier_name||ln._supplier_name||'',num:ln._allocations[0]._supplier_number};
    SPLIT_ROWS=ln._allocations.map(a=>({quantity:a.quantity, po_id:a.po_id||''}));
  }else{
    SPLIT_SUP={id:ln.supplier_id,name:ln._supplier_name||'',num:ln._supplier_number};
    SPLIT_ROWS=[{quantity:parseFloat(ln.supplier_quantity)||0, po_id:''}];
  }
  // load this supplier's OPEN POs so each row can be assigned to a specific one
  const {data:pos}=await db.from('purchase_orders').select('id,po_number,order_date').eq('status','open').eq('supplier_id',SPLIT_SUP.id).order('po_number');
  SPLIT_POS=pos||[];
  const supQty=parseFloat(ln.supplier_quantity)||0;
  document.getElementById('split-meta').innerHTML=`<b>${esc(ln.description||ln.style_number||'Line item')}</b><br>Supplier: <b>${esc(SPLIT_SUP.name||'—')}</b>${SPLIT_SUP.num?` (#${esc(String(SPLIT_SUP.num))})`:''}<br>Supplier quantity: <b>${supQty}</b> — assign how much goes to each PO. Any remainder stays unassigned until you add it to a PO later.`;
  renderSplitRows();
  document.getElementById('split-msg').textContent='';
  document.getElementById('split-overlay').classList.add('open');
}
function closeSplit(){document.getElementById('split-overlay').classList.remove('open');SPLIT_I=null;}
function poOptions(sel){
  const fmt=d=>{ if(!d)return ''; const x=new Date(d+'T00:00:00'); return x.toLocaleDateString('en-CA',{month:'short',day:'numeric'}); };
  return '<option value="">— choose PO —</option>'+SPLIT_POS.map(p=>`<option value="${p.id}" ${sel===p.id?'selected':''}>PO #${p.po_number}${p.order_date?' · '+fmt(p.order_date):''}</option>`).join('');
}
function renderSplitRows(){
  const box=document.getElementById('split-rows');
  const multiPO=SPLIT_POS.length>1;
  box.innerHTML=SPLIT_ROWS.map((r,idx)=>`
    <div class="split-row">
      <input class="sr-qty" type="number" min="0" data-idx="${idx}" value="${r.quantity??''}" placeholder="Qty">
      <span class="sr-arrow">→</span>
      ${SPLIT_POS.length?`<select class="sr-po" data-idx="${idx}">${poOptions(r.po_id)}</select>`:`<span class="sr-nopo">No open PO — will be added when one is created</span>`}
      <button class="sr-del" data-idx="${idx}">×</button>
    </div>`).join('');
  box.querySelectorAll('.sr-qty').forEach(q=>q.addEventListener('input',()=>{SPLIT_ROWS[+q.dataset.idx].quantity=parseFloat(q.value)||0;updateTally();}));
  box.querySelectorAll('.sr-po').forEach(s=>s.addEventListener('change',()=>{SPLIT_ROWS[+s.dataset.idx].po_id=s.value||'';}));
  box.querySelectorAll('.sr-del').forEach(b=>b.addEventListener('click',()=>{SPLIT_ROWS.splice(+b.dataset.idx,1);if(!SPLIT_ROWS.length)SPLIT_ROWS.push({quantity:0,po_id:''});renderSplitRows();}));
  updateTally();
}
function updateTally(){
  const ln=LINES[SPLIT_I]; if(!ln)return;
  const need=parseFloat(ln.supplier_quantity)||0;
  const sum=SPLIT_ROWS.reduce((s,r)=>s+(parseFloat(r.quantity)||0),0);
  const el=document.getElementById('split-tally');
  const remain=need-sum;
  if(sum>need){ el.textContent=`Assigned ${sum} of ${need} — over by ${sum-need}`; el.className='split-tally bad'; }
  else if(remain>0){ el.textContent=`Assigned ${sum} of ${need} — ${remain} will stay unassigned`; el.className='split-tally partial'; }
  else { el.textContent=`Assigned ${sum} of ${need} ✓`; el.className='split-tally ok'; }
}
document.getElementById('split-add').addEventListener('click',()=>{SPLIT_ROWS.push({quantity:0,po_id:''});renderSplitRows();});
document.getElementById('split-x').addEventListener('click',closeSplit);
document.getElementById('split-cancel').addEventListener('click',closeSplit);
document.getElementById('split-overlay').addEventListener('click',e=>{if(e.target.id==='split-overlay')closeSplit();});
document.getElementById('split-save').addEventListener('click',()=>{
  const ln=LINES[SPLIT_I]; if(!ln)return;
  for(const r of SPLIT_ROWS){
    if(!(parseFloat(r.quantity)>0)){document.getElementById('split-msg').textContent='Each row needs a quantity greater than 0.';return;}
  }
  const need=parseFloat(ln.supplier_quantity)||0;
  const sum=SPLIT_ROWS.reduce((s,r)=>s+(parseFloat(r.quantity)||0),0);
  if(sum>need){document.getElementById('split-msg').textContent='Assigned quantity ('+sum+') cannot exceed the supplier quantity ('+need+').';return;}
  // if more than one open PO exists, each row must choose a PO
  if(SPLIT_POS.length>1){
    for(const r of SPLIT_ROWS){ if(!r.po_id){document.getElementById('split-msg').textContent='Choose which PO each quantity goes to.';return;} }
  }
  // build allocations (each row = a portion, optionally tied to a specific PO)
  ln.supplier_id=SPLIT_SUP.id;ln._supplier_name=SPLIT_SUP.name;ln._supplier_number=SPLIT_SUP.num;
  if(SPLIT_ROWS.length===1 && !SPLIT_ROWS[0].po_id && sum===need){
    ln._allocations=null;   // single full portion, no specific PO -> treat as plain line
  }else{
    ln._allocations=SPLIT_ROWS.map(r=>({supplier_id:SPLIT_SUP.id,_supplier_name:SPLIT_SUP.name,_supplier_number:SPLIT_SUP.num,quantity:parseFloat(r.quantity)||0, po_id:r.po_id||null}));
  }
  closeSplit();renderLines();markDirty();
}); 

function recalc(){
  const sub=LINES.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const disc=LINES.reduce((s,l)=>s+((parseFloat(l.amount)||0)*((parseFloat(l.discount_pct)||0)/100)),0);
  const net=sub-disc;const hst=net*HST_RATE;const grand=net+hst;
  document.getElementById('t-sub').textContent=money(sub);
  document.getElementById('t-disc').textContent=disc>0?'−'+money(disc):money(0);
  document.getElementById('t-hst').textContent=money(hst);
  document.getElementById('t-grand').textContent=money(grand);
  ORDER._calc={subtotal:sub,discount_total:disc,hst,grand_total:grand};
  updateSummary();
}

function updateSummary(){
  const g=document.getElementById('sum-client');if(!g)return;
  const c=ORDER.clients||{};
  g.textContent=c.company_name||'—';
  document.getElementById('sum-pickup').textContent=fmtD(ORDER.pickup_date);
  document.getElementById('sum-event').textContent=fmtD(ORDER.event_date);
  document.getElementById('sum-stage').innerHTML=ORDER.record_type==='order'?`<span class="badge-st st-${ORDER.art_status}" style="font-size:10px;padding:3px 8px;">${label(ORDER.art_status)}</span>`:({inquiry:'Inquiry',quote:'Quotation'}[ORDER.record_type]||'—');
  const grand=(ORDER._calc&&ORDER._calc.grand_total)||0;
  document.getElementById('sum-total').textContent=money(grand);
}

async function save(silent){
  // #8 — when a supplier is assigned, supplier quantity is mandatory (0 = In Stock is allowed)
  if(ORDER.record_type==='order'){
    const missing=LINES.filter(l=>l.supplier_id && !(l._allocations&&l._allocations.length) && (l.supplier_quantity==null||l.supplier_quantity===''));
    if(missing.length && !silent){
      await alertModal('Supplier quantity required','One or more lines have a supplier but no Supplier Qty.<br><br>Enter the quantity going to the supplier, or set it to <b>0</b> if the item is already in stock.','warn');
      return;
    }
  }
  const msg=document.getElementById('save-msg');
  if(msg){msg.textContent=silent?'Adding to open PO…':'Saving…';msg.className='status-msg';}
  const c=ORDER._calc||{};
  // 1. update the quote
  const {error:e1}=await db.from('quotes').update({
    client_id:ORDER.client_id,contact_id:ORDER.contact_id,subject:ORDER.subject,serviced_by:ORDER.serviced_by,record_type:ORDER.record_type,
    po_number:ORDER.po_number,quote_date:ORDER.quote_date,ship_mode:ORDER.ship_mode,
    art_status:ORDER.art_status,pickup_date:ORDER.pickup_date,event_date:ORDER.event_date,sent_status:ORDER.sent_status,
    active_status:ORDER.active_status,subtotal:c.subtotal||0,discount_total:c.discount_total||0,
    hst:c.hst||0,grand_total:c.grand_total||0
  }).eq('id',ORDER_ID);
  if(e1){if(msg){msg.textContent='Error: '+e1.message;msg.className='status-msg err';}return;}

  // 2. UPDATE-IN-PLACE line items — never destroy fulfillment fields (in_po, po_id, fulfillment_status)
  //    a) figure out which existing rows were removed in the UI, and delete only those
  const {data:existing}=await db.from('quote_items').select('id').eq('quote_id',ORDER_ID);
  const existingIds=new Set((existing||[]).map(r=>r.id));
  const keptIds=new Set(LINES.filter(l=>l.id).map(l=>l.id));
  const toDelete=[...existingIds].filter(id=>!keptIds.has(id));
  if(toDelete.length){
    // also remove any PO items sourced from these deleted lines (from OPEN POs only —
    // sent POs are locked records). Their allocations go too.
    const {data:delAllocs}=await db.from('quote_item_allocations').select('id').in('quote_item_id',toDelete);
    const delAllocIds=(delAllocs||[]).map(a=>a.id);
    // find po_items linked to these quote_items or their allocations
    let linked=[];
    const {data:byItem}=await db.from('po_items').select('id,po_id').in('source_quote_item_id',toDelete);
    linked=linked.concat(byItem||[]);
    if(delAllocIds.length){
      const {data:byAlloc}=await db.from('po_items').select('id,po_id').in('source_allocation_id',delAllocIds);
      linked=linked.concat(byAlloc||[]);
    }
    if(linked.length){
      // keep only those on OPEN purchase orders
      const poIds=[...new Set(linked.map(p=>p.po_id))];
      const {data:openPOs}=await db.from('purchase_orders').select('id').eq('status','open').in('id',poIds);
      const openSet=new Set((openPOs||[]).map(p=>p.id));
      const poItemIds=linked.filter(p=>openSet.has(p.po_id)).map(p=>p.id);
      if(poItemIds.length) await db.from('po_items').delete().in('id',poItemIds);
    }
    if(delAllocIds.length) await db.from('quote_item_allocations').delete().in('id',delAllocIds);
    await db.from('quote_items').delete().in('id',toDelete);
  }

  //    b) update existing rows, insert new ones. Fulfillment fields are intentionally omitted.
  let insertedItems=[];
  for(let idx=0; idx<LINES.length; idx++){
    const l=LINES[idx];
    const base={quote_id:ORDER_ID,line_order:idx+1,category_code:l.category_code||null,
      category_name:l.category_name||null,style_number:l.style_number||null,description:l.description||null,
      quantity:parseFloat(l.quantity)||0,unit:l.unit||'Pc',unit_price:parseFloat(l.unit_price)||0,
      amount:parseFloat(l.amount)||0,discount_pct:parseFloat(l.discount_pct)||0,net_amount:parseFloat(l.net_amount)||0,
      supplier_id:l.supplier_id||null,
      supplier_quantity:l.supplier_quantity!=null&&l.supplier_quantity!==''?parseFloat(l.supplier_quantity)||0:null};
    if(l.id && existingIds.has(l.id)){
      // existing row -> UPDATE (do NOT touch in_po, po_id, fulfillment_status)
      await db.from('quote_items').update(base).eq('id',l.id);
      insertedItems.push({...l, ...base, id:l.id});
    }else{
      // brand-new row -> insert (starts with no fulfillment)
      const {data:ins}=await db.from('quote_items').insert({...base,in_po:false,po_id:null,fulfillment_status:'none'}).select().single();
      if(ins){ l.id=ins.id; insertedItems.push(ins); }
    }
  }

  //    c) allocations: rebuild for split lines not yet committed (issued) to a PO.
  for(let idx=0; idx<LINES.length; idx++){
    const l=LINES[idx];
    if(!l.id)continue;
    if(l._allocations&&l._allocations.length){
      // If existing allocations are already ISSUED in a PO, leave them untouched.
      const {data:exAlloc}=await db.from('quote_item_allocations').select('id,in_po,status').eq('quote_item_id',l.id);
      const anyIssued=(exAlloc||[]).some(a=>a.status&&a.status!=='pending'&&a.status!=='in_po');
      if(anyIssued) continue;   // committed splits are locked

      // This line is being (re)split. If the PARENT line was previously auto-added to an
      // OPEN PO as a single po_item, remove that — only the split portions should remain.
      // (Find po_items sourced directly from this quote_item on OPEN POs and delete them.)
      const {data:parentPoItems}=await db.from('po_items').select('id,po_id').eq('source_quote_item_id',l.id);
      if(parentPoItems&&parentPoItems.length){
        const poIds=[...new Set(parentPoItems.map(p=>p.po_id))];
        const {data:openPOs}=await db.from('purchase_orders').select('id').eq('status','open').in('id',poIds);
        const openSet=new Set((openPOs||[]).map(p=>p.id));
        const delIds=parentPoItems.filter(p=>openSet.has(p.po_id)).map(p=>p.id);
        if(delIds.length) await db.from('po_items').delete().in('id',delIds);
      }
      // reset the parent line so it's no longer treated as wholly in a PO
      await db.from('quote_items').update({in_po:false,po_id:null,fulfillment_status:'none'}).eq('id',l.id);
      l.in_po=false;l.po_id=null;l.fulfillment_status='none';

      // rebuild allocations from the split modal
      await db.from('quote_item_allocations').delete().eq('quote_item_id',l.id);
      const allocRows=l._allocations.map(a=>({quote_item_id:l.id, supplier_id:a.supplier_id||null, quantity:parseFloat(a.quantity)||0, in_po:false, po_id:a.po_id||null, status:'pending'}));
      if(allocRows.length) await db.from('quote_item_allocations').insert(allocRows);
    }
  }

  //    d) for lines already in an OPEN (not yet sent) PO, push supplier-qty edits
  //       through to the matching po_item so the PO stays in sync immediately.
  for(let idx=0; idx<LINES.length; idx++){
    const l=LINES[idx];
    if(!l.id || !l.in_po || !l.po_id) continue;
    // only if that PO is still open (sent POs are locked records)
    const {data:po}=await db.from('purchase_orders').select('status').eq('id',l.po_id).single();
    if(!po || po.status!=='open') continue;
    const supQty=l.supplier_quantity!=null&&l.supplier_quantity!==''?parseFloat(l.supplier_quantity)||0:0;
    if(supQty<=0){
      // supplier qty cleared / set to in-stock -> remove from the PO and release the line
      await db.from('po_items').delete().eq('po_id',l.po_id).eq('source_quote_item_id',l.id);
      await db.from('quote_items').update({in_po:false,po_id:null,fulfillment_status:'none'}).eq('id',l.id);
      l.in_po=false;l.po_id=null;l.fulfillment_status='none';
    }else{
      const rate=parseFloat(l.unit_price)||0;
      await db.from('po_items').update({quantity:supQty, amount:supQty*rate, product_name:l.description||null, part_no:l.style_number||null}).eq('po_id',l.po_id).eq('source_quote_item_id',l.id);
    }
  }

  // 3. sync supplier lines into their open POs (only items not yet in a PO move)
  const warnings=await syncToPOs(insertedItems);
  // #9 — if any supplier had multiple open POs, let the user pick which PO
  const choices=syncToPOs._needsChoice||[];
  if(choices.length){ await resolvePOChoices(choices); syncToPOs._needsChoice=[]; }
  DIRTY=false;
  if(msg){msg.textContent='Saved ✓';msg.className='status-msg saved';}
  if(warnings.length && !silent){
    const sups=[...new Set(warnings)];
    await alertModal('Purchase order required',
      'Some items have supplier quantities assigned but are not linked to an open Purchase Order. Please create the required Purchase Order(s). Once created, these items will automatically be added.'+
      '<br><br><b>Suppliers needing a PO:</b><br>'+sups.map(s=>'• '+esc(s)).join('<br>'),'warn');
  }
  // reload to reflect current fulfillment state
  await reloadLines();
}

// When a supplier with an open PO is chosen on a sales order, auto-save so the
// line flows into that PO immediately — the user doesn't have to click Save.
async function maybeAutoSyncPO(supplierId){
  if(ORDER.record_type!=='order')return;
  if(!supplierId)return;
  const {data:openPOs}=await db.from('purchase_orders').select('id').eq('status','open').eq('supplier_id',supplierId);
  if(!openPOs||!openPOs.length)return;   // no open PO -> on-save warning handles it
  // If the line that just got this supplier has no supplier qty yet, default it to the
  // order qty so the item is eligible to flow into the PO (qty 0 stays In Stock).
  LINES.forEach(l=>{ if(l.supplier_id===supplierId && (l.supplier_quantity==null||l.supplier_quantity==='')){ l.supplier_quantity=parseFloat(l.quantity)||0; } });
  // Save silently — this runs syncToPOs, which (for >1 open PO) opens the picker immediately.
  await save(true);
}

// Push each line that has a supplier with an OPEN PO into that PO. Returns {warnings, needsPOChoice}.
// Only items NOT already linked to a PO (in_po=false) and with supplier_quantity>0 are moved.
// Items with supplier_quantity===0 are "In Stock" and never go to a PO.
async function syncToPOs(insertedItems){
  const warnings=[];
  const needsChoice=[];   // suppliers with >1 open PO -> user must pick (handled by caller)
  if(ORDER.record_type!=='order') return warnings;

  // reload current fulfillment state of these items so we never touch ones already in a PO
  const ids=insertedItems.map(it=>it.id).filter(Boolean);
  let stateById={};
  if(ids.length){
    const {data:cur}=await db.from('quote_items').select('id,in_po,supplier_id,supplier_quantity,quantity,unit_price,style_number,description,fulfillment_status').in('id',ids);
    (cur||[]).forEach(r=>stateById[r.id]=r);
  }

  // find which items are split (have allocations) — those go via allocations ONLY,
  // so the parent line item must NOT also be pushed (that caused duplicates).
  let allocItemIds=new Set();
  let allAllocs=[];
  if(ids.length){
    const {data:al}=await db.from('quote_item_allocations').select('*').in('quote_item_id',ids);
    allAllocs=al||[];
    allAllocs.forEach(a=>allocItemIds.add(a.quote_item_id));
  }

  const bySup={};
  insertedItems.forEach(it=>{
    const st=stateById[it.id]||it;
    if(st.in_po) return;                                  // already linked -> never re-touch
    if(allocItemIds.has(it.id)) return;                   // split line -> handled by its allocations only
    const supQty=st.supplier_quantity!=null?Number(st.supplier_quantity):Number(st.quantity);
    if(!st.supplier_id || !(supQty>0)) return;            // no supplier, or In-Stock(0) -> skip
    (bySup[st.supplier_id]=bySup[st.supplier_id]||[]).push({type:'item',style_number:st.style_number,description:st.description,quantity:supQty,unit_price:Number(st.unit_price),id:it.id});
  });

  // allocations (split) not yet in a PO
  {
    const itemById={};insertedItems.forEach(it=>itemById[it.id]=stateById[it.id]||it);
    allAllocs.forEach(a=>{
      if(a.in_po) return;
      if(!a.supplier_id||!(Number(a.quantity)>0))return;
      const it=itemById[a.quote_item_id]||{};
      (bySup[a.supplier_id]=bySup[a.supplier_id]||[]).push({type:'alloc',ref:a,style_number:it.style_number,description:it.description,quantity:Number(a.quantity),unit_price:Number(it.unit_price),id:a.id});
    });
  }

  const supIds=Object.keys(bySup);
  if(!supIds.length)return warnings;

  // find OPEN POs per supplier — there may be more than one
  const {data:openPOs}=await db.from('purchase_orders').select('id,po_number,supplier_id,order_date').eq('status','open').in('supplier_id',supIds).order('po_number');
  const posBySup={};(openPOs||[]).forEach(p=>{(posBySup[p.supplier_id]=posBySup[p.supplier_id]||[]).push(p);});

  for(const sid of supIds){
    const pos=posBySup[sid]||[];
    const sup=SUPPLIERS.find(s=>s.id===sid);
    const supName=sup?(sup.company_name||sup.short_name):'this supplier';
    if(pos.length===0){
      warnings.push(supName);
      continue;
    }
    const entries=bySup[sid];
    // entries that already specify a PO (from the split modal) go straight there
    const preAssigned=entries.filter(e=>e.ref&&e.ref.po_id);
    for(const e of preAssigned){
      const po=pos.find(p=>p.id===e.ref.po_id);
      if(po) await addEntriesToPO(po,[e]);
    }
    const rest=entries.filter(e=>!(e.ref&&e.ref.po_id));
    if(!rest.length) continue;
    if(pos.length===1){
      await addEntriesToPO(pos[0], rest);
    }else{
      // >1 open PO and these entries haven't chosen one -> ask the user (per line)
      needsChoice.push({supplier_id:sid, supplier_name:supName, pos, entries:rest});
    }
  }
  // hand any "choose a PO" cases back to the caller
  syncToPOs._needsChoice=needsChoice;
  return warnings;
}

// Insert the given entries into a specific PO and mark sources in_po (red).
async function addEntriesToPO(po, entries){
  const poRows=entries.map((entry,idx)=>({
    po_id:po.id, line_order:idx+1,
    source_quote_item_id:entry.type==='item'?entry.id:(entry.ref.quote_item_id||null),
    source_allocation_id:entry.type==='alloc'?entry.id:null,
    style_number:entry.style_number||null, category_name:null,
    part_no:entry.style_number||null, product_name:entry.description||null, description:entry.description||null,
    quantity:entry.quantity, rate:entry.unit_price||0, amount:entry.quantity*(entry.unit_price||0),
    ordered_for:ORDER.stage_id?String(ORDER.stage_id):null, status:'issued'
  }));
  if(!poRows.length)return;
  const {error}=await db.from('po_items').insert(poRows);
  if(error)return;
  const itemIds=entries.filter(e=>e.type==='item').map(e=>e.id);
  if(itemIds.length) await db.from('quote_items').update({in_po:true,po_id:po.id,fulfillment_status:'in_po'}).in('id',itemIds);
  const allocIds=entries.filter(e=>e.type==='alloc').map(e=>e.id);
  if(allocIds.length) await db.from('quote_item_allocations').update({in_po:true,po_id:po.id,status:'in_po'}).in('id',allocIds);
}

// #9/#2 — single combined popup: lists every entry that needs a PO choice, each
// with its own PO dropdown. The user assigns all of them, then confirms once.
function resolvePOChoices(choices){
  return new Promise(resolve=>{
    const ov=document.getElementById('popick-overlay');
    const fmt=d=>{ if(!d)return ''; const x=new Date(d+'T00:00:00'); return x.toLocaleDateString('en-CA',{month:'short',day:'numeric'}); };
    // flatten: one assignable row per entry, carrying its supplier's PO options
    const rows=[];
    choices.forEach(c=>{ c.entries.forEach(e=>{ rows.push({entry:e, pos:c.pos, supplier_name:c.supplier_name, po_id:''}); }); });
    document.getElementById('popick-meta').innerHTML=`These line items can go to more than one open purchase order. Choose where each one goes:`;
    document.getElementById('popick-list').innerHTML=rows.map((r,idx)=>{
      const label=(r.entry.description||r.entry.style_number||'Line item');
      const qty=r.entry.quantity!=null?` · qty ${r.entry.quantity}`:'';
      return `<div class="popick-line">
        <div class="pl-info"><div class="pl-name">${esc(label)}</div><div class="pl-sub">${esc(r.supplier_name)}${qty}</div></div>
        <select class="pl-po" data-idx="${idx}"><option value="">— choose PO —</option>${r.pos.map(p=>`<option value="${p.id}">PO #${p.po_number}${p.order_date?' · '+fmt(p.order_date):''}</option>`).join('')}</select>
      </div>`;
    }).join('');
    document.getElementById('popick-list').querySelectorAll('.pl-po').forEach(sel=>sel.addEventListener('change',()=>{rows[+sel.dataset.idx].po_id=sel.value||'';}));
    const msg=document.getElementById('popick-msg');msg.textContent='';
    const confirmBtn=document.getElementById('popick-confirm');
    const skipBtn=document.getElementById('popick-skip');
    const finish=async(assignAll)=>{
      if(assignAll){
        if(rows.some(r=>!r.po_id)){ msg.textContent='Choose a PO for every line, or use “Skip for now”.'; return; }
        // group entries by chosen PO and insert
        for(const r of rows){
          const po=r.pos.find(p=>p.id===r.po_id);
          if(po) await addEntriesToPO(po,[r.entry]);
        }
      }
      ov.classList.remove('open'); resolve();
    };
    confirmBtn.onclick=()=>finish(true);
    skipBtn.onclick=()=>finish(false);
    ov.classList.add('open');
  });
}

async function reloadLines(){
  const {data:items}=await db.from('quote_items').select('*').eq('quote_id',ORDER_ID).order('line_order');
  LINES=items||[];
  LINES.forEach(l=>{ if(l.supplier_id){ const s=SUPPLIERS.find(x=>x.id===l.supplier_id); if(s){ l._supplier_name=s.company_name||s.short_name||''; l._supplier_number=s.supplier_number; } } });
  await loadAllocations();
  renderLines();recalc();
}

async function printQuotation(){
  if(!LINES.length){await alertModal('Nothing to print','Add at least one line item before printing a quotation.','warn');return;}
  const choice=await choiceModal('Quotation #'+ORDER.stage_id,'How would you like to output it?',[
    {key:'pdf',label:'Save as PDF',primary:true},
    {key:'print',label:'Print'},
    {key:'cancel',label:'Cancel',plain:true}
  ]);
  if(!choice||choice==='cancel')return;
  let mod;
  try{ mod=await import('./pdf.js'); }
  catch(err){ await alertModal('Couldn’t load','The PDF generator (pdf.js) didn’t load.','danger'); return; }
  const c=ORDER.clients||{}; const ct=ORDER.contacts||{};
  const lines=[c.bill_address,c.bill_city,c.bill_postal,c.bill_province].filter(Boolean);
  const calc=ORDER._calc||{subtotal:ORDER.subtotal,hst:ORDER.hst,grandTotal:ORDER.grand_total};
  const payload={
    number:String(ORDER.stage_id), date:ORDER.quote_date, servicedBy:ORDER.serviced_by||'',
    clientContact:((ct.first_name||'')+' '+(ct.last_name||'')).trim(), pageNo:1,
    client:{company:c.company_name||'', lines, tel:ct.tel1||'', email:ct.email1||''},
    items:LINES.map(l=>({category:l.category_name||l.category_code||'',code:l.style_number||'',description:l.description||'',qty:l.quantity,unit:l.unit||'Pc',unitPrice:l.unit_price,amount:l.amount,discountPct:l.discount_pct||0})),
    subtotal:calc.subtotal||0, hst:calc.hst||0, grandTotal:calc.grand_total||calc.grandTotal||0
  };
  if(choice==='print'){ mod.printDoc('QUOTATION',payload); return; }
  // PDF: keep offering the save until it succeeds or the user gives up
  while(true){
    const saved=await mod.makePDF('QUOTATION',payload);
    if(!saved)return; // user cancelled the OS save dialog
    const done=await confirmModal('Quotation saved','Did the quotation save successfully?',{confirmText:'Complete',cancelText:'Not yet'});
    if(done){ location.href='index.html'; return; }
    // "Not yet" -> loop and re-open the save dialog
  }
}

async function deleteOrder(){
  const T={inquiry:'inquiry',quote:'quotation',order:'order'}[ORDER.record_type]||'record';
  const ok=await confirmModal('Delete this '+T+'?','#'+ORDER.stage_id+' and its line items will be permanently removed. This cannot be undone.',{confirmText:'Delete',cancelText:'Keep it',danger:true});
  if(!ok)return;
  await db.from('quote_items').delete().eq('quote_id',ORDER_ID);
  const {error}=await db.from('quotes').delete().eq('id',ORDER_ID);
  if(error){await alertModal('Couldn’t delete',error.message,'danger');return;}
  DIRTY=false;
  location.href='index.html';
}

async function convertToInvoice(){
  if(DIRTY){ const s=await confirmModal('Save first?','You have unsaved changes. They’ll be saved before creating the invoice.',{confirmText:'Save & continue',cancelText:'Cancel'}); if(!s)return; await save(); }
  const ok=await confirmModal('Create invoice?','This generates a new invoice from order #'+ORDER.stage_id+' and moves it to the invoice stage.',{confirmText:'Create invoice',cancelText:'Cancel'});
  if(!ok)return;
  const c=ORDER._calc||{subtotal:ORDER.subtotal,discount_total:ORDER.discount_total,hst:ORDER.hst,grand_total:ORDER.grand_total};
  const {data:seq,error:se}=await db.rpc('nextval_invoice');
  let invNum=null;
  if(se||seq==null){ const {data:mx}=await db.from('invoices').select('invoice_number').order('invoice_number',{ascending:false}).limit(1); invNum=(mx&&mx[0]&&mx[0].invoice_number?mx[0].invoice_number:20000)+1; }
  else invNum=seq;
  const invDate=new Date();
  const dueDate=new Date(invDate.getTime()+30*86400000);   // Net 30 by default
  const {data:inv,error}=await db.from('invoices').insert({
    invoice_number:invNum, quote_id:ORDER_ID, client_id:ORDER.client_id, subject:ORDER.subject,
    serviced_by:ORDER.serviced_by, invoice_date:invDate.toISOString().slice(0,10),
    terms:'net_30', due_date:dueDate.toISOString().slice(0,10),
    subtotal:c.subtotal||0, discount_total:c.discount_total||0, hst:c.hst||0, grand_total:c.grand_total||0,
    balance_due:c.grand_total||0, paid_status:'unpaid'
  }).select().single();
  if(error){await alertModal('Couldn’t create invoice',error.message,'danger');return;}
  // remove the order from the Sales Timeline: flip record_type to 'invoice'
  // (the timeline only shows inquiry/quote/order) and mark it completed.
  const {error:upErr}=await db.from('quotes').update({record_type:'invoice',art_status:'invoice',active_status:'completed'}).eq('id',ORDER_ID);
  if(upErr){ await alertModal('Invoice created, but…','The invoice was created but the order could not be moved off the timeline: '+upErr.message,'warn'); }
  location.href='invoice.html?id='+encodeURIComponent(inv.id);
}

function label(s){return {send_art:'Send Art',approval_due:'Approval Due',approved:'Approved',in_process:'In Process',invoice:'Invoice',no_data:'No Data'}[s]||s;}

// Intercept "Inbox" back link and Cancel button to use an in-app unsaved-changes prompt.
// Three options: save & leave, leave without saving, or stay. (You're never trapped.)
async function guardedLeave(dest){
  if(DIRTY){
    const choice=await choiceModal('Unsaved changes','You have unsaved changes on this record. What would you like to do?',[
      {key:'save',label:'Save changes & leave',primary:true},
      {key:'leave',label:'Leave without saving'},
      {key:'stay',label:'Stay on this page',plain:true}
    ]);
    if(choice==='stay'||choice==null) return;
    if(choice==='save'){ await save(); }      // auto-save then leave
    DIRTY=false;
  }
  location.href=dest;
}
{
  const back=document.querySelector('.topbar .back');
  if(back)back.addEventListener('click',e=>{e.preventDefault();guardedLeave('index.html');});
  const cancel=document.getElementById('btn-cancel');
  if(cancel)cancel.addEventListener('click',e=>{e.preventDefault();guardedLeave('index.html');});
}

// (native "Leave site?" beforeunload prompt intentionally removed — the in-app
//  navigation guard above handles unsaved changes with a styled three-option prompt.)
load();
// live sync: if another screen changes this order's fulfillment, refresh the line
// colours — but never while the user has unsaved edits (would clobber their work).
subscribeFulfillment(async()=>{
  if(DIRTY) return;                 // don't interrupt active editing
  if(document.getElementById('split-overlay')?.classList.contains('open')) return;
  if(document.getElementById('popick-overlay')?.classList.contains('open')) return;
  await reloadLines();
});
</script>
