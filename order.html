<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Detail — YRT CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  /* Deferred module scripts would otherwise paint the full management view
     (prices, totals, client contact) before auth.js applies the role. */
  html:not(.role-ready) body{visibility:hidden;}
  /* ── PROCESS ROLE: hide everything they must not see. CSS-driven, so it
     applies the instant the role class lands — no JS race. ── */
  html.role-process .mgmt-only{display:none !important;}
  html.role-process .money-col{display:none !important;}
  html.role-process .totals{display:none !important;}
  html.role-process #btn-invoice,
  html.role-process #btn-delete,
  html.role-process #btn-po,
  html.role-process #btn-pdf,
  html.role-process #add-line,
  html.role-process .split-btn{display:none !important;}
  /* line items become read-only text, not inputs */
  html.role-process .li-input{pointer-events:none;background:transparent;border-color:transparent;color:var(--text);}
  html.role-process .cb-menu{display:none !important;}
  /* read-only banner */
  .ro-bar{display:none;align-items:center;gap:10px;padding:11px 16px;background:rgba(88,177,131,.08);border:1px solid rgba(88,177,131,.28);border-radius:10px;margin-bottom:14px;}
  html.role-process .ro-bar{display:flex;}
  .ro-bar .rb-b{font-family:var(--font-display,'Archivo');font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#0f1115;background:#59b183;padding:4px 9px;border-radius:5px;}
  .inact-ov{position:fixed;inset:0;background:rgba(8,10,14,.74);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:9500;padding:20px;}
  .inact-card{background:#16181d;border:1px solid #414a5c;border-radius:14px;width:100%;max-width:480px;overflow:hidden;}
  .inact-h{padding:20px 22px 16px;border-bottom:1px solid #323a48;}
  .inact-t{font-family:'Archivo',sans-serif;font-size:15px;font-weight:800;color:#fff;}
  .inact-s{font-size:12.5px;color:#9098a8;margin-top:5px;line-height:1.5;}
  .inact-b{padding:12px 14px;display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;}
  .inact-row{display:flex;align-items:center;gap:11px;padding:11px 13px;background:#1f2229;border:1px solid #414a5c;border-radius:9px;cursor:pointer;transition:.13s;}
  .inact-row:hover{border-color:#9098a8;}
  .inact-row input{accent-color:#59b183;}
  .ir-id{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:700;color:#caa75d;}
  .ir-sub{flex:1;font-size:13px;color:#eef0f4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ir-d{font-size:11.5px;color:#8b93a4;white-space:nowrap;}
  .inact-f{display:flex;gap:10px;padding:14px 20px 18px;justify-content:flex-end;border-top:1px solid #323a48;}
  .inact-btn{padding:10px 16px;border-radius:8px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid #414a5c;background:#1f2229;color:#eef0f4;}
  .inact-btn.primary{background:#f4f6fb;color:#15171c;border-color:#f4f6fb;}
  .presence-bar{display:flex;align-items:center;gap:10px;padding:11px 16px;background:rgba(232,153,90,.1);border:1px solid rgba(232,153,90,.35);border-radius:10px;margin-bottom:14px;}
  .presence-bar .pb-dot{width:8px;height:8px;border-radius:50%;background:#e8995a;flex-shrink:0;animation:pb-pulse 1.6s ease-in-out infinite;}
  .presence-bar .pb-t{font-size:12.5px;color:#d9cdbf;}
  .presence-bar .pb-t strong{color:#f0b078;}
  @keyframes pb-pulse{0%,100%{opacity:.45}50%{opacity:1}}
  .ro-bar .rb-t{font-size:12.5px;color:var(--text-2,#c4cad6);font-weight:600;}
  /* Order State: two equal halves, text centred in each. */
  .statetog{display:grid;grid-template-columns:1fr 1fr;width:100%;border:1px solid var(--line-2);border-radius:8px;overflow:hidden;background:var(--bg);}
  .stog{display:flex;align-items:center;justify-content:center;text-align:center;background:transparent;border:none;height:38px;padding:0;color:var(--text-3);font-family:var(--fd);font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:.13s;}
  .stog + .stog{border-left:1px solid var(--line-2);}
  .stog:hover{color:var(--text);}
  .stog.on[data-v="active"]{background:rgba(61,220,132,.16);color:#5fe3a1;}
  .stog.on[data-v="inactive"]{background:rgba(144,152,168,.16);color:#aab2c0;}
</style>
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;--sidebar:#0a0c0f;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#c4cad6;--text-3:#9098a8;
    --brass:#e7ebf3;--brass-2:#f4f6fb;--brass-bg:rgba(231,235,243,.10);
    --art:#ff6b35;--due:#ffb627;--approved:#3ddc84;--process:#3da5ff;--invoice:#b06bff;--nodata:#5a6273;--danger:#ff4d4d;
    --radius:11px;--radius-sm:8px;--shadow-sm:0 2px 8px rgba(0,0,0,.4);
    --font-display:'Archivo',system-ui,sans-serif;--font-body:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;
    --ink:var(--text);--slate-900:var(--bg-2);--slate-700:var(--bg-3);--paper:var(--bg);--paper-2:var(--bg-2);
    --line-strong:var(--line-2);--muted:var(--text-3);--muted-2:var(--text-3);
    --st-art-bg:var(--art);--st-due-bg:var(--due);--st-approved-bg:var(--approved);--st-process-bg:var(--process);--st-invoice-bg:var(--invoice);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}

  .topbar{height:58px;background:var(--paper-2);border-bottom:2px solid var(--line-2);display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:30;}
  .back{display:inline-flex;align-items:center;gap:7px;color:var(--muted);text-decoration:none;font-weight:600;font-size:13px;padding:7px 11px;border-radius:var(--radius-sm);border:1px solid var(--line-strong);background:var(--paper-2);}
  .back:hover{border-color:var(--brass);color:var(--brass-2);}
  .topbar .title{font-family:var(--font-display);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:16px;}
  .topbar .title .id{color:var(--brass-2);}
  .topbar .actions{margin-left:auto;display:flex;gap:8px;}
  .btn{padding:8px 14px;border-radius:var(--radius-sm);font-weight:600;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--line-strong);background:var(--paper-2);color:var(--ink);display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{border-color:var(--brass-2);}
  .btn-danger{color:var(--danger);border-color:transparent;}
  .btn-danger:hover{border-color:var(--danger);background:rgba(255,77,77,.10);}
  .btn-dark{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border-color:#f4f6fb;}
  .btn-dark:hover{filter:brightness(1.04);}
  .btn-brass{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border-color:#f4f6fb;}
  .btn-brass:hover{background:#c3cad8;}

  .wrap{max-width:1340px;margin:0 auto;padding:16px 22px 90px;}
  /* at-a-glance summary strip */
  .summary{max-width:1340px;margin:0 auto;padding:0 22px;}
  .summary-inner{display:flex;align-items:stretch;gap:0;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-top:14px;}
  .sum-cell{padding:11px 18px;border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;min-width:0;}
  .sum-cell:last-child{border-right:none;}
  .sum-cell .k{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:3px;}
  .sum-cell .v{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sum-cell.grow{flex:1;}
  .sum-cell .v.accent{color:var(--brass-2);font-family:var(--fm);}
  .grid{display:grid;grid-template-columns:1fr 300px;gap:14px;align-items:start;}
  @media(max-width:1000px){.grid{grid-template-columns:1fr;}}

  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:13px;overflow:visible;}
  .card-h{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .card-h h3{font-family:var(--font-display);font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#aab2c4;}
  .card-b{padding:14px 16px;}

  /* client header block */
  .client-block{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .field{margin-bottom:10px;}
  .field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;margin-bottom:4px;}
  .field .val{font-size:14px;font-weight:500;}
  .field .val.big{font-size:17px;font-weight:700;font-family:var(--font-display);}
  .field .val.mono{font-family:var(--font-mono);}
  .field-row{display:flex;gap:14px;}
  .field-row .field{flex:1;}

  /* line items */
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;padding:9px 10px;border-bottom:1px solid var(--line);background:var(--paper);}
  thead th.num{text-align:right;}
  tbody td{padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  .li-input{width:100%;border:1px solid transparent;background:transparent;padding:6px 7px;border-radius:5px;font-size:13px;font-family:inherit;color:var(--ink);}
  .li-desc{resize:none;overflow:hidden;line-height:1.4;min-height:30px;white-space:pre-wrap;word-break:break-word;}
  .cb-cell{position:relative;}
  .cb-menu{display:none;position:fixed;min-width:240px;max-width:420px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.5);z-index:9000;overflow:hidden;max-height:260px;overflow-y:auto;}
  .cb-menu.open{display:block;}
  .cb-opt{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line);}
  .cb-opt:last-child{border-bottom:none;}
  .cb-opt:hover{background:var(--bg-3);}
  .cb-opt .cb-main{font-weight:600;color:var(--text);font-size:13px;}
  .cb-opt .cb-side{font-family:var(--fm);font-size:11px;color:var(--text-3);white-space:nowrap;}
  /* product search results (description combobox) — corporate, two-line, minimal */
  .cb-opt-p{display:block;padding:10px 13px;}
  .cbp-top{display:flex;align-items:baseline;justify-content:space-between;gap:14px;}
  .cbp-name{font-weight:600;color:var(--text);font-size:13px;line-height:1.35;}
  .cbp-price{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--text-2);white-space:nowrap;}
  .cbp-sub{display:flex;align-items:center;gap:7px;margin-top:4px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);}
  .cbp-sku{font-family:var(--fm);letter-spacing:0;text-transform:none;font-size:11px;color:#aab2c0;}
  .cbp-dot{color:#4a5160;}
  .cb-desc{resize:none;}
  .disc-cell{white-space:nowrap;}
  .li-disc{background:var(--paper);border:1px solid var(--line);color:var(--ink);border-radius:5px;padding:5px 6px;font-size:12px;font-family:inherit;cursor:pointer;}
  .li-disc:focus{outline:none;border-color:var(--brass);}
  .disc-waived{font-family:var(--fm);font-size:10.5px;color:var(--danger);margin-top:3px;}
  .disc-waived.waived-full{color:var(--brass-2);font-weight:700;font-family:var(--fd);text-transform:uppercase;letter-spacing:.03em;}
  .sup-id-tag{font-family:var(--fm);font-size:10px;color:var(--brass-2);margin-top:2px;font-weight:700;}
  .lines-scroll{max-height:340px;overflow-y:auto;}
  .lines-scroll::-webkit-scrollbar{width:9px;}.lines-scroll::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:5px;border:2px solid var(--paper-2);}
  .lines-scroll thead th{position:sticky;top:0;background:var(--paper-2);z-index:2;}
  /* inline totals under product listing (modern CRM style) */
  .listing-foot{display:flex;align-items:stretch;justify-content:space-between;gap:24px;border-top:1px solid var(--line);margin-top:4px;padding:18px;}
  .listing-foot .meta-foot{border:none;background:transparent;padding:0;align-self:flex-end;flex:0 0 auto;}
  .order-totals{display:flex;justify-content:flex-end;padding:0;flex:1;}
  .ot-inner{width:320px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:16px 18px;}
  .ot-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;}
  .ot-row .ot-lbl{color:var(--muted);font-weight:500;}
  .ot-row .ot-amt{font-family:var(--fm);font-weight:600;color:var(--ink);}
  .ot-grand{border-top:1px solid var(--line-2);margin-top:8px;padding-top:12px;}
  .ot-grand .ot-lbl{font-family:var(--fd);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:12.5px;color:var(--ink);}
  .ot-grand .ot-amt{font-family:var(--fd);font-weight:800;font-size:19px;color:var(--brass-2);}
  .cb-cell.in-po .cb-sup{color:var(--danger);font-weight:700;}
  .cb-sup{text-overflow:ellipsis;}
  /* fulfillment colour: the status pill carries the colour; the split summary count tints to match */
  .fs-placed .alloc-count{color:#e0883a !important;font-weight:700;}
  .fs-partial .alloc-count{color:#f0b34e !important;font-weight:700;}
  .fs-inpo .alloc-count{color:#ff4d4d !important;font-weight:700;}
  .fs-issued .alloc-count{color:#8a92a2 !important;font-weight:700;}
  .fs-instock .alloc-count{color:#3da5ff !important;font-weight:700;}
  .instock-tag{font-size:9.5px;font-weight:800;color:#3da5ff;margin-top:2px;text-transform:uppercase;letter-spacing:.03em;}
  .sup-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
  .sup-id-tag{font-family:var(--fm);font-size:10px;color:var(--text-3);font-weight:700;}
  .fs-pill{display:inline-block;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:.03em;line-height:1.3;white-space:nowrap;}
  .fs-pill-placed{color:#e0883a;background:rgba(224,136,58,.16);}
  .fs-pill-partial{color:#f0b34e;background:rgba(240,179,78,.18);}
  .fs-pill-in_po{color:#ff4d4d;background:rgba(255,77,77,.14);}
  .fs-pill-issued{color:#8a92a2;background:rgba(138,146,162,.18);}
  .fs-pill-received{color:#3ddc84;background:rgba(61,220,132,.16);}
  .fs-pill-backordered{color:#b06bff;background:rgba(176,107,255,.16);}
  .fs-pill-instock{color:#3da5ff;background:rgba(61,165,255,.16);}
  .fs-arrived .cb-sup,.fs-arrived .sup-id-tag,.fs-arrived .alloc-count{color:#ffb627 !important;font-weight:700;}
  .fs-verified .cb-sup,.fs-verified .sup-id-tag,.fs-verified .alloc-count{color:#3ddc84 !important;font-weight:700;}
  .fs-backordered .cb-sup,.fs-backordered .sup-id-tag,.fs-backordered .alloc-count{color:#b06bff !important;font-weight:700;}
  .legend{margin-left:auto;display:flex;gap:13px;flex-wrap:wrap;}
  .legend .lg{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted);font-weight:600;}
  .legend .lg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .alloc-btn{margin-top:5px;font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text-3);cursor:pointer;font-family:inherit;}
  .alloc-btn:hover{border-color:var(--brass);color:var(--brass-2);}
  .alloc-btn.locked{opacity:.4;cursor:not-allowed;}
  .alloc-btn.locked:hover{border-color:var(--line-2);color:var(--text-3);}
  .alloc-summary{display:flex;flex-direction:column;gap:2px;cursor:pointer;}
  .alloc-summary .alloc-count{font-size:12px;font-weight:700;color:var(--brass-2);}
  .alloc-summary .alloc-edit{font-size:10px;color:var(--text-3);}
  /* split allocation modal */
  .split-overlay{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:250;padding:20px;}
  .split-overlay.open{display:flex;}
  .split-modal{background:var(--paper-2);border:1px solid var(--line-2);border-radius:14px;width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
  .split-head{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);}
  .split-head h3{font-family:var(--fd);font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:.03em;}
  .split-x{margin-left:auto;background:var(--bg-4);border:none;color:var(--text-2);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:17px;}
  .split-body{padding:18px 22px;overflow-y:auto;}
  .split-meta{font-size:13px;color:var(--text-2);margin-bottom:14px;padding:10px 13px;background:var(--bg);border:1px solid var(--line);border-radius:8px;}
  .split-meta b{color:var(--ink);}
  .split-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
  .split-row .sr-sup{flex:1;position:relative;}
  .split-row input,.split-row .sr-supinput{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--ink);}
  .split-row input:focus{outline:none;border-color:var(--brass);}
  .split-row .sr-qty{width:90px;}
  .split-row .sr-del{background:transparent;border:none;color:var(--danger);cursor:pointer;font-size:18px;padding:0 4px;}
  .split-row .sr-label{width:60px;font-size:12.5px;font-weight:700;color:var(--text-2);flex-shrink:0;}
  .split-row .sr-qty{flex:1;}
  .sr-menu{display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--paper-2);border:1px solid var(--line-2);border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.5);z-index:30;max-height:200px;overflow-y:auto;}
  .sr-menu.open{display:block;}
  .sr-opt{padding:9px 12px;cursor:pointer;display:flex;justify-content:space-between;font-size:13px;}
  .sr-opt:hover{background:var(--bg-3);}.sr-opt .sr-side{font-family:var(--fm);color:var(--text-3);font-size:11px;}
  .split-add{width:100%;padding:9px;border:1px dashed var(--line-strong);background:transparent;border-radius:7px;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;margin-top:4px;}
  .split-add:hover{border-color:var(--brass);color:var(--brass-2);}
  .split-tally{margin-top:14px;font-size:13px;font-weight:600;text-align:right;}
  .split-tally.ok{color:var(--approved);}.split-tally.bad{color:var(--danger);}.split-tally.partial{color:var(--brass-2);}
  .split-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .split-row .sr-qty{width:90px;background:var(--paper);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;}
  .split-row .sr-arrow{color:var(--text-3);font-size:14px;}
  .split-row .sr-po{flex:1;background:var(--paper);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:8px 10px;font-size:12.5px;font-family:inherit;cursor:pointer;}
  .split-row .sr-nopo{flex:1;font-size:11.5px;color:var(--text-3);font-style:italic;}
  .split-row .sr-del{background:transparent;border:none;color:var(--danger);cursor:pointer;font-size:18px;padding:0 4px;}
  .split-foot{display:flex;align-items:center;gap:10px;padding:16px 22px;border-top:1px solid var(--line);justify-content:flex-end;}
  .split-msg{margin-right:auto;font-size:12.5px;color:var(--danger);}
  .popick-list{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
  .popick-line{display:flex;align-items:center;gap:12px;border:1px solid var(--line-2);border-radius:10px;padding:12px 14px;}
  .popick-line .pl-info{flex:1;min-width:0;}

  .save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--paper-2);border-top:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:12px;justify-content:flex-end;z-index:40;box-shadow:0 -2px 10px rgba(20,23,28,.05);}

  .modal-overlay{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .16s;z-index:200;padding:20px;}

  .modal-ico{width:46px;height:46px;border-radius:11px;display:grid;place-items:center;margin:22px auto 0;}
  .modal-ico svg{width:24px;height:24px;}
  .modal-ico.warn{background:rgba(255,182,39,.14);color:var(--due);}
  .modal-ico.danger{background:rgba(255,77,77,.14);color:var(--danger);}

  .modal-body{padding:16px 26px 4px;text-align:center;}

  .modal-msg{font-size:13.5px;color:var(--text-2);line-height:1.55;}
  .modal-foot{display:flex;gap:10px;padding:22px 26px;}
  .modal-foot .btn{flex:1;justify-content:center;padding:11px;}
  .modal-btn-primary{flex:1;justify-content:center;padding:11px;border-radius:var(--radius-sm);font-weight:700;font-size:13.5px;font-family:inherit;cursor:pointer;border:none;background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;}

  .modal-foot.stacked{flex-direction:column;gap:9px;}
  .modal-foot.stacked .btn,.modal-foot.stacked .modal-btn-primary{width:100%;}
  .modal-plain{background:transparent;border-color:transparent;color:var(--text-3);}
  .modal-plain:hover{color:var(--text);border-color:transparent;}
</style>
</head>

<script type="module">
import { supabase as db, requireAuth, signOut, currentUser, subscribeFulfillment, isManagement, getProfile } from './auth.js';
await requireAuth();
const PROFILE = await getProfile();
const MGMT = isManagement();
let LOADED_AT = null;   // quotes.modified_at as it was when this page loaded

const HST_RATE = 0.13;
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const money=n=>'$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=d=>{if(!d)return '—';const x=new Date(d+'T00:00:00');return DOW[x.getDay()]+', '+x.getDate()+' '+MON[x.getMonth()]+' '+x.getFullYear();};
const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};

// ---- In-app modal helpers (replace browser confirm/alert) ----
const ICONS={
  warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  danger:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
};
function showModal({type='info',title='',msg='',confirmText='OK',cancelText=null,danger=false}){
  return new Promise(resolve=>{
    const ov=document.getElementById('modal-overlay');
    document.getElementById('modal-ico').className='modal-ico '+type;
    document.getElementById('modal-ico').innerHTML=ICONS[type]||ICONS.info;
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-msg').innerHTML=msg;
    const foot=document.getElementById('modal-foot');
    foot.className='modal-foot'+(cancelText?'':' single');
    foot.innerHTML=(cancelText?`<button class="btn" id="m-cancel">${esc(cancelText)}</button>`:'')+
      `<button class="${danger?'modal-btn-primary modal-btn-danger':'modal-btn-primary'}" id="m-ok">${esc(confirmText)}</button>`;
    const close=v=>{ov.classList.remove('open');setTimeout(()=>resolve(v),120);};
    foot.querySelector('#m-ok').onclick=()=>close(true);
    if(cancelText)foot.querySelector('#m-cancel').onclick=()=>close(false);
    ov.onclick=e=>{if(e.target===ov&&cancelText)close(false);};
    ov.classList.add('open');
  });
}
const confirmModal=(title,msg,opts={})=>showModal({type:opts.danger?'danger':'warn',title,msg,confirmText:opts.confirmText||'Confirm',cancelText:opts.cancelText||'Cancel',danger:opts.danger});
const alertModal=(title,msg,type='info')=>showModal({type,title,msg,confirmText:'Got it'});

// multi-option modal — returns the key of the button clicked (or null)
function choiceModal(title,msg,buttons){
  return new Promise(resolve=>{
    const ov=document.getElementById('modal-overlay');
    document.getElementById('modal-ico').className='modal-ico info';
    document.getElementById('modal-ico').innerHTML=ICONS.info;
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-msg').innerHTML=msg;
    const foot=document.getElementById('modal-foot');
    foot.className='modal-foot stacked';
    foot.innerHTML=buttons.map(b=>`<button class="${b.primary?'modal-btn-primary':(b.plain?'btn modal-plain':'btn')}" data-k="${b.key}">${esc(b.label)}</button>`).join('');
    const close=v=>{ov.classList.remove('open');setTimeout(()=>resolve(v),120);};
    foot.querySelectorAll('button').forEach(btn=>btn.onclick=()=>close(btn.dataset.k));
    ov.onclick=e=>{if(e.target===ov)close(null);};
    ov.classList.add('open');
  });
}

const params=new URLSearchParams(location.search);
const ORDER_ID=params.get('id');

let ORDER=null, LINES=[], DIRTY=false, PRODUCTS=[], SUPPLIERS=[];

function markDirty(){DIRTY=true;const m=document.getElementById('save-msg');m.textContent='Unsaved changes';m.className='status-msg';}

// PROCESS ROLE: loads through the restricted RPCs. Prices are stripped in Postgres,
// so no money value ever reaches this browser — hiding it in CSS would not be enough.
async function loadProcess(){
  const {data:rows,error}=await db.rpc('process_order',{p_id:ORDER_ID});
  const o=(rows||[])[0];
  if(error||!o){
    // Either it isn't assigned to them, or it's inactive/invoiced. Say so plainly
    // and send them back, rather than leaving a blank screen.
    await smAlert('This order is not assigned to you, so you cannot open it. Ask Rajveer or Karan to assign it to you.',
                  'Not assigned to you','warn');
    location.replace('index.html');
    return;
  }
  const {data:items}=await db.rpc('process_order_items',{p_id:ORDER_ID});
  ORDER={
    ...o,
    clients:{company_name:o.client_name}, contacts:null,
    record_type:'order', active_status:'active',
    subtotal:0, discount_total:0, hst:0, grand_total:0,   // never shown to process
    client_id:null, contact_id:null
  };
  LINES=(items||[]).map(it=>({
    id:it.id, line_order:it.line_order, style_number:it.style_number,
    description:it.description, quantity:it.quantity,
    fulfillment_status:it.fulfillment_status, _supplier_name:it.supplier_name,
    unit_price:null, amount:null, discount_pct:null, net_amount:null
  }));
  renderProcess(o);
}

function renderProcess(o){
  // Reuse the real render() so the template actually gets injected — a separate
  // renderer is what left the page stuck on "Loading order…". The management-only
  // parts (prices, totals, Order State, Record Type, Save) are hidden by the
  // .role-process CSS, and no money ever reaches this page anyway.
  render();

  const el=id=>document.getElementById(id);
  const t=el('t-id'); if(t) t.textContent='#'+o.stage_id;

  // Client select: a process user can't read the clients table (RLS), so seed it
  // with just this order's client so the field shows the right name.
  const cs=el('i-client');
  if(cs){ cs.innerHTML=`<option>${esc(o.client_name||'—')}</option>`; cs.disabled=true; }
  const ct=el('i-contact');
  if(ct){ ct.innerHTML='<option>—</option>'; ct.disabled=true; }

  // Read-only banner naming the assignee.
  const w=el('wrap');
  if(w && !document.querySelector('.ro-bar')){
    const bar=document.createElement('div'); bar.className='ro-bar';
    bar.innerHTML='<span class="rb-b">Production</span><span class="rb-t">View only — assigned to '+esc(o.assigned_to||'Unassigned')+'</span>';
    w.prepend(bar);
  }
}

// ── Reuse an inactive order for this client ──────────────────────────
// When you pick a client on a Sales Order, check whether that same company
// already has an order sitting inactive. If so, offer it back rather than
// letting a duplicate get raised. Yes -> reactivate it and go there. No -> carry on.
let INACTIVE_OFFERED=false;
async function offerInactiveForClient(){
  if(!MGMT || !ORDER || ORDER.record_type!=='order') return;
  if(!ORDER.client_id || INACTIVE_OFFERED) return;

  const {data,error}=await db.rpc('inactive_orders_for_client',{p_client:ORDER.client_id});
  if(error || !data || !data.length) return;
  INACTIVE_OFFERED=true;   // only ask once per page

  const list=data.map(r=>{
    const d=r.pickup_date?fmtD(r.pickup_date):(r.quote_date?fmtD(r.quote_date):'no date');
    return `<label class="inact-row"><input type="radio" name="inact" value="${r.id}"><span class="ir-id">#${r.stage_id}</span><span class="ir-sub">${esc(r.subject||'No subject')}</span><span class="ir-d">${d}</span></label>`;
  }).join('');

  const clientName=(CLIENT_LIST.find(c=>c.id===ORDER.client_id)||{}).company_name||'this client';
  const pick=await new Promise(res=>{
    const ov=document.createElement('div'); ov.className='inact-ov';
    ov.innerHTML=`<div class="inact-card">
      <div class="inact-h">
        <div class="inact-t">${esc(clientName)} already has ${data.length===1?'an inactive order':'inactive orders'}</div>
        <div class="inact-s">You set ${data.length===1?'this one':'these'} aside earlier. Use ${data.length===1?'it':'one'} instead of creating a new record?</div>
      </div>
      <div class="inact-b">${list}</div>
      <div class="inact-f">
        <button class="inact-btn" id="inact-no">No, create a new order</button>
        <button class="inact-btn primary" id="inact-yes">Use this order</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    ov.querySelector('#inact-no').onclick=()=>{ov.remove();res(null);};
    ov.querySelector('#inact-yes').onclick=()=>{
      const c=ov.querySelector('input[name=inact]:checked');
      if(!c){ return; }
      ov.remove(); res(c.value);
    };
    const first=ov.querySelector('input[name=inact]'); if(first) first.checked=true;
  });

  if(!pick) return;   // "No" -> carry on with the new order

  // Yes -> reactivate that order and open it.
  const {error:upErr}=await db.from('quotes').update({active_status:'active'}).eq('id',pick);
  if(upErr){ await smAlert('Could not reactivate: '+upErr.message,'Error','danger'); return; }
  DIRTY=false;
  location.href='order.html?id='+encodeURIComponent(pick);
}

async function load(){
  if(!ORDER_ID){document.getElementById('wrap').innerHTML='<div class="state">No order specified. <a href="index.html">Back to inbox</a></div>';return;}
  if(!MGMT) return loadProcess();
  const {data,error}=await db.from('quotes')
    .select('*, clients(*), contacts(*)')
    .eq('id',ORDER_ID).single();
  if(error||!data){document.getElementById('wrap').innerHTML=`<div class="state">Couldn't load this order.<br>${error?.message||''}</div>`;return;}
  ORDER=data;
  LOADED_AT = data.modified_at || null;   // optimistic lock: the version we loaded
  // load catalogues first (needed to resolve line-item displays)
  // Supabase caps a select at 1000 rows — page through so the whole catalogue is searchable.
  let _allProds=[],_pFrom=0;const _PPAGE=1000;
  while(true){
    const {data:_pg}=await db.from('products')
      .select('category_code,category_name,style_number,name,unit,base_price,default_supplier_id')
      .order('category_name').order('name').range(_pFrom,_pFrom+_PPAGE-1);
    _allProds=_allProds.concat(_pg||[]);
    if(!_pg||_pg.length<_PPAGE)break;
    _pFrom+=_PPAGE;
  }
  const prods=_allProds;
  PRODUCTS=prods||[];
  const {data:sups}=await db.from('suppliers').select('id,supplier_number,company_name,short_name').order('company_name');
  SUPPLIERS=sups||[];
  const {data:items}=await db.from('quote_items').select('*').eq('quote_id',ORDER_ID).order('line_order');
  LINES=items||[];
  // resolve supplier display info for any line that has a supplier_id
  LINES.forEach(l=>{ if(l.supplier_id){ const s=SUPPLIERS.find(x=>x.id===l.supplier_id); if(s){ l._supplier_name=s.short_name||s.company_name||''; l._supplier_number=s.supplier_number; } } });
  await loadAllocations();
  render();
}

// Pull split allocations for the current line items (multi-PO support)
async function loadAllocations(){
  const ids=LINES.map(l=>l.id).filter(Boolean);
  if(!ids.length)return;
  // 1) explicit allocations (created via "Order to PO")
  const {data:allocs}=await db.from('quote_item_allocations').select('*').in('quote_item_id',ids);
  // 2) direct po_items sourced from a line but NOT tied to an allocation (older/auto path)
  const {data:directPis}=await db.from('po_items').select('id,source_quote_item_id,source_allocation_id,quantity,status,po_id, purchase_orders(supplier_id)').in('source_quote_item_id',ids);
  const byItem={};
  (allocs||[]).forEach(a=>{
    const s=SUPPLIERS.find(x=>x.id===a.supplier_id);
    (byItem[a.quote_item_id]=byItem[a.quote_item_id]||[]).push({
      id:a.id, supplier_id:a.supplier_id, quantity:a.quantity, in_po:a.in_po, po_id:a.po_id, status:a.status, _direct:false,
      _supplier_name:s?(s.short_name||s.company_name||''):'', _supplier_number:s?s.supplier_number:null
    });
  });
  (directPis||[]).forEach(p=>{
    if(p.source_allocation_id) return;   // already represented by its allocation
    const supId=p.purchase_orders?.supplier_id;
    const s=SUPPLIERS.find(x=>x.id===supId);
    (byItem[p.source_quote_item_id]=byItem[p.source_quote_item_id]||[]).push({
      id:'pi:'+p.id, _poItemId:p.id, supplier_id:supId, quantity:p.quantity, in_po:true, po_id:p.po_id, status:p.status, _direct:true,
      _supplier_name:s?(s.short_name||s.company_name||''):'', _supplier_number:s?s.supplier_number:null
    });
  });
  LINES.forEach(l=>{ l._allocations = (byItem[l.id]&&byItem[l.id].length) ? byItem[l.id] : null; });
}

  const stageSeg=document.getElementById('stage-seg');

  // Convert to Invoice only really makes sense on an order

  const wrap=document.getElementById('wrap');

  document.getElementById('t-id').textContent='#'+ORDER.stage_id;

  const qd=document.getElementById('i-qdate');qd.value=ORDER.quote_date||'';qd.addEventListener('click',()=>{try{qd.showPicker&&qd.showPicker();}catch(e){}});qd.addEventListener('change',()=>{ORDER.quote_date=qd.value||null;markDirty();});
  const sh=document.getElementById('i-ship');sh.value=ORDER.ship_mode||'pickup';sh.addEventListener('change',()=>{ORDER.ship_mode=sh.value;markDirty();});
  populateClients();

  // status controls
  document.querySelectorAll('.pip').forEach(p=>{
    if(p.dataset.s===ORDER.art_status)p.classList.add('on');
    p.addEventListener('click',()=>{ORDER.art_status=p.dataset.s;document.querySelectorAll('.pip').forEach(x=>x.classList.toggle('on',x.dataset.s===ORDER.art_status));document.getElementById('t-badge').innerHTML=`<span class="badge-st st-${ORDER.art_status}">${label(ORDER.art_status)}</span>`;markDirty();});
  });
  const ip=document.getElementById('i-pickup');ip.value=ORDER.pickup_date||'';
  const ev=document.getElementById('i-event');ev.value=ORDER.event_date||'';
  // click anywhere on the field opens the native calendar
  [ip,ev].forEach(el=>el.addEventListener('click',()=>{try{el.showPicker&&el.showPicker();}catch(e){}}));
  ip.addEventListener('change',async()=>{
    // pickup can't be AFTER the event date
    if(ev.value&&ip.value&&ip.value>ev.value){
      await alertModal('Invalid dates','The pick-up date can’t be after the event date. Please choose a pick-up date on or before '+fmtD(ev.value)+'.','warn');
      ip.value=ORDER.pickup_date||'';return;
    }
    ORDER.pickup_date=ip.value||null;markDirty();
  });
  ev.addEventListener('change',async()=>{
    // event can't be BEFORE the pickup date
    if(ip.value&&ev.value&&ev.value<ip.value){
      await alertModal('Invalid dates','The event date can’t be earlier than the pick-up date ('+fmtD(ip.value)+'). Please choose a later event date.','warn');
      ev.value=ORDER.event_date||'';return;
    }
    ORDER.event_date=ev.value||null;markDirty();
  });
  const is=document.getElementById('i-sent');is.value=ORDER.sent_status||'not_sent';is.addEventListener('change',()=>{ORDER.sent_status=is.value;markDirty();});
  // Order State: two options only. Anything legacy (on_hold/cancelled) reads as inactive.
  // 'completed' is set automatically on invoice conversion and is left alone.
  const _isInactive=v=>v && v!=='active' && v!=='completed';
  if(_isInactive(ORDER.active_status)) ORDER.active_status='inactive';
  if(!ORDER.active_status) ORDER.active_status='active';

    const inact = ORDER.active_status==='inactive';

  }

     <span><b>Modified</b> ${fmtD(ORDER.modified_at?.slice(0,10))}</span>
     <span><b>Record</b> ${esc(ORDER.record_type)}</span>`;

  renderLines();
}

  if(!CLIENT_LIST.length){
    const {data}=await db.from('clients').select('id,company_name,bill_address,bill_city,bill_province,bill_postal, contacts(id,first_name,last_name,tel1,email1)').order('company_name');
    CLIENT_LIST=data||[];

  const sel=document.getElementById('i-client');

    ORDER.client_id=sel.value||null;ORDER.contact_id=null;updateClientInfo();markDirty();

    tr.innerHTML=`
      <td class="cb-cell"><input class="li-input cb-cat" value="${esc(ln.category_name||ln.category_code||'')}" data-i="${i}" data-k="category" placeholder="Category" autocomplete="off"><div class="cb-menu" data-menu="cat-${i}"></div></td>
      <td class="cb-cell"><input class="li-input cb-style" value="${esc(ln.style_number||'')}" data-i="${i}" data-k="style" placeholder="Style #" autocomplete="off"><div class="cb-menu" data-menu="style-${i}"></div></td>
      <td class="cb-cell"><textarea class="li-input li-desc cb-desc" rows="1" data-i="${i}" data-k="description" placeholder="Search a product, or type freely…" autocomplete="off">${esc(ln.description||'')}</textarea><div class="cb-menu" data-menu="desc-${i}"></div></td>
      <td class="cb-cell sup-col ${fulfillClass(ln)}">

          ? `<div class="alloc-summary" data-alloc="${i}"><span class="alloc-count">${esc(ln._supplier_name||'Supplier')}</span><span class="alloc-edit">manage orders</span></div>${(()=>{const ordered=ln._allocations.reduce((s,a)=>s+(parseFloat(a.quantity)||0),0);const need=parseFloat(ln.quantity)||0;const bal=need-ordered;return bal>0?`<div class="partial-tag">${ordered} ordered · ${bal} to order</div>`:`<div class="full-tag">${ordered} ordered ✓</div>`;})()}`
          : `<input class="li-input cb-sup" value="${esc(ln._supplier_name||'')}" data-i="${i}" placeholder="Supplier" autocomplete="off"><div class="cb-menu" data-menu="sup-${i}"></div>${ln.supplier_id&&ln._supplier_number?`<div class="sup-meta"><span class="sup-id-tag">#${esc(String(ln._supplier_number))}</span>${fulfillTag(ln)}</div>`:''}`}
        <button class="alloc-btn" data-alloc="${i}" title="Order this line's quantity to a purchase order">⊞ Order to PO</button>
      </td>
      <td><input class="li-input num" value="${ln.quantity??''}" data-i="${i}" data-k="quantity" placeholder="0"></td>
      <td><input class="li-input" value="${esc(ln.unit||'Pc')}" data-i="${i}" data-k="unit" style="width:40px;"></td>
      <td><input class="li-input num" value="${ln.unit_price??''}" data-i="${i}" data-k="unit_price" placeholder="0.00"></td>
      <td class="disc-cell">
        <select class="li-disc" data-i="${i}">${discOpts.map(d=>`<option value="${d}" ${parseFloat(ln.discount_pct)===d?'selected':''}>${d===0?'—':d+'%'}</option>`).join('')}</select>
        ${parseFloat(ln.discount_pct)===100?`<div class="disc-waived waived-full">Charges Waived</div>`:(waived>0?`<div class="disc-waived">−${money(waived)}</div>`:'')}
      </td>
      <td class="li-amt">${money(ln.net_amount)}</td>
      <td><button class="li-del" data-del="${i}">×</button></td>`;
    tb.appendChild(tr);
  });
  // plain inputs (description, qty, unit, price)
  tb.querySelectorAll('.li-input:not(.cb-cat):not(.cb-style):not(.cb-desc)').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const i=+inp.dataset.i,k=inp.dataset.k;let v=inp.value;
      if(k==='quantity'||k==='unit_price'||k==='supplier_quantity')v=parseFloat(v)||0;
      LINES[i][k]=v;
      if(inp.classList.contains('li-desc')) autoGrow(inp);
      recompute(i,inp.closest('tr'));markDirty();
    });
  });
  // size description textareas to fit their content
  tb.querySelectorAll('.li-desc').forEach(autoGrow);
  // discount dropdown
  tb.querySelectorAll('.li-disc').forEach(sel=>{
    sel.addEventListener('change',()=>{
      const i=+sel.dataset.i;
      LINES[i].discount_pct=parseFloat(sel.value)||0;
      LINES[i].amount=(parseFloat(LINES[i].quantity)||0)*(parseFloat(LINES[i].unit_price)||0);
      LINES[i].net_amount=LINES[i].amount-(LINES[i].amount*(LINES[i].discount_pct/100));
      renderLines();recalc();markDirty();
    });
  });
  // comboboxes
  tb.querySelectorAll('.cb-cat').forEach(inp=>wireCombo(inp,'cat'));
  tb.querySelectorAll('.cb-style').forEach(inp=>wireCombo(inp,'style'));
  tb.querySelectorAll('.cb-desc').forEach(inp=>wireCombo(inp,'desc'));
  tb.querySelectorAll('.cb-sup').forEach(inp=>wireSupplierCombo(inp));
  tb.querySelectorAll('.li-del').forEach(b=>b.addEventListener('click',()=>deleteLine(+b.dataset.del)));
  tb.querySelectorAll('.alloc-btn,[data-alloc].alloc-summary').forEach(b=>b.addEventListener('click',()=>openSplit(+b.dataset.alloc)));
  applySupplierColVisibility();
  recalc();
}

function recompute(i,tr){
  LINES[i].amount=(parseFloat(LINES[i].quantity)||0)*(parseFloat(LINES[i].unit_price)||0);
  LINES[i].net_amount=LINES[i].amount-(LINES[i].amount*((parseFloat(LINES[i].discount_pct)||0)/100));
  if(tr)tr.querySelector('.li-amt').textContent=money(LINES[i].net_amount);
  recalc();
}

// ---- Combobox: type freely, see catalogue suggestions, click to autofill ----
// position a fixed dropdown menu right under its input, flipping up if near the bottom
function positionMenu(inp,menu){
  const r=inp.getBoundingClientRect();
  menu.style.left=r.left+'px';
  menu.style.width=Math.max(r.width,240)+'px';
  const spaceBelow=window.innerHeight-r.bottom;
  if(spaceBelow<260 && r.top>260){
    menu.style.top='';menu.style.bottom=(window.innerHeight-r.top+2)+'px';
  }else{
    menu.style.bottom='';menu.style.top=(r.bottom+2)+'px';
  }
}

function wireCombo(inp,kind){
  const i=+inp.dataset.i;
  const menu=inp.parentElement.querySelector('.cb-menu');
  const close=()=>{menu.classList.remove('open');menu.innerHTML='';};
  const open=()=>{
    const q=inp.value.toLowerCase().trim();
    let matches;
    if(kind==='cat'){
      // unique categories from products
      const seen=new Set();matches=[];
      PRODUCTS.forEach(p=>{const key=(p.category_name||'')+'|'+(p.category_code||'');
        if(seen.has(key))return;seen.add(key);
        const label=p.category_name||p.category_code||'';
        if(!q||label.toLowerCase().includes(q)||(p.category_code||'').toLowerCase().includes(q))matches.push({label,code:p.category_code,name:p.category_name});
      });
      matches=matches.slice(0,8);
    }else if(kind==='desc'){
      // Product search. The products.description column is boilerplate (2 distinct values
      // across the whole catalogue), so we search NAME + STYLE — what actually identifies a product.
      // Needs 2+ chars so the description can still be typed freely without a menu popping up.
      if(q.length<2){close();return;}
      const terms=q.split(/\s+/).filter(Boolean);
      matches=PRODUCTS.filter(p=>{
        const hay=((p.name||'')+' '+(p.style_number||'')+' '+(p.category_code||'')).toLowerCase();
        return terms.every(t=>hay.includes(t));
      }).slice(0,10);
    }else{
      // styles within the line's chosen category (if any), else all
      const cat=(LINES[i].category_name||'').toLowerCase();
      matches=PRODUCTS.filter(p=>{
        if(cat&&(p.category_name||'').toLowerCase()!==cat)return false;
        if(!q)return true;
        return (p.style_number||'').toLowerCase().includes(q)||(p.name||'').toLowerCase().includes(q);
      }).slice(0,8);
    }
    if(!matches.length){close();return;}
    positionMenu(inp,menu);
    menu.innerHTML=matches.map((m,idx)=>{
      if(kind==='cat')return `<div class="cb-opt" data-idx="${idx}"><span class="cb-main">${esc(m.label)}</span>${m.code?`<span class="cb-side">${esc(m.code)}</span>`:''}</div>`;
      if(kind==='desc'){
        const sup=m.default_supplier_id?SUPPLIERS.find(s=>s.id===m.default_supplier_id):null;
        const supTxt=sup?(sup.short_name||sup.company_name||''):'';
        return `<div class="cb-opt cb-opt-p" data-idx="${idx}">
          <div class="cbp-top"><span class="cbp-name">${esc(m.name||'')}</span><span class="cbp-price">${m.base_price!=null?'$'+Number(m.base_price).toFixed(2):''}</span></div>
          <div class="cbp-sub"><span class="cbp-sku">${esc(m.style_number||'—')}</span>${m.category_code?`<span class="cbp-dot">·</span><span>${esc(m.category_code)}</span>`:''}${supTxt?`<span class="cbp-dot">·</span><span>${esc(supTxt)}</span>`:''}</div>
        </div>`;
      }
      return `<div class="cb-opt" data-idx="${idx}"><span class="cb-main">${esc(m.style_number||'—')}</span><span class="cb-side">${esc(m.name||'')}</span></div>`;
    }).join('');
    menu.classList.add('open');
    menu.querySelectorAll('.cb-opt').forEach(opt=>opt.addEventListener('mousedown',e=>{
      e.preventDefault();const m=matches[+opt.dataset.idx];
      if(kind==='cat'){
        LINES[i].category_name=m.name||m.label;LINES[i].category_code=m.code||null;
        inp.value=m.name||m.label;
        // reset style if it no longer belongs (optional, keep simple: leave as-is)
      }else{
        LINES[i].style_number=m.style_number||'';
        LINES[i].category_name=m.category_name||LINES[i].category_name;
        LINES[i].category_code=m.category_code||LINES[i].category_code;
        LINES[i].description=m.name||LINES[i].description;
        LINES[i].unit=m.unit||LINES[i].unit||'Pc';
        LINES[i].unit_price=m.base_price!=null?m.base_price:LINES[i].unit_price;
        LINES[i].amount=(parseFloat(LINES[i].quantity)||0)*(parseFloat(LINES[i].unit_price)||0);
        LINES[i].net_amount=LINES[i].amount-(LINES[i].amount*((parseFloat(LINES[i].discount_pct)||0)/100));
        // #6 — auto-fill the supplier from the product's default (only if user hasn't already set one)
        if(ORDER.record_type==='order' && m.default_supplier_id && !LINES[i].supplier_id && !(LINES[i]._allocations&&LINES[i]._allocations.length)){
          const sup=SUPPLIERS.find(s=>s.id===m.default_supplier_id);
          if(sup){
            LINES[i].supplier_id=sup.id;
            LINES[i]._supplier_name=sup.short_name||sup.company_name||'';
            LINES[i]._supplier_number=sup.supplier_number;
            // default supplier qty to the order qty if not yet set
            if(LINES[i].supplier_quantity==null||LINES[i].supplier_quantity==='') LINES[i].supplier_quantity=parseFloat(LINES[i].quantity)||0;
          }
        }
        inp.value=(kind==='desc')?(m.name||''):(m.style_number||'');
      }
      close();renderLines();recalc();markDirty();
    }));
  };
  inp.addEventListener('focus',open);
  inp.addEventListener('input',()=>{
    if(inp.dataset.k==='description'){ LINES[i].description=inp.value; }
    else { LINES[i][inp.dataset.k==='category'?'category_name':'style_number']=inp.value; }
    if(inp.dataset.k==='category')LINES[i].category_code=null; // typed custom; clear code unless a pick sets it
    // #6 — if they typed an exact style code, auto-fill supplier from that product's default
    if(inp.dataset.k==='style' && ORDER.record_type==='order'){
      const typed=inp.value.trim().toLowerCase();
      const prod=PRODUCTS.find(p=>(p.style_number||'').toLowerCase()===typed);
      if(prod && prod.default_supplier_id && !LINES[i].supplier_id && !(LINES[i]._allocations&&LINES[i]._allocations.length)){
        const sup=SUPPLIERS.find(s=>s.id===prod.default_supplier_id);
        if(sup){
          LINES[i].supplier_id=sup.id;LINES[i]._supplier_name=sup.short_name||sup.company_name||'';LINES[i]._supplier_number=sup.supplier_number;
          if(LINES[i].supplier_quantity==null||LINES[i].supplier_quantity==='') LINES[i].supplier_quantity=parseFloat(LINES[i].quantity)||0;
          renderLines();
        }
      }
    }
    open();markDirty();
  });
  inp.addEventListener('blur',()=>setTimeout(close,120));
}

    positionMenu(inp,menu);
    menu.innerHTML=matches.map((m,idx)=>`<div class="cb-opt" data-idx="${idx}"><span class="cb-main">${esc(m.short_name||m.company_name||'')}</span><span class="cb-side">#${esc(String(m.supplier_number||''))}</span></div>`).join('');

function autoGrow(el){ if(!el)return; el.style.height='auto'; el.style.height=(el.scrollHeight)+'px'; }
function addLine(){LINES.push({category_code:'',category_name:'',style_number:'',description:'',quantity:1,unit:'Pc',unit_price:0,amount:0,discount_pct:0,net_amount:0,line_order:LINES.length+1});renderLines();markDirty();}

// fulfillment colour system: placed(amber) -> in_po(red) -> issued(grey) -> received(green); backordered(violet); instock(blue); partial(amber)
const FULFILL={placed:'fs-placed',partial:'fs-partial',in_po:'fs-inpo',issued:'fs-issued',received:'fs-verified',backordered:'fs-backordered',instock:'fs-instock'};
const FULFILL_LABEL={placed:'NOT ORDERED',partial:'PARTLY ORDERED',in_po:'ORDERED',issued:'ISSUED',received:'RECEIVED',backordered:'BACK ORDER',instock:'IN STOCK'};
function fulfillState(ln){
  // lines with orders placed: derive from their allocations
  if(ln._allocations&&ln._allocations.length){
    const assigned=ln._allocations.reduce((s,a)=>s+(parseFloat(a.quantity)||0),0);
    const need=parseFloat(ln.quantity)||0;
    // surface any committed allocation status (issued/received/backordered) first
    const statuses=ln._allocations.map(a=>a.status).filter(Boolean);
    if(statuses.includes('backordered')) return 'backordered';
    if(statuses.length && statuses.every(s=>s==='received')) return 'received';
    if(statuses.includes('issued')) return 'issued';
    if(need>0 && assigned<need) return 'partial';   // not the whole order qty is on a PO yet
    return 'in_po';                                  // fully ordered into PO(s)
  }
  const fs=ln.fulfillment_status;
  if(fs&&fs!=='none'&&fs!=='in_po') return fs;        // issued/received/backordered
  if(!ln.supplier_id) return null;
  if(ln.in_po||fs==='in_po') return 'in_po';
  return 'placed';                                    // supplier set, nothing ordered yet
}
function fulfillClass(ln){const s=fulfillState(ln);return s?FULFILL[s]||'':'';}
function fulfillTag(ln){const s=fulfillState(ln);if(!s)return '';return `<span class="fs-pill fs-pill-${s}">${FULFILL_LABEL[s]||''}</span>`;}

// #4 — deleting a sales line: ordered quantities in ISSUED POs stay intact;
// quantities in OPEN POs prompt the user whether to remove those too.
async function deleteLine(i){
  const ln=LINES[i]; if(!ln){return;}
  if(ln.id){
    // find this line's allocations and their PO status
    const {data:allocs}=await db.from('quote_item_allocations').select('id,po_id,purchase_orders(status)').eq('quote_item_id',ln.id);
    const openAllocs=(allocs||[]).filter(a=>a.purchase_orders&&a.purchase_orders.status==='open');
    const issuedAllocs=(allocs||[]).filter(a=>a.purchase_orders&&a.purchase_orders.status&&a.purchase_orders.status!=='open');
    // also catch a non-split line that's directly on a PO
    let directOpen=false, directIssued=false;
    if(!allocs||!allocs.length){
      const {data:pis}=await db.from('po_items').select('id,po_id,purchase_orders(status)').eq('source_quote_item_id',ln.id);
      directOpen=(pis||[]).some(p=>p.purchase_orders&&p.purchase_orders.status==='open');
      directIssued=(pis||[]).some(p=>p.purchase_orders&&p.purchase_orders.status&&p.purchase_orders.status!=='open');
    }
    const hasOpen=openAllocs.length>0||directOpen;
    const hasIssued=issuedAllocs.length>0||directIssued;

    if(hasOpen){
      // prompt: also remove the open-PO quantities?
      const choice=await choiceModal('This line is on a purchase order',
        'This line has quantities ordered in an <b>open</b> purchase order'+(hasIssued?' (and some already issued, which will stay)':'')+'. Do you want to remove the open-PO quantities as well?',[
        {key:'yes',label:'Yes, remove the open-PO quantities too',danger:true},
        {key:'no',label:'No, keep them on the PO'},
        {key:'cancel',label:'Cancel',plain:true}
      ]);
      if(choice==='cancel'||choice==null)return;
      if(choice==='yes'){
        // delete po_items + allocations that are on OPEN POs only
        const openAllocIds=openAllocs.map(a=>a.id);
        if(openAllocIds.length){
          await db.from('po_items').delete().in('source_allocation_id',openAllocIds);
          await db.from('quote_item_allocations').delete().in('id',openAllocIds);
        }
        if(directOpen){
          // remove the direct po_items that are on open POs
          const {data:pis}=await db.from('po_items').select('id,po_id,purchase_orders(status)').eq('source_quote_item_id',ln.id);
          const delIds=(pis||[]).filter(p=>p.purchase_orders&&p.purchase_orders.status==='open').map(p=>p.id);
          if(delIds.length) await db.from('po_items').delete().in('id',delIds);
        }
      }
      // if 'no', leave open-PO lines intact (they become detached records on the PO)
    } else if(hasIssued){
      // only issued quantities -> they stay; just confirm the line removal
      const ok=await confirmModal('Remove this line?','Quantities already issued to a supplier will remain on their purchase order. The line will be removed from this order.',{confirmText:'Remove line',cancelText:'Keep'});
      if(!ok)return;
    }
    // PO records survive a quote_item delete automatically: po_items.source_*_id are
    // ON DELETE SET NULL, so the ordered lines stay on their POs (open or issued),
    // just detached. We only EXPLICITLY remove the open-PO lines if the user chose to.
    // remove the quote_item itself (its allocations cascade away; po_items keep, detached)
    await db.from('quote_items').delete().eq('id',ln.id);
  }
  LINES.splice(i,1);
  renderLines();recalc();markDirty();
}


// Each line tracks ordered qty (allocations) vs supplier qty. You can order the
// balance into open POs repeatedly until nothing is left to order.
let ORD_I=null, ORD_SUP=null, ORD_POS=[], ORD_PLACED=[], ORD_DIRECT=[];
async function openSplit(i){
  if(ORDER.record_type!=='order'){ alertModal('Sales Orders only','Ordering items to a PO is available on Sales Orders only.','info'); return; }
  const ln=LINES[i]; if(!ln){return;}
  if(!ln.id){ alertModal('Save first','Save the order once before ordering this line to a purchase order, so the line has a record to attach to.','info'); return; }
  if(!ln.supplier_id){
    alertModal('Pick a supplier first','Choose the supplier for this line, then order its quantity to a purchase order.','info');
    return;
  }
  if(!(parseFloat(ln.quantity)>0)){
    alertModal('Set an order quantity','Enter the order quantity for this line first.','info');
    return;
  }
  ORD_I=i;
  ORD_SUP={id:ln.supplier_id,name:ln._supplier_name||'',num:ln._supplier_number};
  // load existing allocations (what's already been ordered) + their PO + status
  const {data:allocs}=await db.from('quote_item_allocations').select('*, purchase_orders(po_number,status,order_date)').eq('quote_item_id',ln.id).order('created_at',{ascending:true});
  ORD_PLACED=allocs||[];
  // also count any direct po_items sourced from this line that AREN'T tied to an allocation
  // (so the balance reflects every PO line ever created for this product, per spec).
  const {data:directPis}=await db.from('po_items').select('id,quantity,po_id,source_allocation_id,purchase_orders(po_number,status,order_date)').eq('source_quote_item_id',ln.id);
  ORD_DIRECT=(directPis||[]).filter(p=>!p.source_allocation_id);
  // load this supplier's OPEN POs to order more into
  const {data:pos}=await db.from('purchase_orders').select('id,po_number,order_date').eq('status','open').eq('supplier_id',ORD_SUP.id).order('po_number');
  ORD_POS=pos||[];
  renderOrderModal();
  document.getElementById('split-msg').textContent='';
  document.getElementById('split-overlay').classList.add('open');
}
function closeSplit(){document.getElementById('split-overlay').classList.remove('open');ORD_I=null;}
function orderedSum(){
  const allocSum=ORD_PLACED.reduce((s,a)=>s+(parseFloat(a.quantity)||0),0);
  const directSum=ORD_DIRECT.reduce((s,p)=>s+(parseFloat(p.quantity)||0),0);
  return allocSum+directSum;
}
function renderOrderModal(){
  const ln=LINES[ORD_I]; if(!ln)return;
  const need=parseFloat(ln.quantity)||0;
  const ordered=orderedSum();
  const balance=Math.max(0,need-ordered);
  const fmt=d=>{ if(!d)return ''; const x=new Date(d+'T00:00:00'); return x.toLocaleDateString('en-CA',{month:'short',day:'numeric'}); };

  document.getElementById('split-meta').innerHTML=`<b>${esc(ln.description||ln.style_number||'Line item')}</b><br>Supplier: <b>${esc(ORD_SUP.name||'—')}</b>${ORD_SUP.num?` (#${esc(String(ORD_SUP.num))})`:''}`;

  // balance banner
  const bEl=document.getElementById('order-balance');
  bEl.className='order-balance'+(balance===0?' done':'');
  bEl.innerHTML=`<div class="ob-grid">
      <div class="ob-cell"><span class="ob-n">${need}</span><span class="ob-l">Order Qty</span></div>
      <div class="ob-cell"><span class="ob-n">${ordered}</span><span class="ob-l">Ordered</span></div>
      <div class="ob-cell hl"><span class="ob-n">${balance}</span><span class="ob-l">Still to Order</span></div>
    </div>`;

  // placed orders ledger (allocations + any direct PO lines)
  const pl=document.getElementById('placed-list');
  const allocRows=ORD_PLACED.map(a=>{
    const po=a.purchase_orders||{};
    const locked=po.status&&po.status!=='open';
    return `<div class="pl-row">
      <div class="pl-l"><b>${parseFloat(a.quantity)||0}</b> units → PO #${po.po_number||'—'} <span class="pl-st pl-${(po.status||'open')}">${esc(po.status||'open')}</span></div>
      ${locked?'<span class="pl-lock">issued</span>':`<button class="pl-remove" data-aid="${a.id}" data-pid="${a.po_id||''}">remove</button>`}
    </div>`;
  });
  const directRows=ORD_DIRECT.map(p=>{
    const po=p.purchase_orders||{};
    const locked=po.status&&po.status!=='open';
    return `<div class="pl-row">
      <div class="pl-l"><b>${parseFloat(p.quantity)||0}</b> units → PO #${po.po_number||'—'} <span class="pl-st pl-${(po.status||'open')}">${esc(po.status||'open')}</span></div>
      ${locked?'<span class="pl-lock">issued</span>':`<button class="pl-remove-direct" data-pid2="${p.id}">remove</button>`}
    </div>`;
  });
  const allRows=allocRows.concat(directRows);
  if(allRows.length){
    pl.innerHTML='<div class="pl-h">Already ordered</div>'+allRows.join('');
  }else{
    pl.innerHTML='<div class="pl-empty">Nothing ordered yet.</div>';
  }

  // order-more form
  const form=document.getElementById('order-form');
  if(balance<=0){
    form.style.display='none';
  }else{
    form.style.display='';
    const qi=document.getElementById('of-qty');qi.value=balance;qi.max=balance;
    const sel=document.getElementById('of-po');
    if(ORD_POS.length){
      sel.innerHTML=ORD_POS.map(p=>`<option value="${p.id}">PO #${p.po_number}${p.order_date?' · '+fmt(p.order_date):''}</option>`).join('');
      sel.disabled=false;
      document.getElementById('of-add').disabled=false;
    }else{
      sel.innerHTML='<option value="">No open PO for this supplier</option>';
      sel.disabled=true;
      document.getElementById('of-add').disabled=true;
      document.getElementById('split-msg').innerHTML='<span style="color:var(--text-3)">Create an open PO for '+esc(ORD_SUP.name)+' to order the balance.</span>';
    }
  }
  // wire remove buttons
  pl.querySelectorAll('.pl-remove').forEach(btn=>btn.addEventListener('click',()=>removePlaced(btn.dataset.aid,btn.dataset.pid)));
  pl.querySelectorAll('.pl-remove-direct').forEach(btn=>btn.addEventListener('click',()=>removeDirect(btn.dataset.pid2)));
}
async function addOrderToPO(){
  const ln=LINES[ORD_I]; if(!ln)return;
  const need=parseFloat(ln.quantity)||0;
  const balance=need-orderedSum();
  const qty=parseFloat(document.getElementById('of-qty').value)||0;
  const poId=document.getElementById('of-po').value;
  const msg=document.getElementById('split-msg');
  if(!(qty>0)){msg.textContent='Enter a quantity greater than 0.';return;}
  if(qty>balance){msg.textContent='You can order at most '+balance+' more — the order quantity is '+need+' and '+orderedSum()+' is already on a PO.';return;}
  if(!poId){msg.textContent='Choose which open PO to order into.';return;}
  // 1) create the allocation (the order record)
  const {data:alloc,error:ae}=await db.from('quote_item_allocations').insert({
    quote_item_id:ln.id, supplier_id:ORD_SUP.id, quantity:qty, in_po:true, po_id:poId, status:'in_po'
  }).select().single();
  if(ae){msg.textContent='Could not save: '+ae.message;return;}
  // 2) add the matching po_item to the chosen PO
  await db.from('po_items').insert({
    po_id:poId, source_quote_item_id:null, source_allocation_id:alloc.id,
    style_number:ln.style_number||null, category_name:ln.category_name||null,
    part_no:ln.style_number||null, product_name:ln.description||null, description:ln.description||null,
    quantity:qty, rate:Number(ln.unit_price)||0, amount:qty*(Number(ln.unit_price)||0),
    ordered_for:ORDER.stage_id?String(ORDER.stage_id):null, status:'issued'
  });
  // 3) reflect on the line (it now has at least one ordered portion)
  await db.from('quote_items').update({in_po:true,po_id:poId,fulfillment_status:'in_po'}).eq('id',ln.id);
  // refresh the modal's data
  const {data:allocs}=await db.from('quote_item_allocations').select('*, purchase_orders(po_number,status,order_date)').eq('quote_item_id',ln.id).order('created_at',{ascending:true});
  ORD_PLACED=allocs||[];
  msg.textContent='';
  await reloadLineFromDb(ln);
  renderOrderModal();
}
async function removeDirect(poItemId){
  const ok=await confirmModal('Remove from PO?','This removes the ordered quantity from that open purchase order and returns it to the balance.',{confirmText:'Remove',cancelText:'Keep',danger:true});
  if(!ok)return;
  await db.from('po_items').delete().eq('id',poItemId);
  const ln=LINES[ORD_I];
  const {data:directPis}=await db.from('po_items').select('id,quantity,po_id,source_allocation_id,purchase_orders(po_number,status,order_date)').eq('source_quote_item_id',ln.id);
  ORD_DIRECT=(directPis||[]).filter(p=>!p.source_allocation_id);
  if(!ORD_PLACED.length && !ORD_DIRECT.length){ await db.from('quote_items').update({in_po:false,po_id:null,fulfillment_status:'none'}).eq('id',ln.id); }
  await reloadLineFromDb(ln);
  renderOrderModal();
}
async function removePlaced(allocId,poId){
  const ok=await confirmModal('Remove from PO?','This removes the ordered quantity from that open purchase order and returns it to the balance.',{confirmText:'Remove',cancelText:'Keep',danger:true});
  if(!ok)return;
  // delete the po_item, then the allocation
  await db.from('po_items').delete().eq('source_allocation_id',allocId);
  await db.from('quote_item_allocations').delete().eq('id',allocId);
  const ln=LINES[ORD_I];
  const {data:allocs}=await db.from('quote_item_allocations').select('*, purchase_orders(po_number,status,order_date)').eq('quote_item_id',ln.id).order('created_at',{ascending:true});
  ORD_PLACED=allocs||[];
  // if nothing left ordered, clear the line's in_po flag
  if(!ORD_PLACED.length){ await db.from('quote_items').update({in_po:false,po_id:null,fulfillment_status:'none'}).eq('id',ln.id); }
  await reloadLineFromDb(ln);
  renderOrderModal();
}

  }

  if(ORDER.record_type==='order'){
    const missing=LINES.filter(l=>l.supplier_id && !(l._allocations&&l._allocations.length) && (l.supplier_quantity==null||l.supplier_quantity===''));
    if(missing.length && !silent){
