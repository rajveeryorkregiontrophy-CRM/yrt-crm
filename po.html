<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchase Order — YRT CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;--sidebar:#0a0c0f;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#c4cad6;--text-3:#9098a8;
    --brass:#e7ebf3;--brass-2:#f4f6fb;--approved:#3ddc84;--danger:#ff4d4d;--process:#3da5ff;
    --radius:11px;--radius-sm:8px;
    --fd:'Archivo',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg);}
  .topbar{height:58px;background:var(--bg-2);border-bottom:2px solid var(--line-2);display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:30;}
  .back{display:inline-flex;align-items:center;gap:7px;color:var(--text-2);text-decoration:none;font-weight:700;font-size:13px;padding:7px 11px;border-radius:var(--radius-sm);border:1px solid var(--line-2);background:var(--bg-3);}
  .back:hover{border-color:var(--brass);color:var(--brass-2);}
  .title{font-family:var(--fd);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:16px;}
  .title .id{color:var(--brass-2);}
  .actions{margin-left:auto;display:flex;gap:8px;}
  .btn{padding:8px 14px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text);display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{border-color:var(--brass);}
  .btn-brass{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;}
  .btn-brass:hover{filter:brightness(1.08);}
  .btn-dark{background:#fff;color:#15171c;border:none;}

  .wrap{max-width:1180px;margin:0 auto;padding:22px 24px 90px;}
  .card{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;}
  .card-h{padding:13px 18px;border-bottom:2px solid var(--line-2);display:flex;align-items:center;gap:10px;}
  .card-h h3{font-family:var(--fd);font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#aab2c4;}
  .card-b{padding:18px;}
  .grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;margin-bottom:5px;}
  input.in,select.in{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:var(--radius-sm);padding:9px 11px;font-size:13.5px;font-family:inherit;color:var(--text);}
  input.in:focus,select.in:focus{outline:none;border-color:var(--brass);}

  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#aab0c0;font-weight:700;padding:10px;border-bottom:2px solid var(--line-2);background:var(--bg-3);}
  thead th.num{text-align:right;}
  tbody td{padding:5px 7px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  .li{width:100%;border:1px solid transparent;background:transparent;padding:7px;border-radius:5px;font-size:13px;font-family:inherit;color:var(--text);}
  .li:hover{border-color:var(--line-2);}
  .li:focus{outline:none;border-color:var(--brass);background:var(--bg);}
  .li.num{text-align:right;font-family:var(--fm);}
  .li-amt{text-align:right;font-family:var(--fm);font-weight:700;font-size:13px;padding-right:10px;white-space:nowrap;}
  .from-order{display:flex;flex-direction:column;gap:1px;}
  .fo-input{width:100%;background:var(--paper);border:1px solid var(--line);color:var(--ink);border-radius:5px;padding:6px 8px;font-size:12.5px;font-family:inherit;}
  .fo-input:focus{outline:none;border-color:var(--brass);}
  .ro{font-size:13px;color:var(--text-2);}
  .st-cell{vertical-align:middle;}
  .st-badge{display:inline-block;font-size:10.5px;font-weight:800;padding:4px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.03em;}
  .st-actions{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
  .st-act{font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text-3);cursor:pointer;font-family:inherit;}
  .st-act:hover{border-color:var(--brass);color:var(--text);}
  .st-act.ok:hover{border-color:#3ddc84;color:#3ddc84;}
  .st-act.bad:hover{border-color:#b06bff;color:#b06bff;}
  .fo-num{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--brass-2);}
  .fo-name{font-size:11.5px;color:var(--text-2);}
  .fo-manual{font-size:11.5px;color:var(--text-3);font-style:italic;}
  .li-del{border:none;background:transparent;color:var(--text-3);cursor:pointer;padding:5px;border-radius:5px;font-size:15px;}
  .li-del:hover{background:rgba(255,77,77,.15);color:var(--danger);}
  .add-line{margin:12px 18px;padding:9px;width:calc(100% - 36px);border:1px dashed var(--line-2);background:transparent;border-radius:var(--radius-sm);color:var(--text-3);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
  .add-line:hover{border-color:var(--brass);color:var(--brass-2);}
  .totbar{display:flex;justify-content:flex-end;gap:24px;padding:14px 18px;border-top:2px solid var(--line-2);background:var(--bg-3);}
  .totbar .t .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;}
  .totbar .t .v{font-family:var(--fd);font-weight:800;font-size:18px;color:var(--brass-2);margin-top:2px;}
  .state{padding:50px;text-align:center;color:var(--text-3);}
  .save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg-2);border-top:2px solid var(--line-2);padding:12px 24px;display:flex;align-items:center;gap:12px;justify-content:flex-end;z-index:40;}
  .save-bar .msg{margin-right:auto;font-size:13px;color:var(--text-3);}
  .save-bar .msg.ok{color:var(--approved);}.save-bar .msg.err{color:var(--danger);}
  .pobadge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px;border-radius:6px;font-family:var(--fd);}
  .pob-open{background:rgba(202,167,93,.2);color:var(--brass-2);}
  .pob-sent{background:rgba(61,165,255,.18);color:var(--process);}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="index.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Inbox</a>
  <div class="title">Purchase Order <span class="id" id="t-id">#----</span></div>
  <span class="pobadge pob-open" id="t-badge">Open</span>
  <div class="actions">
    <button class="btn-dark btn" id="btn-pdf">Save as PDF &amp; Send</button>
  </div>
</header>

<div class="wrap" id="wrap"><div class="state">Loading purchase order…</div></div>

<template id="tpl">
  <div class="card">
    <div class="card-h"><h3>Purchase Order Details</h3></div>
    <div class="card-b">
      <div class="grid2">
        <div class="field"><label>Supplier</label><select class="in" id="i-supplier"></select></div>
        <div class="field"><label>Subject</label><input class="in" id="i-subject" placeholder="e.g. Medal restock"></div>
        <div class="field"><label>Order Date</label><input type="date" class="in" id="i-date"></div>
        <div class="field"><label>In-Hand Date</label><input type="date" class="in" id="i-inhand"></div>
        <div class="field"><label>Dispatch Mode</label><select class="in" id="i-dispatch"><option value="pickup">Pick-Up</option><option value="dispatch">Dispatch</option></select></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-h"><h3>Products on this PO</h3></div>
    <table>
      <thead><tr>
        <th style="width:90px;">Part No.</th><th>Product</th>
        <th class="num" style="width:70px;">Qty</th>
        <th class="num" style="width:90px;">Rate</th>
        <th class="num" style="width:100px;">Amount</th>
        <th style="width:160px;">From Order</th>
        <th id="th-last" style="width:34px;"></th>
      </tr></thead>
      <tbody id="lines"></tbody>
      <datalist id="fo-opts"><option value="Stock"></option><option value="Sample"></option></datalist>
    </table>
    <button class="add-line" id="add-line">+ Add product</button>
    <div class="totbar"><div class="t"><div class="l">Total</div><div class="v" id="t-total">$0.00</div></div></div>
  </div>
</template>

<div class="save-bar">
  <span class="msg" id="msg">No changes</span>
  <button class="btn" onclick="location.href='index.html'">Cancel</button>
  <button class="btn-brass btn" id="btn-save">Save PO</button>
</div>

<script type="module">
import { supabase as db, requireAuth, signOut, currentUser } from './auth.js';
await requireAuth();
const money=n=>'$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};
const PO_ID=new URLSearchParams(location.search).get('id');
let PO=null,LINES=[],SUP=[],QUOTES=[],DIRTY=false;
const dirty=()=>{DIRTY=true;const m=document.getElementById('msg');m.textContent='Unsaved changes';m.className='msg';};

async function load(){
  if(!PO_ID){document.getElementById('wrap').innerHTML='<div class="state">No PO specified.</div>';return;}
  const {data,error}=await db.from('purchase_orders').select('*').eq('id',PO_ID).single();
  if(error||!data){document.getElementById('wrap').innerHTML=`<div class="state">Couldn't load PO. ${error?.message||''}</div>`;return;}
  PO=data;
  const {data:items}=await db.from('po_items').select('*').eq('po_id',PO_ID).order('line_order');
  LINES=items||[];
  SUP=(await db.from('suppliers').select('id,short_name').order('short_name')).data||[];
  QUOTES=(await db.from('quotes').select('id,stage_id,subject,clients(company_name)').eq('record_type','order').order('stage_id',{ascending:false}).limit(200)).data||[];
  render();
}

function orderName(stageId){
  const o=QUOTES.find(x=>String(x.stage_id)===String(stageId));
  return o?(o.clients?.company_name||''):'';
}

function render(){
  const w=document.getElementById('wrap');w.innerHTML='';w.appendChild(document.getElementById('tpl').content.cloneNode(true));
  document.getElementById('t-id').textContent='#'+PO.po_number;
  const badge=document.getElementById('t-badge');badge.textContent=PO.status;badge.className='pobadge '+(PO.status==='open'?'pob-open':'pob-sent');

  const sup=document.getElementById('i-supplier');
  sup.innerHTML='<option value="">— Select supplier —</option>'+SUP.map(s=>`<option value="${s.id}" ${PO.supplier_id===s.id?'selected':''}>${esc(s.short_name)}</option>`).join('');
  sup.onchange=()=>{PO.supplier_id=sup.value||null;dirty();};

  const subj=document.getElementById('i-subject');subj.value=PO.subject||'';subj.oninput=()=>{PO.subject=subj.value;dirty();};
  const dt=document.getElementById('i-date');dt.value=PO.order_date||'';dt.addEventListener('click',()=>{try{dt.showPicker&&dt.showPicker();}catch(e){}});dt.onchange=()=>{PO.order_date=dt.value||null;dirty();};
  const ih=document.getElementById('i-inhand');ih.value=PO.in_hand_date||'';ih.addEventListener('click',()=>{try{ih.showPicker&&ih.showPicker();}catch(e){}});ih.onchange=()=>{PO.in_hand_date=ih.value||null;dirty();};
  const dm=document.getElementById('i-dispatch');dm.value=PO.dispatch_mode||'pickup';dm.onchange=()=>{PO.dispatch_mode=dm.value;dirty();};

  document.getElementById('add-line').onclick=addLine;
  document.getElementById('btn-save').onclick=()=>save(false);
  document.getElementById('btn-pdf').onclick=savePDF;
  renderLines();

  // sent/received/etc POs are view-only — lock all editing
  if(PO.status!=='open'){ applyViewOnly(); }
}

function applyViewOnly(){
  // disable every input/select in the editor
  document.querySelectorAll('#wrap input, #wrap select').forEach(el=>{el.disabled=true;el.style.opacity='.85';el.style.cursor='default';});
  // hide add-line and save buttons
  const add=document.getElementById('add-line'); if(add) add.style.display='none';
  const save=document.getElementById('btn-save'); if(save) save.style.display='none';
  // repurpose the PDF button to just re-download (still allowed), relabel
  const pdf=document.getElementById('btn-pdf'); if(pdf) pdf.textContent='Save as PDF';
  // remove per-line delete buttons
  document.querySelectorAll('.li-del').forEach(b=>b.style.display='none');
  // show a view-only banner
  if(!document.getElementById('vo-banner')){
    const b=document.createElement('div');b.id='vo-banner';
    b.style.cssText='background:rgba(61,165,255,.12);border:1px solid rgba(61,165,255,.35);color:#9ccbff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;margin-bottom:14px;';
    b.innerHTML='🔒 This Purchase Order has been sent and is view-only. No further changes can be made.';
    const wrap=document.getElementById('wrap'); if(wrap&&wrap.firstChild) wrap.insertBefore(b,wrap.firstChild);
  }
}

const ST_INFO={
  issued:{label:'Issued',color:'#8a92a2',bg:'rgba(138,146,162,.16)'},
  arrived:{label:'Arrived',color:'#ffb627',bg:'rgba(255,182,39,.16)'},
  verified:{label:'Verified',color:'#3ddc84',bg:'rgba(61,220,132,.16)'},
  backordered:{label:'Back Ordered',color:'#b06bff',bg:'rgba(176,107,255,.16)'}
};
function stBadge(s){const i=ST_INFO[s]||ST_INFO.issued;return `<span class="st-badge" style="color:${i.color};background:${i.bg};">${i.label}</span>`;}

function renderLines(){
  const tb=document.getElementById('lines');tb.innerHTML='';
  const sent=PO.status!=='open';
  const thLast=document.getElementById('th-last');
  if(thLast){ thLast.textContent=sent?'Status':''; thLast.style.width=sent?'200px':'34px'; }
  LINES.forEach((l,i)=>{
    const tr=document.createElement('tr');
    if(sent){
      // verification mode: read-only + status + verify/backorder controls
      const st=l.status||'issued';
      tr.innerHTML=`
        <td><span class="ro">${esc(l.part_no||'')}</span></td>
        <td><span class="ro">${esc(l.product_name||'')}</span></td>
        <td><span class="ro">${l.quantity??''}</span></td>
        <td><span class="ro">${money(l.rate)}</span></td>
        <td class="li-amt">${money(l.amount)}</td>
        <td><div class="from-order">${l.ordered_for?`<span class="fo-num">#${esc(String(l.ordered_for))}</span>${orderName(l.ordered_for)?`<span class="fo-name">${esc(orderName(l.ordered_for))}</span>`:''}`:'<span class="fo-name">—</span>'}</div></td>
        <td class="st-cell">${stBadge(st)}
          <div class="st-actions">
            ${st!=='arrived'?`<button class="st-act" data-act="arrived" data-i="${i}">Mark Arrived</button>`:''}
            ${st!=='verified'?`<button class="st-act ok" data-act="verified" data-i="${i}">Verify</button>`:''}
            ${st!=='backordered'?`<button class="st-act bad" data-act="backordered" data-i="${i}">Back Order</button>`:''}
          </div>
        </td>`;
    }else{
      tr.innerHTML=`
        <td><input class="li" data-i="${i}" data-k="part_no" value="${esc(l.part_no||'')}" placeholder="Part #"></td>
        <td><input class="li" data-i="${i}" data-k="product_name" value="${esc(l.product_name||'')}" placeholder="Product name / description"></td>
        <td><input class="li num" data-i="${i}" data-k="quantity" value="${l.quantity??''}" placeholder="0"></td>
        <td><input class="li num" data-i="${i}" data-k="rate" value="${l.rate??''}" placeholder="0.00"></td>
        <td class="li-amt">${money(l.amount)}</td>
        <td><div class="from-order">${l.source_quote_item_id?`<span class="fo-num">#${esc(String(l.ordered_for||''))}</span>${orderName(l.ordered_for)?`<span class="fo-name">${esc(orderName(l.ordered_for))}</span>`:''}`:`<input class="li fo-input" list="fo-opts" data-i="${i}" data-k="ordered_for" value="${esc(l.ordered_for||'')}" placeholder="Stock / Sample / …">`}</div></td>
        <td><button class="li-del" data-del="${i}">×</button></td>`;
    }
    tb.appendChild(tr);
  });
  if(!sent){
    tb.querySelectorAll('.li').forEach(inp=>inp.addEventListener('input',()=>{
      const i=+inp.dataset.i,k=inp.dataset.k;let v=inp.value;
      if(k==='quantity'||k==='rate')v=parseFloat(v)||0;
      LINES[i][k]=v;LINES[i].amount=(parseFloat(LINES[i].quantity)||0)*(parseFloat(LINES[i].rate)||0);
      inp.closest('tr').querySelector('.li-amt').textContent=money(LINES[i].amount);
      recalc();dirty();
    }));
    tb.querySelectorAll('.li-del').forEach(b=>b.addEventListener('click',()=>{LINES.splice(+b.dataset.del,1);renderLines();recalc();dirty();}));
  }else{
    tb.querySelectorAll('.st-act').forEach(b=>b.addEventListener('click',()=>markItemStatus(+b.dataset.i,b.dataset.act)));
  }
  recalc();
}

async function markItemStatus(i,status){
  const l=LINES[i]; if(!l||!l.id)return;
  const patch={status};
  if(status==='verified'){patch.verified_at=new Date().toISOString();}
  const {error}=await db.from('po_items').update(patch).eq('id',l.id);
  if(error){return;}
  l.status=status;
  // propagate to the source sales-order line item / allocation so it recolours
  if(l.source_allocation_id){
    await db.from('quote_item_allocations').update({status}).eq('id',l.source_allocation_id);
  }
  if(l.source_quote_item_id){
    await db.from('quote_items').update({fulfillment_status:status}).eq('id',l.source_quote_item_id);
  }
  renderLines();
}
function addLine(){LINES.push({part_no:'',product_name:'',quantity:1,rate:0,amount:0,ordered_for:'',line_order:LINES.length+1});renderLines();dirty();}
function recalc(){document.getElementById('t-total').textContent=money(LINES.reduce((s,l)=>s+(parseFloat(l.amount)||0),0));}

async function save(silent){
  const msg=document.getElementById('msg');msg.textContent='Saving…';msg.className='msg';
  const {error:e1}=await db.from('purchase_orders').update({supplier_id:PO.supplier_id,subject:PO.subject,order_date:PO.order_date,in_hand_date:PO.in_hand_date,dispatch_mode:PO.dispatch_mode,status:PO.status}).eq('id',PO_ID);
  if(e1){msg.textContent='Error: '+e1.message;msg.className='msg err';return false;}
  await db.from('po_items').delete().eq('po_id',PO_ID);
  if(LINES.length){
    const rows=LINES.map((l,idx)=>({po_id:PO_ID,line_order:idx+1,part_no:l.part_no||null,product_name:l.product_name||null,quantity:parseFloat(l.quantity)||0,rate:parseFloat(l.rate)||0,amount:parseFloat(l.amount)||0,ordered_for:l.ordered_for||null}));
    const {error:e2}=await db.from('po_items').insert(rows);
    if(e2){msg.textContent='Lines error: '+e2.message;msg.className='msg err';return false;}
  }
  DIRTY=false;if(!silent){msg.textContent='Saved ✓';msg.className='msg ok';}
  return true;
}

async function savePDF(){
  if(!LINES.length){ await pConfirm('No items','Add at least one product before sending this PO.',{confirmText:'OK',cancelText:'Close',type:'warn'}); return; }
  const alreadySent = PO.status!=='open';
  if(!alreadySent){
    const ok=await pConfirm('Proceed with this PO?','Are you sure you want to proceed? This Purchase Order uses <b>wholesale prices only</b>.',{confirmText:'Yes, proceed',cancelText:'Cancel',type:'warn'});
    if(!ok)return;
    await save(true);   // persist edits before generating
  }
  let mod;
  try{ mod=await import('./pdf.js'); }
  catch(err){ await pConfirm('Couldn’t load','The PDF generator (pdf.js) didn’t load.',{confirmText:'OK',cancelText:'Close',type:'warn'}); return; }
  const sup=SUP.find(s=>s.id===PO.supplier_id)||{};
  const payload={
    number:String(PO.po_number), date:PO.order_date, servicedBy:'', hideUnitPrice:true,
    client:{company:sup.short_name||'', lines:[], tel:'', email:''},
    items:LINES.map(l=>({category:l.category_name||'',code:l.part_no||l.style_number||'',description:l.product_name||l.description||'',qty:l.quantity,unit:'Pc',unitPrice:l.rate,amount:(parseFloat(l.quantity)||0)*(parseFloat(l.rate)||0),discountPct:0})),
    subtotal:LINES.reduce((s,l)=>s+((parseFloat(l.quantity)||0)*(parseFloat(l.rate)||0)),0),
    hst:0, grandTotal:LINES.reduce((s,l)=>s+((parseFloat(l.quantity)||0)*(parseFloat(l.rate)||0)),0)
  };
  if(alreadySent){ await mod.makePDF('PURCHASE ORDER',payload); return; }   // re-download only
  while(true){
    const saved=await mod.makePDF('PURCHASE ORDER',payload);   // saves as "Purchase Order.pdf"
    if(!saved)return;   // user cancelled the OS save dialog
    const done=await pConfirm('Purchase Order saved','Did the Purchase Order save successfully? Marking it complete will set this PO to <b>Sent</b> and remove it from Open POs.',{confirmText:'Complete',cancelText:'Not yet',type:'info'});
    if(done){
      PO.status='sent';
      await save(true);
      // mark all PO items 'issued' and recolour the source sales-order lines / allocations grey
      await db.from('po_items').update({status:'issued'}).eq('po_id',PO_ID);
      const qiIds=LINES.map(l=>l.source_quote_item_id).filter(Boolean);
      if(qiIds.length) await db.from('quote_items').update({fulfillment_status:'issued'}).in('id',qiIds);
      const allocIds=LINES.map(l=>l.source_allocation_id).filter(Boolean);
      if(allocIds.length) await db.from('quote_item_allocations').update({status:'issued'}).in('id',allocIds);
      document.getElementById('msg').textContent='PO marked sent ✓';document.getElementById('msg').className='msg ok';
      setTimeout(()=>location.href='po-list.html',700);
      return;
    }
    // "Not yet" -> loop and re-open the save dialog
  }
}

window.addEventListener('beforeunload',e=>{if(DIRTY){e.preventDefault();e.returnValue='';}});
load();

// ---- lightweight modal system ----
function ensureModal(){
  if(document.getElementById('pmodal-ov'))return;
  const css=document.createElement('style');
  css.textContent=`#pmodal-ov{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:400;padding:20px;}#pmodal-ov.open{display:flex;}#pmodal{background:#16181d;border:1px solid #414a5c;border-radius:14px;width:100%;max-width:410px;overflow:hidden;}#pmodal .ph{display:flex;gap:13px;align-items:flex-start;padding:22px 24px 0;}#pmodal .pi{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;}#pmodal .pi.warn{background:rgba(255,182,39,.15);color:#ffb627;}#pmodal .pi.info{background:rgba(61,165,255,.15);color:#3da5ff;}#pmodal .pi svg{width:22px;height:22px;}#pmodal .pt{font-family:Archivo,sans-serif;font-weight:800;font-size:16px;color:#eef0f4;margin-bottom:5px;}#pmodal .pm{font-size:13.5px;color:#c4cad6;line-height:1.5;}#pmodal .pf{display:flex;gap:10px;padding:20px 24px 22px;justify-content:flex-end;}#pmodal .pb{padding:10px 17px;border-radius:8px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid #414a5c;background:#1f2229;color:#eef0f4;}#pmodal .pb:hover{border-color:#9098a8;}#pmodal .pb.primary{background:#f4f6fb;color:#15171c;border-color:#f4f6fb;}#pmodal .pb.plain{background:transparent;border-color:transparent;color:#9098a8;}`;
  document.head.appendChild(css);
  const ov=document.createElement('div');ov.id='pmodal-ov';
  ov.innerHTML=`<div id="pmodal"><div class="ph"><div class="pi warn" id="pmodal-ico"></div><div><div class="pt" id="pmodal-title"></div><div class="pm" id="pmodal-msg"></div></div></div><div class="pf" id="pmodal-foot"></div></div>`;
  document.body.appendChild(ov);
}
const PICONS={warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'};
function pConfirm(title,msg,{confirmText='Confirm',cancelText='Cancel',type='warn'}={}){
  ensureModal();
  return new Promise(resolve=>{
    document.getElementById('pmodal-ico').className='pi '+type;
    document.getElementById('pmodal-ico').innerHTML=PICONS[type]||PICONS.warn;
    document.getElementById('pmodal-title').textContent=title;
    document.getElementById('pmodal-msg').innerHTML=msg;
    const foot=document.getElementById('pmodal-foot');
    foot.innerHTML=`<button class="pb plain" id="pm-cancel">${esc(cancelText)}</button><button class="pb primary" id="pm-ok">${esc(confirmText)}</button>`;
    const ov=document.getElementById('pmodal-ov');
    const close=v=>{ov.classList.remove('open');resolve(v);};
    foot.querySelector('#pm-ok').onclick=()=>close(true);
    foot.querySelector('#pm-cancel').onclick=()=>close(false);
    ov.onclick=e=>{if(e.target===ov)close(false);};
    ov.classList.add('open');
  });
}
</script>
