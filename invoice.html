<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice — YRT CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#c4cad6;--text-3:#9098a8;
    --brass:#e7ebf3;--brass-2:#f4f6fb;--paid:#3ddc84;--partial:#ffb627;--unpaid:#ff6b35;--danger:#ff4d4d;
    --radius:11px;--radius-sm:8px;
    --fd:'Archivo',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg);}
  .topbar{height:58px;background:var(--bg-2);border-bottom:2px solid var(--line-2);display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:30;}
  .back{display:inline-flex;align-items:center;gap:7px;color:var(--text-2);text-decoration:none;font-weight:700;font-size:13px;padding:7px 11px;border-radius:var(--radius-sm);border:1px solid var(--line-2);background:var(--bg-3);}
  .back:hover{border-color:var(--brass);color:var(--brass-2);}
  .title{font-family:var(--fd);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:16px;}
  .title .id{color:var(--brass-2);}
  .actions{margin-left:auto;display:flex;gap:8px;}
  .btn{padding:8px 14px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text);}
  .btn:hover{border-color:var(--brass);}
  .btn-dark{background:#fff;color:#15171c;border:none;}
  .badge-pay{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;padding:5px 11px;border-radius:7px;text-transform:uppercase;font-family:var(--fd);}
  .pay-unpaid{background:var(--unpaid);color:#1a0f08;}.pay-partial{background:var(--partial);color:#231803;}.pay-paid{background:var(--paid);color:#04130a;}
  .wrap{max-width:1080px;margin:0 auto;padding:22px 24px 70px;}
  .grid{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start;}
  @media(max-width:920px){.grid{grid-template-columns:1fr;}}
  .col-main,.col-side{display:flex;flex-direction:column;gap:18px;}
  .col-main .card,.col-side .card{margin-bottom:0;}
  /* bill-to block */
  .billto{display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;}
  .bt-left{min-width:200px;}
  .bt-company{font-family:var(--fd);font-weight:800;font-size:16px;color:var(--text);margin-bottom:6px;}
  .bt-lines{font-size:13px;color:var(--text-2);line-height:1.6;}
  .bt-contact{font-size:12px;color:var(--text-3);margin-top:8px;}
  .bt-right{display:flex;flex-direction:column;gap:11px;min-width:200px;}
  .bt-meta{display:flex;justify-content:space-between;gap:16px;}
  .bt-meta .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:700;}
  .bt-meta .v{font-size:13px;font-weight:600;color:var(--text);text-align:right;}
  /* totals under the line items, right-aligned like a real invoice */
  .inv-totals{margin-left:auto;width:320px;padding:14px 18px 18px;border-top:1px solid var(--line);}
  .inv-totals .it-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13.5px;}
  .inv-totals .it-row .l{color:var(--text-2);}
  .inv-totals .it-row .v{font-family:var(--fm);font-weight:700;}
  .inv-totals .grand{border-top:1px solid var(--line-2);margin-top:6px;padding-top:11px;}
  .inv-totals .grand .l{font-family:var(--fd);font-weight:800;text-transform:uppercase;font-size:13px;color:var(--text);}
  .inv-totals .grand .v{font-family:var(--fd);font-weight:800;font-size:19px;color:var(--brass-2);}
  .inv-totals .paid .v{color:var(--paid);}
  .inv-totals .bal{border-top:1px dashed var(--line);margin-top:6px;padding-top:10px;}
  .inv-totals .bal .l{font-weight:700;color:var(--text);}
  .inv-totals .bal .v{color:var(--unpaid);font-size:15px;}
  .card{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;}
  .card-h{padding:13px 18px;border-bottom:2px solid var(--line-2);}
  .card-h h3{font-family:var(--fd);font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#aab2c4;}
  .card-b{padding:18px;}
  .field{margin-bottom:13px;}.field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;margin-bottom:4px;}
  .field .val{font-weight:600;}.field .val.big{font-family:var(--fd);font-size:18px;font-weight:800;}
  .frow{display:flex;gap:20px;}.frow .field{flex:1;}
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#aab0c0;font-weight:700;padding:9px 10px;border-bottom:2px solid var(--line-2);background:var(--bg-3);}
  thead th.num{text-align:right;}
  tbody td{padding:10px;border-bottom:1px solid var(--line);font-size:13px;}
  tbody tr:last-child td{border-bottom:none;}
  .num{text-align:right;font-family:var(--fm);}
  .totals .t-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13.5px;}
  .totals .t-row .l{color:var(--text-2);}.totals .t-row .v{font-family:var(--fm);font-weight:700;}
  .totals .grand{border-top:2px solid var(--text);margin-top:6px;padding-top:11px;}
  .totals .grand .l{font-family:var(--fd);font-weight:800;text-transform:uppercase;font-size:13px;}
  .totals .grand .v{font-family:var(--fd);font-weight:800;font-size:20px;color:var(--brass-2);}
  .totals .bal .v{color:var(--unpaid);}
  input.in,select.in{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:var(--radius-sm);padding:9px 11px;font-size:13.5px;font-family:inherit;color:var(--text);}
  input.in:focus{outline:none;border-color:var(--brass);}
  .pay-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .pay-row:last-child{border-bottom:none;}
  .pay-amt{font-family:var(--fm);font-weight:700;color:var(--paid);}
  .add-pay{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:12px;align-items:end;}
  .btn-brass{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;}
  .state{padding:50px;text-align:center;color:var(--text-3);}
  .msg{font-size:12.5px;margin-top:8px;}.msg.ok{color:var(--paid);}.msg.err{color:var(--danger);}
  /* status hero */
  .inv-hero{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);padding:22px 24px;margin-bottom:18px;display:flex;align-items:center;gap:28px;flex-wrap:wrap;}
  .inv-hero .ih-bal{display:flex;flex-direction:column;gap:3px;}
  .inv-hero .ih-bal .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;}
  .inv-hero .ih-bal .amt{font-family:var(--fd);font-weight:900;font-size:30px;letter-spacing:-.01em;}
  .inv-hero .ih-bal .amt.due{color:var(--unpaid);}.inv-hero .ih-bal .amt.clear{color:var(--paid);}
  .inv-hero .ih-div{width:1px;align-self:stretch;background:var(--line);}
  .inv-hero .ih-meta{display:flex;gap:26px;flex-wrap:wrap;}
  .inv-hero .ih-meta .m{display:flex;flex-direction:column;gap:3px;}
  .inv-hero .ih-meta .m .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;}
  .inv-hero .ih-meta .m .v{font-weight:600;font-size:13.5px;}
  .inv-hero .ih-meta .m .v.over{color:var(--danger);}
  .inv-hero .ih-status{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  .pay-overdue{background:var(--danger);color:#fff;}
  .progress{width:100%;height:7px;background:var(--bg-4);border-radius:5px;overflow:hidden;margin-top:4px;}
  .progress .bar{height:100%;background:var(--paid);transition:width .3s;}
  /* payment form */
  .pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
  .pf-grid .full{grid-column:1 / -1;}
  .pf-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:700;margin-bottom:4px;}
  .pf-field .req{color:var(--unpaid);}
  .pay-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;gap:10px;}
  .pay-row:last-child{border-bottom:none;}
  .pay-row .pr-meta{display:flex;flex-direction:column;gap:2px;}
  .pay-row .pr-method{font-weight:600;color:var(--text);}
  .pay-row .pr-sub{font-size:11px;color:var(--text-3);}
  .pay-row .pr-right{display:flex;align-items:center;gap:10px;}
  .pay-amt{font-family:var(--fm);font-weight:700;color:var(--paid);}
  .pay-del{background:transparent;border:none;color:var(--text-3);cursor:pointer;font-size:15px;padding:2px 5px;border-radius:5px;}
  .pay-del:hover{background:rgba(255,77,77,.15);color:var(--danger);}
  .pay-empty{color:var(--text-3);font-size:13px;padding:10px 0;text-align:center;}
  .terms-pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;background:var(--bg-4);color:var(--text-2);}
  .btn-full{width:100%;justify-content:center;}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="invoices.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Invoices</a>
  <div class="title">Invoice <span class="id" id="t-id">#----</span></div>
  <span class="badge-pay pay-unpaid" id="t-badge">Unpaid</span>
  <div class="actions"><button class="btn-dark btn" id="btn-pdf">Save Invoice PDF</button></div>
</header>
<div class="wrap" id="wrap"><div class="state">Loading invoice…</div></div>

<template id="tpl">
<div class="inv-hero">
  <div class="ih-bal">
    <span class="lbl">Balance Due</span>
    <span class="amt due" id="h-balance">$0.00</span>
    <div class="progress"><div class="bar" id="h-bar" style="width:0%"></div></div>
  </div>
  <div class="ih-div"></div>
  <div class="ih-meta">
    <div class="m"><span class="lbl">Client</span><span class="v" id="h-client">—</span></div>
    <div class="m"><span class="lbl">Invoice Date</span><span class="v" id="h-date">—</span></div>
    <div class="m"><span class="lbl">Due Date</span><span class="v" id="h-due">—</span></div>
    <div class="m"><span class="lbl">Total</span><span class="v" id="h-total">—</span></div>
  </div>
  <div class="ih-status">
    <span class="badge-pay pay-unpaid" id="h-badge">Unpaid</span>
  </div>
</div>

<div class="grid">
  <div class="col-main">
    <div class="card">
      <div class="card-h"><h3>Bill To</h3></div>
      <div class="card-b billto">
        <div class="bt-left">
          <div class="bt-company" id="f-client">—</div>
          <div class="bt-lines" id="f-address">—</div>
          <div class="bt-contact" id="f-contact"></div>
        </div>
        <div class="bt-right">
          <div class="bt-meta"><span class="lbl">Subject</span><span class="v" id="f-subject">—</span></div>
          <div class="bt-meta"><span class="lbl">Serviced By</span><span class="v" id="f-staff">—</span></div>
          <div class="bt-meta"><span class="lbl">From Order</span><span class="v" id="f-order">—</span></div>
          <div class="bt-meta"><span class="lbl">Client P.O.</span><span class="v" id="f-po">—</span></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><h3>Line Items</h3></div>
      <table>
        <thead><tr><th style="width:120px;">Item</th><th>Description</th><th class="num" style="width:54px;">Qty</th><th class="num" style="width:90px;">Unit Price</th><th class="num" style="width:100px;">Amount</th></tr></thead>
        <tbody id="items"></tbody>
      </table>
      <div class="inv-totals">
        <div class="it-row"><span class="l">Subtotal</span><span class="v" id="t-sub">$0.00</span></div>
        <div class="it-row" id="t-disc-row" style="display:none;"><span class="l">Discount</span><span class="v" id="t-disc">$0.00</span></div>
        <div class="it-row"><span class="l">HST (13%)</span><span class="v" id="t-hst">$0.00</span></div>
        <div class="it-row grand"><span class="l">Grand Total</span><span class="v" id="t-grand">$0.00</span></div>
        <div class="it-row paid"><span class="l">Amount Paid</span><span class="v" id="t-paid">$0.00</span></div>
        <div class="it-row bal"><span class="l">Balance Due</span><span class="v" id="t-bal">$0.00</span></div>
      </div>
    </div>
  </div>
  <div class="col-side">
    <div class="card">
      <div class="card-h"><h3>Terms</h3></div>
      <div class="card-b">
        <div class="field"><label>Payment Terms</label>
          <select class="in" id="f-terms">
            <option value="on_receipt">Due on receipt</option>
            <option value="net_15">Net 15</option>
            <option value="net_30">Net 30</option>
            <option value="net_60">Net 60</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0;"><label>Due Date</label><div class="val" id="f-due">—</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><h3>Record a Payment</h3></div>
      <div class="card-b">
        <div class="pf-grid">
          <div class="pf-field"><label>Date <span class="req">*</span></label><input class="in" id="pay-date" type="date"></div>
          <div class="pf-field"><label>Amount <span class="req">*</span></label><input class="in" id="pay-amt" type="number" step="0.01" placeholder="0.00"></div>
          <div class="pf-field full"><label>Method <span class="req">*</span></label>

              <option value="">— Select method —</option>
              <option>Cheque</option><option>E-transfer</option><option>Credit Card</option>
              <option>Cash</option><option>Wire / EFT</option><option>Other</option>
            </select>

          <div class="pf-field full"><label>Reference (optional)</label><input class="in" id="pay-ref" placeholder="Cheque #, e-transfer ref…"></div>
        </div>

      </div>
    </div>
    <div class="card">
      <div class="card-h"><h3>Payment History</h3></div>
      <div class="card-b"><div id="pay-list"></div></div>
    </div>
  </div>
</div>
</template>

<script type="module">
import { supabase as db, requireAuth, signOut, currentUser } from './auth.js';
await requireAuth();

// ---- shared styled modal (replaces native alert/confirm) ----
function __ensureModal(){
  if(document.getElementById('__sm_ov'))return;
  const css=document.createElement('style');
  css.textContent='#__sm_ov{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:9000;padding:20px;}#__sm_ov.open{display:flex;}#__sm{background:#16181d;border:1px solid #414a5c;border-radius:14px;width:100%;max-width:410px;overflow:hidden;font-family:Inter,system-ui,sans-serif;}#__sm .h{display:flex;gap:13px;align-items:flex-start;padding:22px 24px 0;}#__sm .ic{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;}#__sm .ic.warn{background:rgba(255,182,39,.15);color:#ffb627;}#__sm .ic.info{background:rgba(61,165,255,.15);color:#3da5ff;}#__sm .ic.danger{background:rgba(255,77,77,.15);color:#ff4d4d;}#__sm .ic svg{width:22px;height:22px;}#__sm .t{font-family:Archivo,sans-serif;font-weight:800;font-size:16px;color:#eef0f4;margin-bottom:5px;}#__sm .m{font-size:13.5px;color:#c4cad6;line-height:1.5;}#__sm .f{display:flex;gap:10px;padding:20px 24px 22px;justify-content:flex-end;}#__sm .b{padding:10px 17px;border-radius:8px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid #414a5c;background:#1f2229;color:#eef0f4;}#__sm .b:hover{border-color:#9098a8;}#__sm .b.primary{background:#f4f6fb;color:#15171c;border-color:#f4f6fb;}#__sm .b.danger{background:#ff4d4d;color:#fff;border-color:#ff4d4d;}#__sm .b.plain{background:transparent;border-color:transparent;color:#9098a8;}';
  document.head.appendChild(css);
  const ov=document.createElement('div');ov.id='__sm_ov';
  ov.innerHTML='<div id="__sm"><div class="h"><div class="ic warn" id="__sm_ic"></div><div><div class="t" id="__sm_t"></div><div class="m" id="__sm_m"></div></div></div><div class="f" id="__sm_f"></div></div>';
  document.body.appendChild(ov);
}
const __SM_IC={warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',danger:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'};
function smAlert(msg,title,type){return new Promise(res=>{__ensureModal();type=type||'info';document.getElementById('__sm_ic').className='ic '+type;document.getElementById('__sm_ic').innerHTML=__SM_IC[type]||__SM_IC.info;document.getElementById('__sm_t').textContent=title||'Notice';document.getElementById('__sm_m').textContent=msg||'';const f=document.getElementById('__sm_f');f.innerHTML='<button class="b primary" id="__sm_ok">Got it</button>';const ov=document.getElementById('__sm_ov');const close=()=>{ov.classList.remove('open');res(true);};f.querySelector('#__sm_ok').onclick=close;ov.onclick=e=>{if(e.target===ov)close();};ov.classList.add('open');});}
function smConfirm(msg,title,opts){opts=opts||{};return new Promise(res=>{__ensureModal();const type=opts.type||'warn';document.getElementById('__sm_ic').className='ic '+type;document.getElementById('__sm_ic').innerHTML=__SM_IC[type]||__SM_IC.warn;document.getElementById('__sm_t').textContent=title||'Confirm';document.getElementById('__sm_m').textContent=msg||'';const f=document.getElementById('__sm_f');f.innerHTML='<button class="b plain" id="__sm_no">'+(opts.cancelText||'Cancel')+'</button><button class="b '+(opts.danger?'danger':'primary')+'" id="__sm_yes">'+(opts.confirmText||'Confirm')+'</button>';const ov=document.getElementById('__sm_ov');const close=v=>{ov.classList.remove('open');res(v);};f.querySelector('#__sm_yes').onclick=()=>close(true);f.querySelector('#__sm_no').onclick=()=>close(false);ov.onclick=e=>{if(e.target===ov)close(false);};ov.classList.add('open');});}

const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtD=d=>{if(!d)return '—';const x=new Date(d+'T00:00:00');return x.getDate()+' '+MON[x.getMonth()]+' '+x.getFullYear();};
const money=n=>'$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};
const INV_ID=new URLSearchParams(location.search).get('id');
let INV=null,ITEMS=[],PAYMENTS=[],CLIENT=null,CONTACT=null;

const TERM_DAYS={on_receipt:0,net_15:15,net_30:30,net_60:60};
const TERM_LABEL={on_receipt:'Due on receipt',net_15:'Net 15',net_30:'Net 30',net_60:'Net 60'};
function computeDue(invoiceDate,terms){
  if(!invoiceDate)return null;
  const d=new Date(invoiceDate+'T00:00:00');
  d.setDate(d.getDate()+(TERM_DAYS[terms]??30));
  return d.toISOString().slice(0,10);
}
function isOverdue(){
  if(!INV||INV.paid_status==='paid')return false;
  const due=INV.due_date||computeDue(INV.invoice_date,INV.terms||'net_30');
  if(!due)return false;
  return new Date(due+'T23:59:59') < new Date();
}

async function load(){
  if(!INV_ID){document.getElementById('wrap').innerHTML='<div class="state">No invoice specified.</div>';return;}
  const {data,error}=await db.from('invoices').select('*, clients(*), quotes(stage_id,contact_id,po_number)').eq('id',INV_ID).single();
  if(error||!data){document.getElementById('wrap').innerHTML=`<div class="state">Couldn't load invoice. ${error?.message||''}</div>`;return;}
  INV=data;CLIENT=data.clients||{};
  if(!INV.terms)INV.terms='net_30';
  if(!INV.due_date)INV.due_date=computeDue(INV.invoice_date,INV.terms);
  if(INV.quote_id){const {data:items}=await db.from('quote_items').select('*').eq('quote_id',INV.quote_id).order('line_order');ITEMS=items||[];
    if(data.quotes?.contact_id){const {data:ct}=await db.from('contacts').select('*').eq('id',data.quotes.contact_id).single();CONTACT=ct;}}
  const {data:pays}=await db.from('payments').select('*').eq('invoice_id',INV_ID).order('pay_date');PAYMENTS=pays||[];
  render();
}

function statusInfo(){
  if(INV.paid_status==='paid')return {key:'paid',label:'Paid'};
  if(isOverdue())return {key:'overdue',label:'Overdue'};
  if(INV.paid_status==='partial')return {key:'partial',label:'Partial'};
  return {key:'unpaid',label:'Unpaid'};
}

function render(){
  const w=document.getElementById('wrap');w.innerHTML='';w.appendChild(document.getElementById('tpl').content.cloneNode(true));
  document.getElementById('t-id').textContent='#'+(INV.invoice_number||'—');
  const paid=PAYMENTS.reduce((s,p)=>s+Number(p.amount||0),0);
  const bal=Math.max(0,Number(INV.grand_total||0)-paid);
  const pct=Number(INV.grand_total)>0?Math.min(100,Math.round((paid/Number(INV.grand_total))*100)):0;

  // hero
  const hbal=document.getElementById('h-balance');
  hbal.textContent=money(bal);hbal.className='amt '+(bal<=0.005?'clear':'due');
  document.getElementById('h-bar').style.width=pct+'%';
  document.getElementById('h-client').textContent=CLIENT.company_name||'—';
  document.getElementById('h-date').textContent=fmtD(INV.invoice_date);
  const due=INV.due_date||computeDue(INV.invoice_date,INV.terms);
  const hdue=document.getElementById('h-due');hdue.textContent=fmtD(due);if(isOverdue())hdue.className='v over';
  document.getElementById('h-total').textContent=money(INV.grand_total);

  const si=statusInfo();
  ['t-badge','h-badge'].forEach(id=>{const b=document.getElementById(id);if(b){b.textContent=si.label;b.className='badge-pay pay-'+si.key;}});

  // details
  document.getElementById('f-subject').textContent=INV.subject||'—';
  document.getElementById('f-staff').textContent=INV.serviced_by||'—';
  document.getElementById('f-order').textContent=INV.quotes?.stage_id?('#'+INV.quotes.stage_id):'—';
  document.getElementById('f-po').textContent=INV.po_number||INV.quotes?.po_number||'—';
  // bill-to block
  document.getElementById('f-client').textContent=CLIENT.company_name||'—';
  const addr=[CLIENT.bill_address,[CLIENT.bill_city,CLIENT.bill_province].filter(Boolean).join(', '),CLIENT.bill_postal].filter(Boolean);
  document.getElementById('f-address').innerHTML=addr.length?addr.map(esc).join('<br>'):'<span style="color:var(--text-3)">No billing address on file</span>';
  const cName=CONTACT?((CONTACT.first_name||'')+' '+(CONTACT.last_name||'')).trim():'';
  const cBits=[cName,CONTACT?.email1,CONTACT?.tel1].filter(Boolean);
  document.getElementById('f-contact').innerHTML=cBits.length?cBits.map(esc).join(' · '):'';
  const termSel=document.getElementById('f-terms');termSel.value=INV.terms||'net_30';
  const fdue=document.getElementById('f-due');if(fdue)fdue.textContent=fmtD(due);
  termSel.onchange=async()=>{
    INV.terms=termSel.value;INV.due_date=computeDue(INV.invoice_date,INV.terms);
    await db.from('invoices').update({terms:INV.terms,due_date:INV.due_date}).eq('id',INV_ID);
    render();
  };

  // items
  document.getElementById('items').innerHTML=ITEMS.length?ITEMS.map(it=>`<tr><td>${esc(it.style_number||it.category_name||'')}</td><td>${esc(it.description||'')}</td><td class="num">${it.quantity}</td><td class="num">${money(it.unit_price)}</td><td class="num">${money(it.net_amount)}</td></tr>`).join(''):'<tr><td colspan="5" style="color:var(--text-3);text-align:center;padding:20px;">No line items</td></tr>';

  recalcTotals();
  renderPayments();
  // default the payment date to today
  document.getElementById('pay-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('add-pay').onclick=addPayment;
  document.getElementById('btn-pdf').onclick=printInvoice;
}

function recalcTotals(){
  const paid=PAYMENTS.reduce((s,p)=>s+Number(p.amount||0),0);
  const bal=Number(INV.grand_total||0)-paid;
  document.getElementById('t-sub').textContent=money(INV.subtotal);
  if(Number(INV.discount_total)>0){document.getElementById('t-disc-row').style.display='';document.getElementById('t-disc').textContent='−'+money(INV.discount_total);}
  document.getElementById('t-hst').textContent=money(INV.hst);
  document.getElementById('t-grand').textContent=money(INV.grand_total);
  document.getElementById('t-paid').textContent=money(paid);
  const tp=document.getElementById('t-paid');if(tp&&paid>0)tp.style.color='var(--paid)';
  document.getElementById('t-bal').textContent=money(Math.max(0,bal));
}

function renderPayments(){
  const el=document.getElementById('pay-list');
  if(!PAYMENTS.length){el.innerHTML='<div class="pay-empty">No payments recorded yet.</div>';return;}
  el.innerHTML=PAYMENTS.map(p=>`<div class="pay-row">
    <div class="pr-meta"><span class="pr-method">${esc(p.method||'Payment')}</span><span class="pr-sub">${fmtD(p.pay_date)}${p.reference?' · '+esc(p.reference):''}</span></div>
    <div class="pr-right"><span class="pay-amt">${money(p.amount)}</span><button class="pay-del" data-id="${p.id}" title="Remove payment">×</button></div>
  </div>`).join('');
  el.querySelectorAll('.pay-del').forEach(b=>b.addEventListener('click',()=>removePayment(b.dataset.id)));
}

async function recomputeStatus(){
  const {data:pays}=await db.from('payments').select('*').eq('invoice_id',INV_ID).order('pay_date');PAYMENTS=pays||[];
  const paid=PAYMENTS.reduce((s,p)=>s+Number(p.amount||0),0);
  const bal=Number(INV.grand_total||0)-paid;
  // an invoice is only 'paid' when fully covered; partial when some paid; else unpaid
  const status=bal<=0.005?'paid':(paid>0?'partial':'unpaid');
  await db.from('invoices').update({amount_paid:paid,balance_due:Math.max(0,bal),paid_status:status}).eq('id',INV_ID);
  INV.amount_paid=paid;INV.balance_due=Math.max(0,bal);INV.paid_status=status;
}

async function addPayment(){
  const date=document.getElementById('pay-date').value;
  const amt=parseFloat(document.getElementById('pay-amt').value);
  const method=document.getElementById('pay-method').value;
  const ref=document.getElementById('pay-ref').value.trim();
  const msg=document.getElementById('pay-msg');
  // Date + Method + Amount are all required before a payment is recorded
  if(!date){msg.textContent='Choose the payment date.';msg.className='msg err';return;}
  if(!method){msg.textContent='Select a payment method.';msg.className='msg err';return;}
  if(!amt||amt<=0){msg.textContent='Enter a valid amount.';msg.className='msg err';return;}
  const balance=Number(INV.grand_total||0)-PAYMENTS.reduce((s,p)=>s+Number(p.amount||0),0);
  if(amt>balance+0.005){
    const ok=await smConfirm('This payment ('+money(amt)+') is more than the balance due ('+money(Math.max(0,balance))+'). Record it anyway?','Amount exceeds balance',{confirmText:'Record anyway',cancelText:'Cancel'});
    if(!ok)return;
  }
  msg.textContent='Recording…';msg.className='msg';
  const {error}=await db.from('payments').insert({invoice_id:INV_ID,amount:amt,method,reference:ref||null,pay_date:date});
  if(error){msg.textContent='Error: '+error.message;msg.className='msg err';return;}
  await recomputeStatus();
  document.getElementById('pay-amt').value='';document.getElementById('pay-method').value='';document.getElementById('pay-ref').value='';
  render();
  document.getElementById('pay-msg').textContent='Payment recorded ✓';document.getElementById('pay-msg').className='msg ok';
}

async function removePayment(id){
  const ok=await smConfirm('Remove this payment? The invoice balance will be recalculated.','Remove payment?',{confirmText:'Remove',cancelText:'Keep',danger:true});
  if(!ok)return;
  await db.from('payments').delete().eq('id',id);
  await recomputeStatus();
  render();
}
async function printInvoice(){
  if(!await smConfirm('Output invoice #'+(INV.invoice_number||'')+'? You can save it as a PDF or print it.','Print invoice?',{confirmText:'Continue'}))return;
  let generateDocument;
  try{ ({generateDocument}=await import('./pdf.js')); }
  catch(err){ await smAlert('Could not load the PDF generator (pdf.js).','Couldn’t load','danger'); return; }
  const lines=[CLIENT.bill_address,CLIENT.bill_city,CLIENT.bill_postal,CLIENT.bill_province].filter(Boolean);
  const paid=PAYMENTS.reduce((s,p)=>s+Number(p.amount||0),0);
  generateDocument('INVOICE',{
    number:String(INV.invoice_number||''), date:INV.invoice_date, dueDate:INV.due_date||computeDue(INV.invoice_date,INV.terms), terms:TERM_LABEL[INV.terms||'net_30'], servicedBy:INV.serviced_by||'',
    clientContact:CONTACT?((CONTACT.first_name||'')+' '+(CONTACT.last_name||'')).trim():'', pageNo:1,
    client:{company:CLIENT.company_name||'', lines, tel:CONTACT?.tel1||'', email:CONTACT?.email1||''},
    items:ITEMS.map(l=>({category:l.category_name||l.category_code||'',code:l.style_number||'',description:l.description||'',qty:l.quantity,unit:l.unit||'Pc',unitPrice:l.unit_price,amount:l.net_amount})),
    subtotal:INV.subtotal||0, hst:INV.hst||0, grandTotal:INV.grand_total||0,
    amountPaid:paid, balanceDue:Math.max(0,Number(INV.grand_total||0)-paid)
  });
}
load();
</script>
</body>
</html>
