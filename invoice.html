<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice — YRT CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#c4cad6;--text-3:#9098a8;
    --brass:#e7ebf3;--brass-2:#f4f6fb;--paid:#3ddc84;--partial:#ffb627;--unpaid:#ff6b35;--danger:#ff4d4d;
    --radius:11px;--radius-sm:8px;
    --fd:'Archivo',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg);}
  .topbar{height:58px;background:var(--bg-2);border-bottom:2px solid var(--line-2);display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:30;}
  .back{display:inline-flex;align-items:center;gap:7px;color:var(--text-2);text-decoration:none;font-weight:700;font-size:13px;padding:7px 11px;border-radius:var(--radius-sm);border:1px solid var(--line-2);background:var(--bg-3);}
  .back:hover{border-color:var(--brass);color:var(--brass-2);}
  .title{font-family:var(--fd);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:16px;}
  .title .id{color:var(--brass-2);}
  .actions{margin-left:auto;display:flex;gap:8px;}
  .btn{padding:8px 14px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text);}
  .btn:hover{border-color:var(--brass);}
  .btn-dark{background:#fff;color:#15171c;border:none;}
  .badge-pay{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;padding:5px 11px;border-radius:7px;text-transform:uppercase;font-family:var(--fd);}
  .pay-unpaid{background:var(--unpaid);color:#1a0f08;}.pay-partial{background:var(--partial);color:#231803;}.pay-paid{background:var(--paid);color:#04130a;}
  .wrap{max-width:940px;margin:0 auto;padding:34px 24px 60px;display:flex;justify-content:center;}
  .layout{width:100%;max-width:860px;background:var(--bg-2,#16181d);border:1px solid var(--line-2,#414a5c);border-radius:16px;overflow:hidden;box-shadow:0 40px 100px -30px rgba(0,0,0,.8),0 10px 30px -12px rgba(0,0,0,.5);}
  

  /* ---- The invoice as a real paper document ---- */
  .sheet{background:#fbfbfd;color:#1a1d24;overflow:hidden;position:relative;margin:0;border-radius:0;}
  .sheet-band{height:5px;background:linear-gradient(90deg,#caa75d,#e7c989);}
  .sheet-in{padding:40px 44px 36px;}
  /* status stamp */
  .stamp{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%) rotate(-12deg);font-family:var(--fd);font-weight:900;font-size:62px;letter-spacing:.1em;text-transform:uppercase;padding:12px 30px;border:5px solid;border-radius:12px;opacity:.13;pointer-events:none;z-index:2;}
  .stamp.paid{color:#1ea761;border-color:#1ea761;}
  .stamp.unpaid{color:#c2410c;border-color:#c2410c;}
  .stamp.partial{color:#b7791f;border-color:#b7791f;}
  .stamp.overdue{color:#dc2626;border-color:#dc2626;}
  /* sheet header */
  .sh-top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;margin-bottom:30px;}
  .sh-brand .bn{font-family:var(--fd);font-weight:900;font-size:19px;letter-spacing:-.01em;color:#15171c;line-height:1.15;text-transform:uppercase;}
  .sh-brand .bsub{font-size:11.5px;color:#6b7280;margin-top:5px;line-height:1.5;}
  .sh-doc{text-align:right;}
  .sh-doc .dlabel{font-family:var(--fd);font-weight:800;font-size:13px;letter-spacing:.16em;color:#9098a8;text-transform:uppercase;}
  .sh-doc .dnum{font-family:var(--fm);font-weight:700;font-size:22px;color:#15171c;margin-top:2px;}
  .sh-doc .dmeta{margin-top:12px;display:flex;flex-direction:column;gap:4px;}
  .sh-doc .dmeta .r{display:flex;justify-content:flex-end;gap:10px;font-size:12px;}
  .sh-doc .dmeta .r .k{color:#9098a8;}.sh-doc .dmeta .r .vv{color:#374151;font-weight:600;min-width:90px;text-align:right;}
  .sh-doc .dmeta .r .vv.over{color:#dc2626;font-weight:700;}
  /* bill to */
  .sh-parties{display:flex;justify-content:space-between;gap:30px;margin-bottom:26px;}
  .party .plabel{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#9ca3af;font-weight:700;margin-bottom:7px;}
  .party .pco{font-family:var(--fd);font-weight:800;font-size:15px;color:#15171c;}
  .party .padd{font-size:12.5px;color:#4b5563;line-height:1.65;margin-top:3px;}
  .party .pcon{font-size:11.5px;color:#6b7280;margin-top:6px;}
  .party.right{text-align:right;}
  /* line items table on the sheet */
  .sh-table{width:100%;border-collapse:collapse;margin-bottom:0;}
  .sh-table thead th{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;font-weight:700;text-align:left;padding:0 12px 10px;border-bottom:2px solid #e5e7eb;}
  .sh-table thead th.num{text-align:right;}
  .sh-table tbody td{padding:13px 12px;border-bottom:1px solid #eef0f3;font-size:13px;color:#1f2430;vertical-align:top;}
  .sh-table tbody td.num{text-align:right;font-family:var(--fm);}
  .sh-table .li-code{font-family:var(--fm);font-size:11.5px;color:#6b7280;}
  .sh-table .li-desc{color:#1f2430;}
  /* totals on the sheet */
  .sh-tot{display:flex;justify-content:flex-end;margin-top:18px;}
  .sh-tot-box{width:300px;}
  .sh-tot .row{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;color:#4b5563;}
  .sh-tot .row .v{font-family:var(--fm);font-weight:600;color:#1f2430;}
  .sh-tot .row.grand{border-top:2px solid #1a1d24;margin-top:7px;padding-top:12px;}
  .sh-tot .row.grand .k{font-family:var(--fd);font-weight:800;text-transform:uppercase;font-size:13px;color:#15171c;letter-spacing:.03em;}
  .sh-tot .row.grand .v{font-family:var(--fd);font-weight:900;font-size:20px;color:#15171c;}
  .sh-tot .row.paid .v{color:#1ea761;}
  .sh-tot .row.bal{margin-top:8px;padding:11px 14px;background:#f3f4f6;border-radius:8px;}
  .sh-tot .row.bal .k{font-weight:800;color:#15171c;}
  .sh-tot .row.bal .v{font-family:var(--fd);font-weight:900;font-size:17px;color:#c2410c;}
  .sh-tot .row.bal.clear .v{color:#1ea761;}
  .sh-foot{margin-top:30px;padding-top:18px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;gap:20px;font-size:11px;color:#9098a8;}

  /* ---- right rail (dark, the CRM workflow) ---- */
  .rail{display:grid;grid-template-columns:1fr 1fr 1.3fr;gap:0;background:var(--bg-2,#16181d);border-top:1px solid var(--line,#323a48);align-items:stretch;}
  .rail .panel{border-right:1px solid var(--line,#323a48);border-radius:0;background:transparent;}
  .rail .panel:last-child{border-right:none;}
  @media(max-width:760px){.rail{grid-template-columns:1fr;}.rail .panel{border-right:none;border-bottom:1px solid var(--line,#323a48);}}
  .panel{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);overflow:hidden;}
  .panel-h{padding:13px 16px;border-bottom:1px solid var(--line);font-family:var(--fd);font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#aab2c4;}
  .panel-b{padding:16px;}
  /* balance hero in rail */
  .rail-bal{padding:18px 16px;}
  .rail-bal .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);font-weight:700;}
  .rail-bal .amt{font-family:var(--fd);font-weight:900;font-size:32px;letter-spacing:-.01em;margin-top:4px;}
  .rail-bal .amt.due{color:var(--unpaid);}.rail-bal .amt.clear{color:var(--paid);}
  .rail-bal .status-line{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .progress{width:100%;height:7px;background:var(--bg-4);border-radius:5px;overflow:hidden;margin-top:12px;}
  .progress .bar{height:100%;background:var(--paid);transition:width .4s;}
  .progress-txt{font-size:11px;color:var(--text-3);margin-top:7px;}
  .field{margin-bottom:13px;}.field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;margin-bottom:5px;}
  .field .val{font-weight:600;font-size:13.5px;}
  input.in,select.in{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:var(--radius-sm);padding:9px 11px;font-size:13.5px;font-family:inherit;color:var(--text);}
  input.in:focus,select.in:focus{outline:none;border-color:var(--brass);}
  .pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
  .pf-grid .full{grid-column:1 / -1;}
  .pf-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:700;margin-bottom:5px;}
  .pf-field .req{color:var(--unpaid);}
  .btn-brass{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;}
  .btn-full{width:100%;justify-content:center;}
  .msg{font-size:12.5px;margin-top:9px;}.msg.ok{color:var(--paid);}.msg.err{color:var(--danger);}
  .pay-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px;gap:10px;}
  .pay-row:last-child{border-bottom:none;}
  .pay-row .pr-method{font-weight:600;color:var(--text);}
  .pay-row .pr-sub{font-size:11px;color:var(--text-3);margin-top:2px;}
  .pay-row .pr-right{display:flex;align-items:center;gap:10px;}
  .pay-amt{font-family:var(--fm);font-weight:700;color:var(--paid);}
  .pay-del{background:transparent;border:none;color:var(--text-3);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:5px;}
  .pay-del:hover{color:var(--danger);background:rgba(255,77,77,.1);}
  .pay-empty{color:var(--text-3);font-size:12.5px;padding:8px 0;text-align:center;}
  .state{padding:50px;text-align:center;color:var(--text-3);}
  .badge-pay{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;padding:5px 11px;border-radius:7px;text-transform:uppercase;font-family:var(--fd);}
  .pay-overdue{background:var(--danger);color:#fff;}
  .paid-lock{text-align:center;padding:26px 18px;}
  .paid-lock .pl-check{width:46px;height:46px;border-radius:50%;background:rgba(61,220,132,.15);border:1px solid rgba(61,220,132,.5);color:#3ddc84;font-size:22px;display:grid;place-items:center;margin:0 auto 12px;}
  .paid-lock .pl-t{font-family:var(--fd,'Archivo');font-size:15px;font-weight:800;color:#eef0f4;}
  .paid-lock .pl-s{font-size:12px;color:#9098a8;margin-top:6px;line-height:1.5;max-width:240px;margin-left:auto;margin-right:auto;}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="invoices.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Invoices</a>
  <div class="title">Invoice <span class="id" id="t-id">#----</span></div>
  <span class="badge-pay pay-unpaid" id="t-badge">Unpaid</span>
  <div class="actions"><button class="btn-dark btn" id="btn-pdf">Print / Save PDF</button></div>
</header>
<div class="wrap" id="wrap"><div class="state">Loading invoice…</div></div>

<template id="tpl">
<div class="layout">
  <!-- The invoice document itself -->
  <div class="sheet">
    <div class="sheet-band"></div>
    <div class="sheet-in">
      <div class="stamp" id="sheet-stamp">UNPAID</div>
      <div class="sh-top">
        <div class="sh-brand">
          <div class="bn">York Region Trophy<br>&amp; Promotion</div>
          <div class="bsub">Unit 6 - 7777 Keele Street, Concord, ON L4K 1Y7<br>905-660-9952 · yrtrophy@bellnet.ca · GST# 702433319</div>
        </div>
        <div class="sh-doc">
          <div class="dlabel">Invoice</div>
          <div class="dnum" id="s-num">#—</div>
          <div class="dmeta">
            <div class="r"><span class="k">Issued</span><span class="vv" id="s-date">—</span></div>
            <div class="r"><span class="k">Due</span><span class="vv" id="s-due">—</span></div>
            <div class="r"><span class="k">Terms</span><span class="vv" id="s-terms">—</span></div>
          </div>
        </div>
      </div>

      <div class="sh-parties">
        <div class="party">
          <div class="plabel">Bill To</div>
          <div class="pco" id="s-client">—</div>
          <div class="padd" id="s-address">—</div>
          <div class="pcon" id="s-contact"></div>
        </div>
        <div class="party right">
          <div class="plabel">Details</div>
          <div class="padd" id="s-details">—</div>
        </div>
      </div>

      <table class="sh-table">
        <thead><tr><th style="width:130px;">Item</th><th>Description</th><th class="num" style="width:50px;">Qty</th><th class="num" style="width:90px;">Unit</th><th class="num" style="width:100px;">Amount</th></tr></thead>
        <tbody id="items"></tbody>
      </table>

      <div class="sh-tot">
        <div class="sh-tot-box">
          <div class="row"><span class="k">Subtotal</span><span class="v" id="t-sub">$0.00</span></div>
          <div class="row" id="t-disc-row" style="display:none;"><span class="k">Discount</span><span class="v" id="t-disc">$0.00</span></div>
          <div class="row"><span class="k">HST (13%)</span><span class="v" id="t-hst">$0.00</span></div>
          <div class="row grand"><span class="k">Grand Total</span><span class="v" id="t-grand">$0.00</span></div>
          <div class="row paid" id="t-paid-row" style="display:none;"><span class="k">Amount Paid</span><span class="v" id="t-paid">$0.00</span></div>
          <div class="row bal" id="t-bal-row"><span class="k">Balance Due</span><span class="v" id="t-bal">$0.00</span></div>
        </div>
      </div>

      <div class="sh-foot">
        <span>Thank you for your business. Div. of Silver Springs Investments Corp.</span>
        <span>www.yorkregiontrophy.com</span>
      </div>
    </div>
  </div>

  <!-- Workflow rail -->
  <div class="rail">
    <div class="panel">
      <div class="rail-bal">
        <div class="lbl">Balance Due</div>
        <div class="amt due" id="h-balance">$0.00</div>
        <div class="status-line"><span class="badge-pay pay-unpaid" id="h-badge">Unpaid</span></div>
        <div class="progress"><div class="bar" id="h-bar" style="width:0%"></div></div>
        <div class="progress-txt" id="h-prog">$0.00 paid of $0.00</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-h">Terms</div>
      <div class="panel-b">
        <div class="field"><label>Payment Terms</label>
          <select class="in" id="f-terms">
            <option value="on_receipt">Due on receipt</option>
            <option value="net_15">Net 15</option>
            <option value="net_30">Net 30</option>
            <option value="net_60">Net 60</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0;"><label>Due Date</label><div class="val" id="f-due">—</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-h">Record a Payment</div>
      <div class="panel-b">
        <div class="pf-grid">
          <div class="pf-grid" id="pay-form"><div class="pf-field"><label>Date <span class="req">*</span></label><input class="in" id="pay-date" type="date"></div>
          <div class="pf-field"><label>Amount <span class="req">*</span></label><input class="in" id="pay-amt" type="number" step="0.01" placeholder="0.00"></div>
          <div class="pf-field full"><label>Method <span class="req">*</span></label>
            <select class="in" id="pay-method">
              <option value="">— Select method —</option>
              <option>Cheque</option><option>E-transfer</option><option>Credit Card</option>
              <option>Cash</option><option>Wire / EFT</option><option>Other</option>
            </select>
          </div>
          <div class="pf-field full"><label>Reference (optional)</label><input class="in" id="pay-ref" placeholder="Cheque #, e-transfer ref…"></div>
        </div>
        <button class="btn-brass btn btn-full" id="add-pay">Record Payment</button>
        <div class="msg" id="pay-msg"></div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-h">Payment History</div>
      <div class="panel-b"><div id="pay-list"></div></div>
    </div>
  </div>
</div>
</template>

<script type="module">
import { supabase as db, requireAuth, signOut, currentUser } from './auth.js';
await requireAuth();

// ---- shared styled modal (replaces native alert/confirm) ----
function __ensureModal(){
  if(document.getElementById('__sm_ov'))return;
  const css=document.createElement('style');
  css.textContent='#__sm_ov{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:9000;padding:20px;}#__sm_ov.open{display:flex;}#__sm{background:#16181d;border:1px solid #414a5c;border-radius:14px;width:100%;max-width:410px;overflow:hidden;font-family:Inter,system-ui,sans-serif;}#__sm .h{display:flex;gap:13px;align-items:flex-start;padding:22px 24px 0;}#__sm .ic{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;}#__sm .ic.warn{background:rgba(255,182,39,.15);color:#ffb627;}#__sm .ic.info{background:rgba(61,165,255,.15);color:#3da5ff;}#__sm .ic.danger{background:rgba(255,77,77,.15);color:#ff4d4d;}#__sm .ic svg{width:22px;height:22px;}#__sm .t{font-family:Archivo,sans-serif;font-weight:800;font-size:16px;color:#eef0f4;margin-bottom:5px;}#__sm .m{font-size:13.5px;color:#c4cad6;line-height:1.5;}#__sm .f{display:flex;gap:10px;padding:20px 24px 22px;justify-content:flex-end;}#__sm .b{padding:10px 17px;border-radius:8px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid #414a5c;background:#1f2229;color:#eef0f4;}#__sm .b:hover{border-color:#9098a8;}#__sm .b.primary{background:#f4f6fb;color:#15171c;border-color:#f4f6fb;}#__sm .b.danger{background:#ff4d4d;color:#fff;border-color:#ff4d4d;}#__sm .b.plain{background:transparent;border-color:transparent;color:#9098a8;}';
  document.head.appendChild(css);
  const ov=document.createElement('div');ov.id='__sm_ov';
  ov.innerHTML='<div id="__sm"><div class="h"><div class="ic warn" id="__sm_ic"></div><div><div class="t" id="__sm_t"></div><div class="m" id="__sm_m"></div></div></div><div class="f" id="__sm_f"></div></div>';
  document.body.appendChild(ov);
}
const __SM_IC={warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',danger:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'};
function smAlert(msg,title,type){return new Promise(res=>{__ensureModal();type=type||'info';document.getElementById('__sm_ic').className='ic '+type;document.getElementById('__sm_ic').innerHTML=__SM_IC[type]||__SM_IC.info;document.getElementById('__sm_t').textContent=title||'Notice';document.getElementById('__sm_m').textContent=msg||'';const f=document.getElementById('__sm_f');f.innerHTML='<button class="b primary" id="__sm_ok">Got it</button>';const ov=document.getElementById('__sm_ov');const close=()=>{ov.classList.remove('open');res(true);};f.querySelector('#__sm_ok').onclick=close;ov.onclick=e=>{if(e.target===ov)close();};ov.classList.add('open');});}
function smConfirm(msg,title,opts){opts=opts||{};return new Promise(res=>{__ensureModal();const type=opts.type||'warn';document.getElementById('__sm_ic').className='ic '+type;document.getElementById('__sm_ic').innerHTML=__SM_IC[type]||__SM_IC.warn;document.getElementById('__sm_t').textContent=title||'Confirm';document.getElementById('__sm_m').textContent=msg||'';const f=document.getElementById('__sm_f');f.innerHTML='<button class="b plain" id="__sm_no">'+(opts.cancelText||'Cancel')+'</button><button class="b '+(opts.danger?'danger':'primary')+'" id="__sm_yes">'+(opts.confirmText||'Confirm')+'</button>';const ov=document.getElementById('__sm_ov');const close=v=>{ov.classList.remove('open');res(v);};f.querySelector('#__sm_yes').onclick=()=>close(true);f.querySelector('#__sm_no').onclick=()=>close(false);ov.onclick=e=>{if(e.target===ov)close(false);};ov.classList.add('open');});}

const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtD=d=>{if(!d)return '—';const x=new Date(d+'T00:00:00');return x.getDate()+' '+MON[x.getMonth()]+' '+x.getFullYear();};
const money=n=>'$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};
const INV_ID=new URLSearchParams(location.search).get('id');
let INV=null,ITEMS=[],PAYMENTS=[],CLIENT=null,CONTACT=null;

const TERM_DAYS={on_receipt:0,net_15:15,net_30:30,net_60:60};
const TERM_LABEL={on_receipt:'Due on receipt',net_15:'Net 15',net_30:'Net 30',net_60:'Net 60'};
function computeDue(invoiceDate,terms){
  if(!invoiceDate)return null;
  const d=new Date(invoiceDate+'T00:00:00');
  d.setDate(d.getDate()+(TERM_DAYS[terms]??30));
  return d.toISOString().slice(0,10);
}
function isOverdue(){
  if(!INV||INV.paid_status==='paid')return false;
  const due=INV.due_date||computeDue(INV.invoice_date,INV.terms||'net_30');
  if(!due)return false;
  return new Date(due+'T23:59:59') < new Date();
}

async function load(){
  if(!INV_ID){document.getElementById('wrap').innerHTML='<div class="state">No invoice specified.</div>';return;}
  const {data,error}=await db.from('invoices').select('*, clients(*), quotes(stage_id,contact_id,po_number)').eq('id',INV_ID).single();
  if(error||!data){document.getElementById('wrap').innerHTML=`<div class="state">Couldn't load invoice. ${error?.message||''}</div>`;return;}
  INV=data;CLIENT=data.clients||{};
  if(!INV.terms)INV.terms='net_30';
  if(!INV.due_date)INV.due_date=computeDue(INV.invoice_date,INV.terms);
  if(INV.quote_id){const {data:items}=await db.from('quote_items').select('*').eq('quote_id',INV.quote_id).order('line_order');ITEMS=items||[];
    if(data.quotes?.contact_id){const {data:ct}=await db.from('contacts').select('*').eq('id',data.quotes.contact_id).single();CONTACT=ct;}}
  const {data:pays}=await db.from('payments').select('*').eq('invoice_id',INV_ID).order('pay_date');PAYMENTS=pays||[];
  render();
}

function statusInfo(){
  if(INV.paid_status==='paid')return {key:'paid',label:'Paid'};
  if(isOverdue())return {key:'overdue',label:'Overdue'};
  if(INV.paid_status==='partial')return {key:'partial',label:'Partial'};
  return {key:'unpaid',label:'Unpaid'};
}

function render(){
  const w=document.getElementById('wrap');w.innerHTML='';w.appendChild(document.getElementById('tpl').content.cloneNode(true));
  document.getElementById('t-id').textContent='#'+(INV.invoice_number||'—');
  const paid=PAYMENTS.reduce((s,p)=>s+Number(p.amount||0),0);
  const total=Number(INV.grand_total||0);
  const bal=Math.max(0,total-paid);
  const pct=total>0?Math.min(100,Math.round((paid/total)*100)):0;
  const due=INV.due_date||computeDue(INV.invoice_date,INV.terms);
  const si=statusInfo();

  // status stamp on the document
  const stamp=document.getElementById('sheet-stamp');
  stamp.textContent=si.label.toUpperCase();stamp.className='stamp '+si.key;

  // sheet header
  document.getElementById('s-num').textContent='#'+(INV.invoice_number||'—');
  document.getElementById('s-date').textContent=fmtD(INV.invoice_date);
  const sdue=document.getElementById('s-due');sdue.textContent=fmtD(due);if(isOverdue())sdue.className='vv over';
  document.getElementById('s-terms').textContent=TERM_LABEL[INV.terms||'net_30'];

  // bill to + details
  document.getElementById('s-client').textContent=CLIENT.company_name||'—';
  const addr=[CLIENT.bill_address,[CLIENT.bill_city,CLIENT.bill_province].filter(Boolean).join(', '),CLIENT.bill_postal].filter(Boolean);
  document.getElementById('s-address').innerHTML=addr.length?addr.map(esc).join('<br>'):'<span style="color:#9ca3af">No billing address on file</span>';
  const cName=CONTACT?((CONTACT.first_name||'')+' '+(CONTACT.last_name||'')).trim():'';
  const cBits=[cName,CONTACT?.email1,CONTACT?.tel1].filter(Boolean);
  document.getElementById('s-contact').innerHTML=cBits.length?cBits.map(esc).join(' · '):'';
  const details=[];
  if(INV.subject)details.push('Subject: '+esc(INV.subject));
  if(INV.serviced_by)details.push('Serviced by '+esc(INV.serviced_by));
  if(INV.quotes?.stage_id)details.push('From order #'+INV.quotes.stage_id);
  const cpo=INV.po_number||INV.quotes?.po_number;if(cpo)details.push('Client P.O. '+esc(cpo));
  document.getElementById('s-details').innerHTML=details.length?details.join('<br>'):'—';

  // rail balance hero
  const hbal=document.getElementById('h-balance');
  hbal.textContent=money(bal);hbal.className='amt '+(bal<=0.005?'clear':'due');
  document.getElementById('h-bar').style.width=pct+'%';
  document.getElementById('h-prog').textContent=money(paid)+' paid of '+money(total);
  const hb=document.getElementById('h-badge');hb.textContent=si.label;hb.className='badge-pay pay-'+si.key;

  // terms
  // Terms + due date are fixed at conversion. Invoice is read-only except payment.
  const termSel=document.getElementById('f-terms');
  if(termSel){ termSel.value=INV.terms||'net_30'; termSel.disabled=true; }
  const fdue=document.getElementById('f-due');if(fdue)fdue.textContent=fmtD(due);

  // items
  document.getElementById('items').innerHTML=ITEMS.length?ITEMS.map(it=>`<tr><td class="li-code">${esc(it.style_number||it.category_name||'')}</td><td class="li-desc">${esc(it.description||'')}</td><td class="num">${it.quantity}</td><td class="num">${money(it.unit_price)}</td><td class="num">${money(it.net_amount)}</td></tr>`).join(''):'<tr><td colspan="5" style="color:#9ca3af;text-align:center;padding:24px;">No line items</td></tr>';

  recalcTotals();
  renderPayments();

  // Once the invoice is paid it locks: the payment-entry form is replaced by a
  // confirmation, matching the server-side lock in record_payment().
  const payForm=document.getElementById('pay-form');
  const isPaid = INV.paid_status==='paid' || bal<=0.005;
  if(payForm){
    if(isPaid){
      payForm.innerHTML='<div class="paid-lock"><div class="pl-check">✓</div><div class="pl-t">Paid in full</div><div class="pl-s">This invoice is settled and locked. No further changes can be made.</div></div>';
    }else{
      const pd=document.getElementById('pay-date'); if(pd) pd.value=new Date().toISOString().slice(0,10);
      const ap=document.getElementById('add-pay'); if(ap) ap.onclick=addPayment;
    }
  }
  document.getElementById('btn-pdf').onclick=printInvoice;
}

function recalcTotals(){
  const paid=PAYMENTS.reduce((s,p)=>s+Number(p.amount||0),0);
  const bal=Number(INV.grand_total||0)-paid;
  document.getElementById('t-sub').textContent=money(INV.subtotal);
  if(Number(INV.discount_total)>0){document.getElementById('t-disc-row').style.display='';document.getElementById('t-disc').textContent='−'+money(INV.discount_total);}
  document.getElementById('t-hst').textContent=money(INV.hst);
  document.getElementById('t-grand').textContent=money(INV.grand_total);
  // only show the Amount Paid row once something's been paid
  const paidRow=document.getElementById('t-paid-row');
  if(paid>0){paidRow.style.display='';document.getElementById('t-paid').textContent='−'+money(paid);}
  else{paidRow.style.display='none';}
  document.getElementById('t-bal').textContent=money(Math.max(0,bal));
  const balRow=document.getElementById('t-bal-row');
  if(balRow)balRow.className='row bal'+(bal<=0.005?' clear':'');
}

function renderPayments(){
  const el=document.getElementById('pay-list');
  if(!PAYMENTS.length){el.innerHTML='<div class="pay-empty">No payments recorded yet.</div>';return;}
  el.innerHTML=PAYMENTS.map(p=>`<div class="pay-row">
    <div class="pr-meta"><span class="pr-method">${esc(p.method||'Payment')}</span><span class="pr-sub">${fmtD(p.pay_date)}${p.reference?' · '+esc(p.reference):''}</span></div>
    <div class="pr-right"><span class="pay-amt">${money(p.amount)}</span></div>
  </div>`).join('');
}

async function recomputeStatus(){
  const {data:pays}=await db.from('payments').select('*').eq('invoice_id',INV_ID).order('pay_date');PAYMENTS=pays||[];
  const paid=PAYMENTS.reduce((s,p)=>s+Number(p.amount||0),0);
  const bal=Number(INV.grand_total||0)-paid;
  // an invoice is only 'paid' when fully covered; partial when some paid; else unpaid
  const status=bal<=0.005?'paid':(paid>0?'partial':'unpaid');
  await db.from('invoices').update({amount_paid:paid,balance_due:Math.max(0,bal),paid_status:status}).eq('id',INV_ID);
  INV.amount_paid=paid;INV.balance_due=Math.max(0,bal);INV.paid_status=status;
}

async function addPayment(){
  const date=document.getElementById('pay-date').value;
  const amt=parseFloat(document.getElementById('pay-amt').value);
  const method=document.getElementById('pay-method').value;
  const ref=document.getElementById('pay-ref').value.trim();
  const msg=document.getElementById('pay-msg');
  if(!date){msg.textContent='Choose the payment date.';msg.className='msg err';return;}
  if(!method){msg.textContent='Select a payment method.';msg.className='msg err';return;}
  if(!amt||amt<=0){msg.textContent='Enter a valid amount.';msg.className='msg err';return;}
  const balance=Number(INV.grand_total||0)-PAYMENTS.reduce((s,p)=>s+Number(p.amount||0),0);
  if(amt>balance+0.005){
    const ok=await smConfirm('This payment ('+money(amt)+') is more than the balance due ('+money(Math.max(0,balance))+'). Record it anyway?','Amount exceeds balance',{confirmText:'Record anyway',cancelText:'Cancel'});
    if(!ok)return;
  }
  msg.textContent='Recording…';msg.className='msg';
  // Atomic + server-side: status is computed in Postgres, and a paid invoice is locked.
  const {data,error}=await db.rpc('record_payment',{
    p_invoice:INV_ID, p_amount:amt, p_method:method, p_date:date, p_ref:ref||null
  });
  if(error){msg.textContent='Error: '+error.message;msg.className='msg err';return;}
  const row=Array.isArray(data)?data[0]:data;
  if(row){ INV.paid_status=row.out_status; INV.amount_paid=row.out_paid; INV.balance_due=row.out_balance; }
  const {data:pays}=await db.from('payments').select('*').eq('invoice_id',INV_ID).order('pay_date');PAYMENTS=pays||[];
  render();
  document.getElementById('pay-msg').textContent='Payment recorded';document.getElementById('pay-msg').className='msg ok';
}
function smChoice(title,msg,buttons){return new Promise(res=>{__ensureModal();document.getElementById('__sm_ic').className='ic info';document.getElementById('__sm_ic').innerHTML=__SM_IC.info;document.getElementById('__sm_t').textContent=title;document.getElementById('__sm_m').textContent=msg||'';const f=document.getElementById('__sm_f');f.style.flexDirection='column';f.innerHTML=buttons.map(b=>`<button class="b ${b.primary?'primary':(b.plain?'plain':'')}" data-k="${b.key}" style="width:100%;">${b.label}</button>`).join('');const ov=document.getElementById('__sm_ov');const close=v=>{ov.classList.remove('open');f.style.flexDirection='';res(v);};f.querySelectorAll('button').forEach(btn=>btn.onclick=()=>close(btn.dataset.k));ov.onclick=e=>{if(e.target===ov)close(null);};ov.classList.add('open');});}

async function outputInvoice(mode){
  let generateDocument;
  try{ ({generateDocument}=await import('./pdf.js')); }
  catch(err){ await smAlert('Could not load the document generator (pdf.js).','Couldn’t load','danger'); return; }
  const lines=[CLIENT.bill_address,CLIENT.bill_city,CLIENT.bill_postal,CLIENT.bill_province].filter(Boolean);
  const paid=PAYMENTS.reduce((s,p)=>s+Number(p.amount||0),0);
  generateDocument('INVOICE',{
    number:String(INV.invoice_number||''), date:INV.invoice_date, dueDate:INV.due_date||computeDue(INV.invoice_date,INV.terms), terms:TERM_LABEL[INV.terms||'net_30'], servicedBy:INV.serviced_by||'',
    clientContact:CONTACT?((CONTACT.first_name||'')+' '+(CONTACT.last_name||'')).trim():'', pageNo:1,
    client:{company:CLIENT.company_name||'', lines, tel:CONTACT?.tel1||'', email:CONTACT?.email1||''},
    items:ITEMS.map(l=>({category:l.category_name||l.category_code||'',code:l.style_number||'',description:l.description||'',qty:l.quantity,unit:l.unit||'Pc',unitPrice:l.unit_price,amount:l.net_amount})),
    subtotal:INV.subtotal||0, hst:INV.hst||0, grandTotal:INV.grand_total||0,
    amountPaid:paid, balanceDue:Math.max(0,Number(INV.grand_total||0)-paid)
  }, mode);
}
async function printInvoice(){
  const choice=await smChoice('Output invoice #'+(INV.invoice_number||''),'Save it as a PDF or send it straight to your printer.',[
    {key:'pdf',label:'Save as PDF',primary:true},
    {key:'print',label:'Print'},
    {key:'cancel',label:'Cancel',plain:true}
  ]);
  if(choice==='cancel'||choice==null)return;
  await outputInvoice(choice==='print'?'print':'pdf');
}
load();
</script>
