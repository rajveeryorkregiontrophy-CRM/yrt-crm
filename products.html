<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — YRT CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;--sidebar:#0a0c0f;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#c4cad6;--text-3:#9098a8;
    --brass:#e7ebf3;--brass-2:#f4f6fb;--approved:#3ddc84;--danger:#ff4d4d;
    --radius:11px;--radius-sm:8px;
    --fd:'Archivo',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;}
  body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg);}
  .brand{padding:22px 20px 18px;border-bottom:1px solid var(--line);}
  .brand .mark{font-family:var(--fd);font-weight:900;font-size:17px;color:#fff;line-height:1.12;text-transform:uppercase;}
  .brand .mark .amp{color:var(--text);}
  .nav{padding:14px 12px;flex:1;overflow-y:auto;}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:var(--radius-sm);color:var(--text-2);text-decoration:none;font-weight:500;font-size:13.5px;margin-bottom:2px;transition:.13s;}
  .nav a:hover{background:var(--bg-3);color:#fff;}
  .nav a.active{background:linear-gradient(90deg,#f4f6fb,#cfd6e3);color:#15171c;font-weight:700;}
  .nav a .ico{width:17px;height:17px;flex-shrink:0;}
  .nav a .badge{margin-left:auto;background:var(--bg-4);color:var(--text);font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;font-family:var(--fm);}
  .nav a.active .badge{background:rgba(0,0,0,.25);color:#15171c;}
  .nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:#aab0c0;padding:20px 10px 8px;font-weight:700;}
  .nav-sep{height:1px;background:var(--line);margin:14px 14px;opacity:.7;}
  .nav-label:first-child{padding-top:8px;}
  .sidebar-foot{padding:13px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .logout-btn{margin-left:auto;background:var(--bg-3);border:1px solid var(--line-2);color:var(--text-3);width:32px;height:32px;border-radius:8px;cursor:pointer;display:grid;place-items:center;transition:.13s;}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}
  .logout-btn svg{width:16px;height:16px;}
  .avatar{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;display:grid;place-items:center;font-weight:900;font-size:10px;}
  .main{display:flex;flex-direction:column;min-width:0;}
  .topbar{height:62px;background:var(--bg-2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 26px;position:sticky;top:0;z-index:20;}
  .topbar h1{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;}
  .search{margin-left:auto;position:relative;width:280px;}
  .search input{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:var(--radius-sm);padding:9px 12px 9px 34px;font-size:13px;font-family:inherit;color:var(--text);}
  .search input:focus{outline:none;border-color:var(--brass);}.search input::placeholder{color:var(--text-3);}
  .search svg{position:absolute;left:11px;top:10px;width:15px;height:15px;color:var(--text-3);}
  .btn-primary{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;padding:10px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .btn-primary:hover{filter:brightness(1.08);}
  .content{padding:24px 26px 70px;max-width:1560px;width:100%;}
  .cat-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .sub-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;padding-left:2px;}
  .sub-chip{font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--text-3);cursor:pointer;font-weight:600;font-family:var(--fd);letter-spacing:.05em;text-transform:uppercase;display:inline-flex;align-items:center;gap:7px;transition:.13s;}
  .sub-chip:hover{background:var(--bg-3);color:var(--text);}
  .sub-chip.active{background:var(--bg-4);border-color:var(--line-2);color:var(--text);}
  .sub-chip .n{font-family:var(--fm);font-size:10px;color:var(--text-3);}
  .sub-chip.active .n{color:var(--text-2);}
  .sup-name{font-size:12.5px;color:var(--text-2);font-weight:600;white-space:nowrap;}
  .sub-lbl{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);align-self:center;margin-right:2px;}
  .sub-select{background:var(--bg-2);border:1px solid var(--line-2);color:var(--text);font-family:inherit;font-size:12px;font-weight:600;padding:6px 10px;border-radius:7px;min-width:230px;cursor:pointer;}
  .sub-select:focus{outline:none;border-color:var(--text-3);}
  .more-note{padding:10px 18px;font-size:12px;color:var(--text-3);border-bottom:1px solid var(--line);background:var(--bg-3);}
  .cat-chip{font-size:12px;padding:7px 13px;border-radius:7px;border:1px solid var(--line-2);background:var(--bg-2);color:var(--text-2);cursor:pointer;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:8px;}
  .cat-chip:hover{border-color:var(--text-3);color:var(--text);}
  .cat-chip.active{background:#f4f6fb;color:#15171c;border-color:#f4f6fb;font-weight:700;}
  .cat-chip .n{font-family:var(--fm);font-size:10.5px;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.06);}
  .cat-chip.active .n{background:rgba(0,0,0,.15);}
  .panel{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);overflow:hidden;}
  .panel-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:2px solid var(--line-2);}
  .panel-head h2{font-family:var(--fd);font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
  .panel-head .count{font-family:var(--fd);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);background:transparent;border:1px solid var(--line-2);padding:3px 9px;border-radius:5px;}
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:#aab0c0;font-weight:700;padding:11px 16px;border-bottom:2px solid var(--line-2);background:var(--bg-3);}
  thead th.num{text-align:right;}
  tbody td{padding:13px 16px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr{cursor:pointer;transition:background .1s;}tbody tr:hover{background:var(--bg-3);}
  tbody tr:last-child td{border-bottom:none;}
  .cat-code{font-family:var(--fm);font-size:12px;font-weight:700;color:#b9c1d2;}
  .cat-name{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--text-2);}
  .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .p-name{font-weight:700;color:#fff;}
  .p-desc{font-size:12px;color:#aab0c0;margin-top:1px;max-width:480px;}
  .p-style{font-family:var(--fm);font-size:12px;color:var(--text-2);}
  .p-price{font-family:var(--fm);font-weight:700;color:#fff;font-size:14px;}
  /* drawer */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.2s;z-index:50;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:480px;max-width:94vw;background:var(--bg-2);border-left:1px solid var(--line-2);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:60;display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0);}
  .drawer-head{padding:18px 22px;border-bottom:2px solid var(--line-2);display:flex;align-items:center;gap:12px;}
  .drawer-head h3{font-family:var(--fd);font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;}
  .drawer-head .x{margin-left:auto;background:var(--bg-4);border:none;color:var(--text-2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;}
  .drawer-body{padding:22px;overflow-y:auto;flex:1;}
  .drawer-foot{padding:14px 22px;border-top:2px solid var(--line-2);display:flex;gap:10px;justify-content:flex-end;}
  .frow{display:flex;gap:12px;margin-bottom:14px;}.frow .field{flex:1;}.field{margin-bottom:14px;}
  .field-hint{font-size:11px;color:var(--text-3);margin-top:5px;line-height:1.4;}
  label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;margin-bottom:5px;}
  input.in,select.in,textarea.in{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:var(--radius-sm);padding:9px 11px;font-size:13.5px;font-family:inherit;color:var(--text);}
  input.in:focus,select.in:focus,textarea.in:focus{outline:none;border-color:var(--brass);}textarea.in{resize:vertical;min-height:64px;}
  .btn{padding:9px 15px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text);}
  .btn:hover{border-color:var(--brass);}
  .btn-save{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;}
  .btn-del{margin-right:auto;color:var(--danger);border-color:transparent;background:transparent;}
  .btn-del:hover{background:rgba(255,77,77,.12);}
  .state{padding:44px;text-align:center;color:var(--text-3);}
  .msg{margin-right:auto;font-size:13px;color:var(--text-3);align-self:center;}.msg.ok{color:var(--approved);}.msg.err{color:var(--danger);}
  @media(max-width:880px){.app{grid-template-columns:1fr;}.sidebar{display:none;}}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;transition:grid-template-columns .32s cubic-bezier(.4,0,.2,1);}
  .app.collapsed{grid-template-columns:68px 1fr;}
  .sidebar{background:var(--sidebar);color:var(--text-2);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--line);width:240px;transition:width .32s cubic-bezier(.4,0,.2,1);z-index:50;overflow:hidden;}
  .app.collapsed .sidebar{width:68px;}
  .app.collapsed .sidebar:hover{width:240px;box-shadow:10px 0 36px -8px rgba(0,0,0,.65);}
  /* keep inner blocks at full width so text never squishes — the sidebar clips it */
  .sidebar .brand,.sidebar .nav,.sidebar .sidebar-foot{width:240px;flex-shrink:0;}
  /* labels/sub-text fade out only; layout width is fixed so nothing mushes */
  .nav a span.lbl,.nav a .badge,.brand .sub,.brand .mark,.sidebar-foot .foot-text,.nav-label{transition:opacity .32s cubic-bezier(.4,0,.2,1);}
  .app.collapsed .sidebar .brand .sub,
  .app.collapsed .sidebar .brand .mark,
  .app.collapsed .sidebar .nav-label,
  .app.collapsed .sidebar .nav a span.lbl,
  .app.collapsed .sidebar .nav a .badge,
  .app.collapsed .sidebar .sidebar-foot .foot-text{opacity:0;pointer-events:none;}
  .app.collapsed .sidebar:hover .brand .sub,
  .app.collapsed .sidebar:hover .brand .mark,
  .app.collapsed .sidebar:hover .nav-label,
  .app.collapsed .sidebar:hover .nav a span.lbl,
  .app.collapsed .sidebar:hover .nav a .badge,
  .app.collapsed .sidebar:hover .sidebar-foot .foot-text{opacity:1;pointer-events:auto;}
  /* compact "YRT" marks shown only while collapsed (and not hovered) */
  .brand-mini{display:none;position:absolute;top:20px;left:0;width:68px;text-align:center;font-family:var(--fd);font-weight:900;font-size:15px;color:#fff;letter-spacing:.04em;}
  .app.collapsed .sidebar .brand-mini{display:block;}
  .app.collapsed .sidebar:hover .brand-mini{display:none;}
  .app.collapsed .sidebar:not(:hover) .nav a span.lbl,
  .app.collapsed .sidebar:not(:hover) .brand .mark,
  .app.collapsed .sidebar:not(:hover) .sidebar-foot .foot-text{visibility:hidden;}
  .brand{position:relative;}
  .nav a{overflow:hidden;}
  .app.collapsed .sidebar:not(:hover) .nav a{padding-left:14px;padding-right:14px;}
  .app.collapsed .sidebar:not(:hover) .nav a.active{background:transparent;}
  .app.collapsed .sidebar:not(:hover) .nav a.active .ico{color:#fff;}
  .app.collapsed .sidebar:not(:hover) .brand{padding-left:0;padding-right:0;}
</style>
</head>

<script type="module">
import { supabase as db, requireAuth, signOut, currentUser } from './auth.js';
await requireAuth();

// ---- shared styled modal (replaces native alert/confirm) ----
function __ensureModal(){
  if(document.getElementById('__sm_ov'))return;
  const css=document.createElement('style');
  css.textContent='#__sm_ov{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:9000;padding:20px;}#__sm_ov.open{display:flex;}#__sm{background:#16181d;border:1px solid #414a5c;border-radius:14px;width:100%;max-width:410px;overflow:hidden;font-family:Inter,system-ui,sans-serif;}#__sm .h{display:flex;gap:13px;align-items:flex-start;padding:22px 24px 0;}#__sm .ic{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;}#__sm .ic.warn{background:rgba(255,182,39,.15);color:#ffb627;}#__sm .ic.info{background:rgba(61,165,255,.15);color:#3da5ff;}#__sm .ic.danger{background:rgba(255,77,77,.15);color:#ff4d4d;}#__sm .ic svg{width:22px;height:22px;}#__sm .t{font-family:Archivo,sans-serif;font-weight:800;font-size:16px;color:#eef0f4;margin-bottom:5px;}#__sm .m{font-size:13.5px;color:#c4cad6;line-height:1.5;}#__sm .f{display:flex;gap:10px;padding:20px 24px 22px;justify-content:flex-end;}#__sm .b{padding:10px 17px;border-radius:8px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid #414a5c;background:#1f2229;color:#eef0f4;}#__sm .b:hover{border-color:#9098a8;}#__sm .b.primary{background:#f4f6fb;color:#15171c;border-color:#f4f6fb;}#__sm .b.danger{background:#ff4d4d;color:#fff;border-color:#ff4d4d;}#__sm .b.plain{background:transparent;border-color:transparent;color:#9098a8;}';
  document.head.appendChild(css);
  const ov=document.createElement('div');ov.id='__sm_ov';
  ov.innerHTML='<div id="__sm"><div class="h"><div class="ic warn" id="__sm_ic"></div><div><div class="t" id="__sm_t"></div><div class="m" id="__sm_m"></div></div></div><div class="f" id="__sm_f"></div></div>';
  document.body.appendChild(ov);
}
const __SM_IC={warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',danger:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'};
function smAlert(msg,title,type){return new Promise(res=>{__ensureModal();type=type||'info';document.getElementById('__sm_ic').className='ic '+type;document.getElementById('__sm_ic').innerHTML=__SM_IC[type]||__SM_IC.info;document.getElementById('__sm_t').textContent=title||'Notice';document.getElementById('__sm_m').textContent=msg||'';const f=document.getElementById('__sm_f');f.innerHTML='<button class="b primary" id="__sm_ok">Got it</button>';const ov=document.getElementById('__sm_ov');const close=()=>{ov.classList.remove('open');res(true);};f.querySelector('#__sm_ok').onclick=close;ov.onclick=e=>{if(e.target===ov)close();};ov.classList.add('open');});}
function smConfirm(msg,title,opts){opts=opts||{};return new Promise(res=>{__ensureModal();const type=opts.type||'warn';document.getElementById('__sm_ic').className='ic '+type;document.getElementById('__sm_ic').innerHTML=__SM_IC[type]||__SM_IC.warn;document.getElementById('__sm_t').textContent=title||'Confirm';document.getElementById('__sm_m').textContent=msg||'';const f=document.getElementById('__sm_f');f.innerHTML='<button class="b plain" id="__sm_no">'+(opts.cancelText||'Cancel')+'</button><button class="b '+(opts.danger?'danger':'primary')+'" id="__sm_yes">'+(opts.confirmText||'Confirm')+'</button>';const ov=document.getElementById('__sm_ov');const close=v=>{ov.classList.remove('open');res(v);};f.querySelector('#__sm_yes').onclick=()=>close(true);f.querySelector('#__sm_no').onclick=()=>close(false);ov.onclick=e=>{if(e.target===ov)close(false);};ov.classList.add('open');});}

const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};
const money=n=>'$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
let PRODUCTS=[],EDITING=null,CAT='all',SUB='all',SUPPLIERS=[];

async function load(){
  // Supabase caps a select at 1000 rows — page through so the whole catalogue loads.
  let all=[],from=0;const PAGE=1000;
  while(true){
    const {data,error}=await db.from('products')
      .select('*, suppliers:default_supplier_id(short_name,company_name)')
      .order('category_name').order('category_code').order('name')
      .range(from,from+PAGE-1);
    if(error){document.getElementById('wrap').innerHTML=`<div class="state">Couldn't load — ${error.message}</div>`;return;}
    all=all.concat(data||[]);
    if(!data||data.length<PAGE)break;
    from+=PAGE;
  }
  PRODUCTS=all;
  const {data:sups}=await db.from('suppliers').select('id,supplier_number,company_name,short_name').order('company_name');
  SUPPLIERS=sups||[];
  const _npr=document.getElementById('nav-products');if(_npr)_npr.textContent=PRODUCTS.length;
  renderCats();render();
}
const supName=p=>p.suppliers?(p.suppliers.short_name||p.suppliers.company_name||''):'';
function renderCats(){
  // Primary tabs = top-level category (Awards, Trophies, …). Scales as new CSVs arrive.
  const cats={};PRODUCTS.forEach(p=>{const k=p.category_name||'Uncategorized';cats[k]=(cats[k]||0)+1;});
  const bar=document.getElementById('cat-bar');
  let html=`<button class="cat-chip ${CAT==='all'?'active':''}" data-c="all">All <span class="n">${PRODUCTS.length}</span></button>`;
  Object.entries(cats).sort().forEach(([name,n])=>{
    html+=`<button class="cat-chip ${CAT===name?'active':''}" data-c="${esc(name)}"><span class="cat-dot" style="background:${catColor(name)}"></span>${esc(name)} <span class="n">${n}</span></button>`;
  });
  bar.innerHTML=html;
  bar.querySelectorAll('.cat-chip').forEach(c=>c.addEventListener('click',()=>{CAT=c.dataset.c;SUB='all';renderCats();render();}));

  // Secondary row = subcategories within the selected category (ACRYLIC / CRYSTAL / GLASS)
  const sbar=document.getElementById('sub-bar');
  if(CAT==='all'){sbar.innerHTML='';sbar.style.display='none';return;}
  const subs={};
  PRODUCTS.filter(p=>(p.category_name||'Uncategorized')===CAT)
          .forEach(p=>{const k=p.category_code||'—';subs[k]=(subs[k]||0)+1;});
  const keys=Object.keys(subs);
  if(keys.length<2){sbar.innerHTML='';sbar.style.display='none';return;}
  sbar.style.display='flex';
  const inCat=PRODUCTS.filter(p=>(p.category_name||'Uncategorized')===CAT).length;
  keys.sort();
  // Families like Resins (70 types) and Medals (65) would be an unusable wall of chips —
  // switch to a select once there are more than 8.
  if(keys.length>8){
    sbar.innerHTML=`<label class="sub-lbl">Type</label>
      <select class="sub-select" id="sub-select">
        <option value="all"${SUB==='all'?' selected':''}>All Types (${inCat})</option>
        ${keys.map(k=>`<option value="${esc(k)}"${SUB===k?' selected':''}>${esc(k)} (${subs[k]})</option>`).join('')}
      </select>`;
    sbar.querySelector('#sub-select').addEventListener('change',e=>{SUB=e.target.value;render();});
    return;
  }
  let sh=`<button class="sub-chip ${SUB==='all'?'active':''}" data-s="all">All Types <span class="n">${inCat}</span></button>`;
  keys.forEach(k=>{sh+=`<button class="sub-chip ${SUB===k?'active':''}" data-s="${esc(k)}">${esc(k)} <span class="n">${subs[k]}</span></button>`;});
  sbar.innerHTML=sh;
  sbar.querySelectorAll('.sub-chip').forEach(c=>c.addEventListener('click',()=>{SUB=c.dataset.s;renderCats();render();}));
}
function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let rows=PRODUCTS.filter(p=>{
    if(CAT!=='all'&&(p.category_name||'Uncategorized')!==CAT)return false;
    if(SUB!=='all'&&(p.category_code||'—')!==SUB)return false;
    if(q){const hay=((p.name||'')+' '+(p.style_number||'')+' '+(p.category_name||'')+' '+(p.category_code||'')+' '+supName(p)).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  document.getElementById('count').textContent=rows.length+(rows.length===1?' item':' items');
  if(!rows.length){document.getElementById('wrap').innerHTML=`<div class="state">No products found. Click “New Product” to add one.</div>`;return;}
  // The catalogue is 8,000+ items — rendering every row at once locks the page up.
  // Show the first 300 and let the search / filters narrow it down.
  const CAP=300, total=rows.length, capped=total>CAP;
  if(capped) rows=rows.slice(0,CAP);
  const moreNote=capped?`<div class="more-note">Showing ${CAP} of ${total.toLocaleString()} — use the search or filters to narrow it down.</div>`:'';
  document.getElementById('wrap').innerHTML=moreNote+`<table><thead><tr><th style="width:150px;">Category</th><th style="width:110px;">Type</th><th style="width:130px;">Style #</th><th>Product</th><th style="width:120px;">Supplier</th><th class="num" style="width:120px;">Base Price</th></tr></thead><tbody>${rows.map(p=>`
    <tr data-id="${p.id}">
      <td><span class="cat-name"><span class="cat-dot" style="background:${catColor(p.category_name||p.category_code)}"></span>${esc(p.category_name||'—')}</span></td>
      <td><span class="cat-code">${esc(p.category_code||'—')}</span></td>
      <td><span class="p-style">${esc(p.style_number||'—')}</span></td>
      <td><div class="p-name">${esc(p.name)}</div></td>
      <td><span class="sup-name">${esc(supName(p)||'—')}</span></td>
      <td class="num"><span class="p-price">${money(p.base_price)}</span></td>
    </tr>`).join('')}</tbody></table>`;
  document.querySelectorAll('tbody tr[data-id]').forEach(tr=>tr.addEventListener('click',()=>edit(tr.dataset.id)));
}
const CAT_COLORS=['#3da5ff','#3ddc84','#ffb627','#b06bff','#ff6b35','#ff4d8f','#4ddbd0','#a0b0c8'];
function catColor(key){let h=0;const s=String(key||'');for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return CAT_COLORS[h%CAT_COLORS.length];}
function openD(){document.getElementById('overlay').classList.add('open');document.getElementById('drawer').classList.add('open');}
function closeD(){document.getElementById('overlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');document.getElementById('d-msg').textContent='';}
function form(p){
  document.getElementById('d-body').innerHTML=`
    <div class="frow"><div class="field"><label>Category Code</label><input class="in" id="category_code" value="${esc(p.category_code||'')}" placeholder="0041"></div>
      <div class="field"><label>Category Name</label><input class="in" id="category_name" value="${esc(p.category_name||'')}" placeholder="Medals"></div></div>
    <div class="field"><label>Style Number</label><input class="in" id="style_number" value="${esc(p.style_number||'')}" placeholder="MS36000"></div>
    <div class="field"><label>Product Name *</label><input class="in" id="name" value="${esc(p.name||'')}"></div>
    <div class="field"><label>Description</label><textarea class="in" id="description">${esc(p.description||'')}</textarea></div>
    <div class="frow"><div class="field"><label>Unit</label><input class="in" id="unit" value="${esc(p.unit||'Pc')}"></div>
      <div class="field"><label>Base Price</label><input class="in" id="base_price" type="number" step="0.01" value="${p.base_price??0}"></div></div>
    <div class="field"><label>Default Supplier</label><select class="in" id="default_supplier_id"><option value="">— None —</option>${SUPPLIERS.map(s=>`<option value="${s.id}" ${p.default_supplier_id===s.id?'selected':''}>${esc(s.company_name||s.short_name||'')}${s.supplier_number?' (#'+s.supplier_number+')':''}</option>`).join('')}</select><div class="field-hint">Auto-fills as the supplier when this product is added to a Sales Order (you can still override it).</div></div>`;
}
function newP(){EDITING=null;document.getElementById('d-title').textContent='New Product';document.getElementById('d-del').style.display='none';form({});openD();}
function edit(id){const p=PRODUCTS.find(x=>x.id===id);EDITING=p;document.getElementById('d-title').textContent='Edit Product';document.getElementById('d-del').style.display='inline-flex';form(p);openD();}
async function save(){
  const msg=document.getElementById('d-msg');const name=document.getElementById('name').value.trim();
  if(!name){msg.textContent='Product name required';msg.className='msg err';return;}
  msg.textContent='Saving…';msg.className='msg';
  const payload={category_code:document.getElementById('category_code').value||null,category_name:document.getElementById('category_name').value||null,
    style_number:document.getElementById('style_number').value||null,name,description:document.getElementById('description').value||null,
    unit:document.getElementById('unit').value||'Pc',base_price:parseFloat(document.getElementById('base_price').value)||0,
    default_supplier_id:document.getElementById('default_supplier_id').value||null};
  let err;
  if(EDITING){({error:err}=await db.from('products').update(payload).eq('id',EDITING.id));}
  else{({error:err}=await db.from('products').insert(payload));}
  if(err){msg.textContent='Error: '+err.message;msg.className='msg err';return;}
  msg.textContent='Saved ✓';msg.className='msg ok';await load();setTimeout(closeD,500);
}
async function del(){
  if(!EDITING)return;
  if(!await smConfirm('Delete this product? This cannot be undone.','Delete product?',{confirmText:'Delete',danger:true}))return;
  const {error}=await db.from('products').delete().eq('id',EDITING.id);
  if(error){document.getElementById('d-msg').textContent='Error: '+error.message;document.getElementById('d-msg').className='msg err';return;}
  await load();closeD();
}
document.getElementById('new-product').addEventListener('click',newP);
document.getElementById('d-close').addEventListener('click',closeD);
document.getElementById('d-cancel').addEventListener('click',closeD);
document.getElementById('overlay').addEventListener('click',closeD);
document.getElementById('d-save').addEventListener('click',save);
document.getElementById('d-del').addEventListener('click',del);
document.getElementById('search').addEventListener('input',render);
const _lo=document.getElementById('logout-btn');if(_lo)_lo.addEventListener('click',()=>signOut());
load();
</script>
</body>
</html>
