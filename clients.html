<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clients — YRT CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;--sidebar:#0a0c0f;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#aeb4c0;--text-3:#767d8c;
    --brass:#e7ebf3;--brass-2:#f4f6fb;--brass-bg:rgba(231,235,243,.10);
    --approved:#3ddc84;--danger:#ff4d4d;--star:#ffb627;
    --radius:11px;--radius-sm:8px;
    --fd:'Archivo',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg);}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
  .sidebar{background:var(--sidebar);color:var(--text-2);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--line);}
  .brand{padding:22px 20px 18px;border-bottom:1px solid var(--line);}
  .brand .mark{font-family:var(--fd);font-weight:900;font-size:17px;color:#fff;line-height:1.12;text-transform:uppercase;}
  .brand .mark .amp{color:var(--brass-2);}
  .brand .sub{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-3);margin-top:6px;}
  .nav{padding:14px 12px;flex:1;overflow-y:auto;}
  .nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--text-3);padding:14px 10px 6px;}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:var(--radius-sm);color:var(--text-2);text-decoration:none;font-weight:500;font-size:13.5px;margin-bottom:2px;transition:.13s;}
  .nav a:hover{background:var(--bg-3);color:#fff;}
  .nav a.active{background:linear-gradient(90deg,#f4f6fb,#cfd6e3);color:#15171c;font-weight:700;}
  .nav a .ico{width:17px;height:17px;flex-shrink:0;}
  .nav a .badge{margin-left:auto;background:var(--bg-4);color:var(--text);font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;font-family:var(--fm);}
  .nav a.active .badge{background:rgba(0,0,0,.25);color:#15171c;}
  .sidebar-foot{padding:13px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .logout-btn{margin-left:auto;background:var(--bg-3);border:1px solid var(--line-2);color:var(--text-3);width:32px;height:32px;border-radius:8px;cursor:pointer;display:grid;place-items:center;transition:.13s;}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}
  .logout-btn svg{width:16px;height:16px;}
  .avatar{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;display:grid;place-items:center;font-weight:900;font-size:10px;}

  .main{display:flex;flex-direction:column;min-width:0;}
  .topbar{height:62px;background:var(--bg-2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 26px;position:sticky;top:0;z-index:20;}
  .topbar h1{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;}
  .search{margin-left:auto;position:relative;width:280px;}
  .search input{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:var(--radius-sm);padding:9px 12px 9px 34px;font-size:13px;font-family:inherit;color:var(--text);}
  .search input:focus{outline:none;border-color:var(--brass);}
  .search input::placeholder{color:var(--text-3);}
  .search svg{position:absolute;left:11px;top:10px;width:15px;height:15px;color:var(--text-3);}
  .btn-primary{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;padding:10px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .btn-primary:hover{filter:brightness(1.08);}

  .content{padding:24px 26px 70px;max-width:1560px;width:100%;}
  .panel{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .panel-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:2px solid var(--line-2);}
  .panel-head h2{font-family:var(--fd);font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
  .panel-head .count{font-family:var(--fd);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);background:transparent;border:1px solid var(--line-2);padding:3px 9px;border-radius:5px;}

  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);font-weight:700;padding:10px 16px;border-bottom:2px solid var(--line-2);background:var(--bg-3);}
  thead th.num{text-align:right;}
  tbody td{padding:13px 16px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr{cursor:pointer;transition:background .1s;}
  tbody tr:hover{background:var(--bg-3);}
  tbody tr:last-child td{border-bottom:none;}
  .c-name{font-weight:700;color:#fff;font-size:14px;}
  .c-loc{font-size:12px;color:var(--text-3);margin-top:1px;}
  .c-contact{font-size:13px;color:var(--text-2);}
  .c-mono{font-family:var(--fm);font-size:12.5px;color:var(--text-2);}
  .stars{color:var(--star);font-size:13px;letter-spacing:1px;}
  .stars .off{color:var(--line-2);}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--bg-4);color:var(--text-2);font-family:var(--fm);}

  /* drawer */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.2s;z-index:50;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:560px;max-width:94vw;background:var(--bg-2);border-left:1px solid var(--line-2);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:60;display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0);}
  .drawer-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;}
  .drawer-head h3{font-family:var(--fd);font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;}
  .drawer-head .x{margin-left:auto;background:var(--bg-4);border:none;color:var(--text-2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;}
  .drawer-head .x:hover{background:var(--line-2);color:#fff;}
  .drawer-body{padding:22px;overflow-y:auto;flex:1;}
  .drawer-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;}

  .fgroup{margin-bottom:20px;}
  .fgroup-t{font-family:var(--fd);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--brass-2);margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--line);}
  .frow{display:flex;gap:12px;margin-bottom:12px;}
  .frow .field{flex:1;}
  label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;margin-bottom:5px;}
  input.in,select.in,textarea.in{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:var(--radius-sm);padding:9px 11px;font-size:13.5px;font-family:inherit;color:var(--text);}
  input.in:focus,select.in:focus,textarea.in:focus{outline:none;border-color:var(--brass);}
  textarea.in{resize:vertical;min-height:60px;}
  .btn{padding:9px 15px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text);}
  .btn:hover{border-color:var(--brass);}
  .btn-save{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;}
  .btn-save:hover{filter:brightness(1.08);}
  .contact-card{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;}
  .contact-card .frow{margin-bottom:8px;}
  .contact-card .frow:last-child{margin-bottom:0;}
  .add-contact{width:100%;padding:9px;border:1px dashed var(--line-2);background:transparent;border-radius:var(--radius-sm);color:var(--text-3);font-weight:600;cursor:pointer;font-family:inherit;font-size:13px;}
  .add-contact:hover{border-color:var(--brass);color:var(--brass-2);}
  .state{padding:44px;text-align:center;color:var(--text-3);}
  .msg{margin-right:auto;font-size:13px;color:var(--text-3);align-self:center;}
  .msg.ok{color:var(--approved);}.msg.err{color:var(--danger);}
  @media(max-width:880px){.app{grid-template-columns:1fr;}.sidebar{display:none;}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="mark">York Region<br>Trophy <span class="amp">&amp;</span> Promotion</div><div class="sub">Operations</div></div>
    <nav class="nav">
      <div class="nav-label">Workspace</div>
      <a href="index.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Sales Inbox</a>
      <a href="#"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Quotes &amp; Inquiries</a>
      <a href="clients.html" class="active"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Clients <span class="badge" id="nav-clients">0</span></a>
      <a href="#"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Products</a>
      <a href="#"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>Invoices</a>
      <div class="nav-label">Production</div>
      <a href="#"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Production Lineup</a>
      <a href="#"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>Reports</a>
    </nav>
    <div class="sidebar-foot"><div class="avatar">YRT</div><div><div style="color:var(--text);font-weight:700;">YRT CRM</div><div style="font-size:11px;color:var(--text-3);">Operations Suite</div></div><button class="logout-btn" id="logout-btn" title="Sign out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <h1>Clients</h1>
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" id="search" placeholder="Search by name, city, contact…"></div>
      <button class="btn-primary" id="new-client"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg>New Client</button>
    </header>
    <div class="content">
      <section class="panel">
        <div class="panel-head"><h2>All Clients</h2><span class="count" id="count">—</span></div>
        <div id="wrap"><div class="state">Loading…</div></div>
      </section>
    </div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head"><h3 id="d-title">New Client</h3><button class="x" id="d-close">×</button></div>
  <div class="drawer-body" id="d-body"></div>
  <div class="drawer-foot"><span class="msg" id="d-msg"></span><button class="btn" id="d-cancel">Cancel</button><button class="btn-save btn" id="d-save">Save Client</button></div>
</aside>

<script type="module">
import { supabase as db, requireAuth, signOut, currentUser } from './auth.js';
await requireAuth();
const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};
const PROV=['Ontario','Alberta','British Columbia','Manitoba','New Brunswick','Newfoundland and Labrador','Nova Scotia','Prince Edward Island','Quebec','Saskatchewan'];

let CLIENTS=[],EDITING=null,CONTACTS=[];

function stars(n){n=n||0;let s='';for(let i=1;i<=5;i++)s+=`<span class="${i<=n?'':'off'}">★</span>`;return `<span class="stars">${s}</span>`;}

async function load(){
  const {data,error}=await db.from('clients').select('*, contacts(*)').order('company_name');
  if(error){document.getElementById('wrap').innerHTML=`<div class="state">Couldn't load — ${error.message}</div>`;return;}
  CLIENTS=data||[];
  document.getElementById('nav-clients').textContent=CLIENTS.length;
  render();
}
function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let rows=CLIENTS.filter(c=>{
    if(!q)return true;
    // search company + city + EVERY contact (name, designation, phone, email)
    const contactText=(c.contacts||[]).map(ct=>[ct.first_name,ct.last_name,ct.designation,ct.tel1,ct.tel2,ct.email1,ct.email2].filter(Boolean).join(' ')).join(' ');
    const hay=((c.company_name||'')+' '+(c.bill_city||'')+' '+(c.bill_province||'')+' '+contactText).toLowerCase();
    return hay.includes(q);
  });
  document.getElementById('count').textContent=rows.length+(rows.length===1?' client':' clients');
  if(!rows.length){document.getElementById('wrap').innerHTML=`<div class="state">No clients found. Click “New Client” to add one.</div>`;return;}
  const body=rows.map(c=>{
    const prim=(c.contacts||[]).find(x=>x.is_primary)||(c.contacts||[])[0]||{};
    const cn=((prim.first_name||'')+' '+(prim.last_name||'')).trim();
    const n=(c.contacts||[]).length;
    return `<tr data-id="${c.id}">
      <td><div class="c-name">${esc(c.company_name)}</div><div class="c-loc">${esc([c.bill_city,c.bill_province].filter(Boolean).join(', ')||'—')}</div></td>
      <td><div class="c-contact">${esc(cn||'—')}</div><div class="c-loc">${esc(prim.designation||'')}</div></td>
      <td class="c-mono">${esc(prim.tel1||'—')}</td>
      <td><span class="pill">${n} ${n===1?'person':'people'}</span></td>
      <td>${stars(c.rating)}</td>
      <td><span class="pill">${c.terms_days?c.terms_days+'d terms':'Prepaid'}</span></td>
    </tr>`;}).join('');
  document.getElementById('wrap').innerHTML=`<table><thead><tr><th>Company</th><th>Primary Contact</th><th>Telephone</th><th>Contacts</th><th>Rating</th><th>Terms</th></tr></thead><tbody>${body}</tbody></table>`;
  document.querySelectorAll('tbody tr[data-id]').forEach(tr=>tr.addEventListener('click',()=>location.href='client.html?id='+encodeURIComponent(tr.dataset.id)));
}
function openDrawer(){document.getElementById('overlay').classList.add('open');document.getElementById('drawer').classList.add('open');}
function closeDrawer(){document.getElementById('overlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');document.getElementById('d-msg').textContent='';}

function newClient(){EDITING=null;CONTACTS=[{first_name:'',last_name:'',designation:'',tel1:'',email1:'',is_primary:true}];document.getElementById('d-title').textContent='New Client';drawForm({});openDrawer();}
function edit(id){const c=CLIENTS.find(x=>x.id===id);EDITING=c;CONTACTS=(c.contacts||[]).map(x=>({...x}));if(!CONTACTS.length)CONTACTS=[{first_name:'',last_name:'',designation:'',tel1:'',email1:'',is_primary:true}];document.getElementById('d-title').textContent=c.company_name;drawForm(c);openDrawer();}

function drawForm(c){
  const provOpts=PROV.map(p=>`<option ${c.bill_province===p?'selected':''}>${p}</option>`).join('');
  document.getElementById('d-body').innerHTML=`
    <div class="fgroup">
      <div class="fgroup-t">Company</div>
      <div class="field" style="margin-bottom:12px;"><label>Company Name *</label><input class="in" id="company_name" value="${esc(c.company_name||'')}"></div>
      <div class="frow"><div class="field"><label>Rating</label><select class="in" id="rating">${[0,1,2,3,4,5].map(n=>`<option value="${n}" ${(c.rating||0)===n?'selected':''}>${n===0?'Unrated':n+' ★'}</option>`).join('')}</select></div>
        <div class="field"><label>Terms (days)</label><input class="in" id="terms_days" type="number" value="${c.terms_days||0}"></div>
        <div class="field"><label>Serviced By</label><input class="in" id="serviced_by" value="${esc(c.serviced_by||'')}"></div></div>
    </div>
    <div class="fgroup">
      <div class="fgroup-t">Billing Address</div>
      <div class="frow"><div class="field" style="max-width:90px;"><label>Unit</label><input class="in" id="bill_unit" value="${esc(c.bill_unit||'')}"></div>
        <div class="field"><label>Address</label><input class="in" id="bill_address" value="${esc(c.bill_address||'')}"></div></div>
      <div class="frow"><div class="field"><label>City</label><input class="in" id="bill_city" value="${esc(c.bill_city||'')}"></div>
        <div class="field" style="max-width:120px;"><label>Postal</label><input class="in" id="bill_postal" value="${esc(c.bill_postal||'')}"></div></div>
      <div class="field"><label>Province</label><select class="in" id="bill_province">${provOpts}</select></div>
    </div>
    <div class="fgroup">
      <div class="fgroup-t">Contacts</div>
      <div id="contacts-list"></div>
      <button class="add-contact" id="add-contact">+ Add contact</button>
    </div>
    <div class="fgroup">
      <div class="fgroup-t">Notes</div>
      <div class="field" style="margin-bottom:12px;"><label>General Notes</label><textarea class="in" id="notes">${esc(c.notes||'')}</textarea></div>
      <div class="field"><label>Internal Notes (staff only)</label><textarea class="in" id="internal_notes">${esc(c.internal_notes||'')}</textarea></div>
    </div>`;
  drawContacts();
  document.getElementById('add-contact').addEventListener('click',()=>{CONTACTS.push({first_name:'',last_name:'',designation:'',tel1:'',email1:'',is_primary:CONTACTS.length===0});drawContacts();});
}
function drawContacts(){
  document.getElementById('contacts-list').innerHTML=CONTACTS.map((ct,i)=>`
    <div class="contact-card">
      <div class="frow"><div class="field"><label>First Name</label><input class="in ct" data-i="${i}" data-k="first_name" value="${esc(ct.first_name||'')}"></div>
        <div class="field"><label>Last Name</label><input class="in ct" data-i="${i}" data-k="last_name" value="${esc(ct.last_name||'')}"></div></div>
      <div class="frow"><div class="field"><label>Designation</label><input class="in ct" data-i="${i}" data-k="designation" value="${esc(ct.designation||'')}"></div>
        <div class="field"><label>Telephone</label><input class="in ct" data-i="${i}" data-k="tel1" value="${esc(ct.tel1||'')}"></div></div>
      <div class="frow"><div class="field"><label>Email</label><input class="in ct" data-i="${i}" data-k="email1" value="${esc(ct.email1||'')}"></div></div>
      <div class="frow" style="align-items:center;"><label style="margin:0;display:flex;gap:7px;align-items:center;cursor:pointer;color:var(--text-2);text-transform:none;letter-spacing:0;font-size:12.5px;"><input type="radio" name="primary" ${ct.is_primary?'checked':''} data-prim="${i}"> Primary contact</label>
        ${CONTACTS.length>1?`<button class="btn" data-del="${i}" style="margin-left:auto;padding:5px 11px;">Remove</button>`:''}</div>
    </div>`).join('');
  document.querySelectorAll('.ct').forEach(inp=>inp.addEventListener('input',()=>{CONTACTS[+inp.dataset.i][inp.dataset.k]=inp.value;}));
  document.querySelectorAll('[data-prim]').forEach(r=>r.addEventListener('change',()=>{CONTACTS.forEach((c,i)=>c.is_primary=(i===+r.dataset.prim));}));
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{CONTACTS.splice(+b.dataset.del,1);if(!CONTACTS.some(c=>c.is_primary)&&CONTACTS.length)CONTACTS[0].is_primary=true;drawContacts();}));
}

async function save(){
  const msg=document.getElementById('d-msg');
  const name=document.getElementById('company_name').value.trim();
  if(!name){msg.textContent='Company name is required';msg.className='msg err';return;}
  msg.textContent='Saving…';msg.className='msg';
  const payload={company_name:name,rating:+document.getElementById('rating').value||null,
    terms_days:+document.getElementById('terms_days').value||0,serviced_by:document.getElementById('serviced_by').value||null,
    bill_unit:document.getElementById('bill_unit').value||null,bill_address:document.getElementById('bill_address').value||null,
    bill_city:document.getElementById('bill_city').value||null,bill_postal:document.getElementById('bill_postal').value||null,
    bill_province:document.getElementById('bill_province').value||null,notes:document.getElementById('notes').value||null,
    internal_notes:document.getElementById('internal_notes').value||null};
  let clientId;
  if(EDITING){const {error}=await db.from('clients').update(payload).eq('id',EDITING.id);if(error){msg.textContent='Error: '+error.message;msg.className='msg err';return;}clientId=EDITING.id;
    await db.from('contacts').delete().eq('client_id',clientId);
  }else{const {data,error}=await db.from('clients').insert(payload).select().single();if(error){msg.textContent='Error: '+error.message;msg.className='msg err';return;}clientId=data.id;}
  const validContacts=CONTACTS.filter(c=>(c.first_name||c.last_name||c.tel1||c.email1));
  if(validContacts.length){
    const rows=validContacts.map(c=>({client_id:clientId,first_name:c.first_name||null,last_name:c.last_name||null,designation:c.designation||null,tel1:c.tel1||null,email1:c.email1||null,is_primary:!!c.is_primary}));
    const {error}=await db.from('contacts').insert(rows);if(error){msg.textContent='Contacts error: '+error.message;msg.className='msg err';return;}
  }
  msg.textContent='Saved ✓';msg.className='msg ok';
  await load();setTimeout(closeDrawer,600);
}

document.getElementById('new-client').addEventListener('click',newClient);
document.getElementById('d-close').addEventListener('click',closeDrawer);
document.getElementById('d-cancel').addEventListener('click',closeDrawer);
document.getElementById('overlay').addEventListener('click',closeDrawer);
document.getElementById('d-save').addEventListener('click',save);
document.getElementById('search').addEventListener('input',render);
const _lo=document.getElementById('logout-btn');if(_lo)_lo.addEventListener('click',()=>signOut());
load();
</script>
</body>
</html>
