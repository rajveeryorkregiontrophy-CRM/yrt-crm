<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliers</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;--sidebar:#0a0c0f;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#c4cad6;--text-3:#9098a8;
    --brass:#e7ebf3;--brass-2:#f4f6fb;--danger:#ff4d4d;--approved:#3ddc84;
    --radius:11px;--radius-sm:8px;
    --fd:'Archivo',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;}
  body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg);}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
  .sidebar{background:var(--sidebar);color:var(--text-2);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--line);}
  .brand{padding:22px 20px 18px;border-bottom:1px solid var(--line);}
  .brand .mark{font-family:var(--fd);font-weight:900;font-size:17px;color:#fff;line-height:1.12;text-transform:uppercase;}
  .brand .mark .amp{color:var(--brass-2);}
  .brand .sub{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#aab0c0;margin-top:6px;font-weight:600;}
  .nav{padding:14px 12px;flex:1;overflow-y:auto;}
  .nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:#aab0c0;padding:14px 10px 6px;font-weight:700;}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:var(--radius-sm);color:var(--text-2);text-decoration:none;font-weight:500;font-size:13.5px;margin-bottom:2px;transition:.13s;}
  .nav a:hover{background:var(--bg-3);color:#fff;}
  .nav a.active{background:linear-gradient(90deg,#f4f6fb,#cfd6e3);color:#15171c;font-weight:700;}
  .nav a .ico{width:17px;height:17px;flex-shrink:0;}
  .nav a .badge{margin-left:auto;background:var(--bg-4);color:var(--text);font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;font-family:var(--fm);}
  .sidebar-foot{padding:13px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .logout-btn{margin-left:auto;background:var(--bg-3);border:1px solid var(--line-2);color:var(--text-3);width:32px;height:32px;border-radius:8px;cursor:pointer;display:grid;place-items:center;transition:.13s;}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}.logout-btn svg{width:16px;height:16px;}
  .avatar{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#f4f6fb,#cfd6e3);color:#15171c;display:grid;place-items:center;font-weight:900;font-size:10px;}
  .main{display:flex;flex-direction:column;min-width:0;}
  .topbar{height:62px;background:var(--bg-2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 26px;position:sticky;top:0;z-index:20;}
  .topbar h1{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;}
  .search{margin-left:auto;position:relative;width:280px;}
  .search input{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:var(--radius-sm);padding:9px 12px 9px 34px;font-size:13px;font-family:inherit;color:var(--text);}
  .search input:focus{outline:none;border-color:var(--brass);}.search input::placeholder{color:var(--text-3);}
  .search svg{position:absolute;left:11px;top:10px;width:15px;height:15px;color:var(--text-3);}
  .btn-primary{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;padding:10px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .btn-primary:hover{filter:brightness(1.08);}
  .content{padding:24px 26px 70px;max-width:1560px;width:100%;}
  .panel{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);overflow:hidden;}
  .panel-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:2px solid var(--line-2);}
  .panel-head h2{font-family:var(--fd);font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
  .panel-head .count{font-family:var(--fd);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);background:transparent;border:1px solid var(--line-2);padding:3px 9px;border-radius:5px;}
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:#aab0c0;font-weight:700;padding:11px 16px;border-bottom:2px solid var(--line-2);background:var(--bg-3);}
  tbody td{padding:13px 16px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr{cursor:pointer;transition:background .1s;}tbody tr:hover{background:var(--bg-3);}
  tbody tr:last-child td{border-bottom:none;}
  .sup-id{font-family:var(--fm);font-size:12px;font-weight:700;color:#b9c1d2;}
  .sup-name{font-weight:700;color:#fff;}
  .sup-class{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--text-2);}
  .sup-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .sup-contact{font-size:13px;color:var(--text-2);}
  .sup-sub{font-size:12px;color:#8a92a2;margin-top:1px;}
  /* drawer */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.2s;z-index:50;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:480px;max-width:94vw;background:var(--bg-2);border-left:1px solid var(--line-2);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:60;display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0);}
  .drawer-head{padding:18px 22px;border-bottom:2px solid var(--line-2);display:flex;align-items:center;gap:12px;}
  .drawer-head h3{font-family:var(--fd);font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;}
  .drawer-head .sid{font-family:var(--fm);font-size:12px;color:var(--text-3);}
  .drawer-head .x{margin-left:auto;background:var(--bg-4);border:none;color:var(--text-2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;}
  .drawer-body{padding:22px;overflow-y:auto;flex:1;}
  .drawer-foot{padding:14px 22px;border-top:2px solid var(--line-2);display:flex;gap:10px;justify-content:flex-end;}
  .frow{display:flex;gap:12px;margin-bottom:14px;}.frow .field{flex:1;}.field{margin-bottom:14px;}
  label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;margin-bottom:5px;}
  input.in,select.in,textarea.in{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:var(--radius-sm);padding:9px 11px;font-size:13.5px;font-family:inherit;color:var(--text);}
  input.in:focus,select.in:focus,textarea.in:focus{outline:none;border-color:var(--brass);}textarea.in{resize:vertical;min-height:64px;}
  .btn{padding:9px 15px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text);}
  .btn:hover{border-color:var(--brass);}
  .btn-save{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;}
  .btn-del{margin-right:auto;color:var(--danger);border-color:transparent;background:transparent;}
  .btn-del:hover{background:rgba(255,77,77,.12);}
  .state{padding:44px;text-align:center;color:var(--text-3);}
  .msg{margin-right:auto;font-size:13px;color:var(--text-3);align-self:center;}.msg.ok{color:var(--approved);}.msg.err{color:var(--danger);}
  @media(max-width:880px){.app{grid-template-columns:1fr;}.sidebar{display:none;}}
  .ov2{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:300;padding:20px;}
  .ov2.open{display:flex;}
  .cmod{background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;width:100%;max-width:400px;padding:0 0 22px;text-align:center;overflow:hidden;}
  .cmod-ico{width:46px;height:46px;border-radius:11px;background:rgba(255,77,77,.14);color:var(--danger);display:grid;place-items:center;margin:24px auto 0;}.cmod-ico svg{width:24px;height:24px;}
  .cmod-title{font-family:var(--fd);font-size:17px;font-weight:800;margin:16px 0 7px;}
  .cmod-msg{font-size:13.5px;color:var(--text-2);padding:0 26px;line-height:1.5;}
  .cmod-foot{display:flex;gap:10px;padding:22px 26px 0;}.cmod-foot .btn{flex:1;justify-content:center;}
  .cmod-del{background:var(--danger);color:#fff;border-color:var(--danger);}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="mark">York Region<br>Trophy <span class="amp">&amp;</span> Promotion</div><div class="sub">Operations</div></div>
    <nav class="nav">
      <div class="nav-label">Workspace</div>
      <a href="index.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Sales Timeline</a>
      <a href="clients.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Clients</a>
      <a href="products.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Products</a>
      <a href="suppliers.html" class="active"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9h18M9 21V9M3 5h18v16H3z"/></svg>Suppliers <span class="badge" id="nav-suppliers">0</span></a>
      <a href="po.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h3"/></svg>Purchase Orders</a>
      <a href="invoices.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>Invoices</a>
      <div class="nav-label">Production</div>
      <a href="production.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Production Lineup</a>
      <a href="reports.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>Reports</a>
    </nav>
    <div class="sidebar-foot"><div class="avatar">YRT</div><div><div style="color:var(--text);font-weight:700;">YRT CRM</div><div style="font-size:11px;color:var(--text-3);">Operations Suite</div></div><button class="logout-btn" id="logout-btn" title="Sign out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></div>
  </aside>
  <div class="main">
    <header class="topbar"><h1>Suppliers</h1>
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" id="search" placeholder="Search suppliers, ID, classification…"></div>
      <button class="btn-primary" id="new-supplier"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg>New Supplier</button>
    </header>
    <div class="content">
      <section class="panel">
        <div class="panel-head"><h2>All Suppliers</h2><span class="count" id="count">—</span></div>
        <div id="wrap"><div class="state">Loading…</div></div>
      </section>
    </div>
  </div>
</div>
<div class="overlay" id="overlay"></div>
<div class="ov2" id="confirm-ov">
  <div class="cmod">
    <div class="cmod-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>
    <div class="cmod-title" id="cmod-title">Delete?</div>
    <div class="cmod-msg" id="cmod-msg"></div>
    <div class="cmod-foot"><button class="btn" id="cmod-cancel">Cancel</button><button class="btn cmod-del" id="cmod-ok">Delete</button></div>
  </div>
</div>
<aside class="drawer" id="drawer">
  <div class="drawer-head"><h3 id="d-title">New Supplier</h3><span class="sid" id="d-sid"></span><button class="x" id="d-close">×</button></div>
  <div class="drawer-body" id="d-body"></div>
  <div class="drawer-foot"><button class="btn btn-del" id="d-del" style="display:none;">Delete</button><span class="msg" id="d-msg"></span><button class="btn" id="d-cancel">Cancel</button><button class="btn-save btn" id="d-save">Save</button></div>
</aside>

<script type="module">
import { supabase as db, requireAuth, signOut } from './auth.js';
await requireAuth();

const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};
const CLASS_COLORS=['#3da5ff','#3ddc84','#ffb627','#b06bff','#ff6b35','#ff4d8f','#4ddbd0','#a0b0c8'];
function classColor(key){let h=0;const s=String(key||'');for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return CLASS_COLORS[h%CLASS_COLORS.length];}

let SUPPLIERS=[],EDIT=null;

async function load(){
  const {data,error}=await db.from('suppliers').select('*').order('company_name');
  if(error){document.getElementById('wrap').innerHTML=`<div class="state">Couldn't load — ${error.message}</div>`;return;}
  SUPPLIERS=data||[];
  document.getElementById('nav-suppliers').textContent=SUPPLIERS.length;
  render();
}

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let rows=SUPPLIERS.filter(s=>{
    if(!q)return true;
    const hay=[s.company_name,s.short_name,s.contact_name,s.classification,s.email,s.tel,s.supplier_number].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  });
  document.getElementById('count').textContent=rows.length+(rows.length===1?' supplier':' suppliers');
  if(!rows.length){document.getElementById('wrap').innerHTML=`<div class="state">No suppliers found. Click “New Supplier” to add one.</div>`;return;}
  document.getElementById('wrap').innerHTML=`<table><thead><tr><th style="width:70px;">ID</th><th>Supplier</th><th style="width:170px;">Classification</th><th style="width:230px;">Contact</th><th style="width:90px;">Terms</th></tr></thead><tbody>${rows.map(s=>`
    <tr data-id="${s.id}">
      <td><span class="sup-id">#${s.supplier_number||'—'}</span></td>
      <td><div class="sup-name">${esc(s.company_name||s.short_name||'—')}</div></td>
      <td>${s.classification?`<span class="sup-class"><span class="sup-dot" style="background:${classColor(s.classification)}"></span>${esc(s.classification)}</span>`:'<span style="color:#5a6273;">—</span>'}</td>
      <td>${s.contact_name?`<div class="sup-contact">${esc(s.contact_name)}</div>`:''}${s.tel||s.email?`<div class="sup-sub">${esc(s.tel||s.email||'')}</div>`:'<span style="color:#5a6273;">—</span>'}</td>
      <td><span class="sup-sub">${s.terms_days?s.terms_days+'d':'—'}</span></td>
    </tr>`).join('')}</tbody></table>`;
  document.querySelectorAll('tbody tr[data-id]').forEach(tr=>tr.addEventListener('click',()=>edit(tr.dataset.id)));
}

function openDrawer(){document.getElementById('overlay').classList.add('open');document.getElementById('drawer').classList.add('open');}
function closeDrawer(){document.getElementById('overlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');}

function drawerForm(s){
  return `
    <div class="field"><label>Company / Supplier Name</label><input class="in" id="f-company" value="${esc(s.company_name||s.short_name||'')}" placeholder="e.g. Plastic Dress Up"></div>
    <div class="frow">
      <div class="field"><label>Classification</label><input class="in" id="f-class" value="${esc(s.classification||'')}" placeholder="e.g. Trophies"></div>
      <div class="field"><label>Account #</label><input class="in" id="f-acct" value="${esc(s.account_number||'')}" placeholder="optional"></div>
    </div>
    <div class="field"><label>Contact Name</label><input class="in" id="f-contact" value="${esc(s.contact_name||'')}" placeholder="optional"></div>
    <div class="frow">
      <div class="field"><label>Telephone</label><input class="in" id="f-tel" value="${esc(s.tel||'')}"></div>
      <div class="field"><label>Email</label><input class="in" id="f-email" value="${esc(s.email||'')}"></div>
    </div>
    <div class="field"><label>Address</label><input class="in" id="f-addr" value="${esc(s.address||'')}"></div>
    <div class="frow">
      <div class="field"><label>City</label><input class="in" id="f-city" value="${esc(s.city||'')}"></div>
      <div class="field"><label>Province</label><input class="in" id="f-prov" value="${esc(s.province||'')}"></div>
      <div class="field"><label>Postal</label><input class="in" id="f-postal" value="${esc(s.postal||'')}"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Dispatch Mode</label><select class="in" id="f-dispatch"><option value="pickup"${s.dispatch_mode==='pickup'?' selected':''}>Pick-up</option><option value="dispatch"${s.dispatch_mode==='dispatch'?' selected':''}>Dispatch</option></select></div>
      <div class="field"><label>Terms (days)</label><input class="in" id="f-terms" type="number" value="${s.terms_days||0}"></div>
    </div>
    <div class="field"><label>Notes</label><textarea class="in" id="f-notes" placeholder="optional">${esc(s.notes||'')}</textarea></div>`;
}

function newSupplier(){
  EDIT=null;
  document.getElementById('d-title').textContent='New Supplier';
  document.getElementById('d-sid').textContent='';
  document.getElementById('d-del').style.display='none';
  document.getElementById('d-body').innerHTML=drawerForm({});
  document.getElementById('d-msg').textContent='';
  openDrawer();
}

function edit(id){
  const s=SUPPLIERS.find(x=>x.id===id);if(!s)return;
  EDIT=s;
  document.getElementById('d-title').textContent=s.company_name||s.short_name||'Supplier';
  document.getElementById('d-sid').textContent='#'+(s.supplier_number||'');
  document.getElementById('d-del').style.display='';
  document.getElementById('d-body').innerHTML=drawerForm(s);
  document.getElementById('d-msg').textContent='';
  openDrawer();
}

async function save(){
  const v=id=>document.getElementById(id)?.value?.trim()||'';
  const company=v('f-company');
  if(!company){document.getElementById('d-msg').textContent='Company name is required.';document.getElementById('d-msg').className='msg err';return;}
  const payload={
    company_name:company, short_name:company, classification:v('f-class')||null, account_number:v('f-acct')||null,
    contact_name:v('f-contact')||null, tel:v('f-tel')||null, email:v('f-email')||null,
    address:v('f-addr')||null, city:v('f-city')||null, province:v('f-prov')||null, postal:v('f-postal')||null,
    dispatch_mode:v('f-dispatch')||'pickup', terms_days:parseInt(v('f-terms'))||0, notes:v('f-notes')||null
  };
  document.getElementById('d-msg').textContent='Saving…';document.getElementById('d-msg').className='msg';
  let error;
  if(EDIT){({error}=await db.from('suppliers').update(payload).eq('id',EDIT.id));}
  else{({error}=await db.from('suppliers').insert(payload));}
  if(error){document.getElementById('d-msg').textContent=error.message;document.getElementById('d-msg').className='msg err';return;}
  closeDrawer();await load();
}

async function del(){
  if(!EDIT)return;
  document.getElementById('cmod-msg').textContent='Delete supplier “'+(EDIT.company_name||EDIT.short_name)+'”? This cannot be undone.';
  document.getElementById('confirm-ov').classList.add('open');
}
async function doDelete(){
  document.getElementById('confirm-ov').classList.remove('open');
  if(!EDIT)return;
  const {error}=await db.from('suppliers').delete().eq('id',EDIT.id);
  if(error){document.getElementById('d-msg').textContent=error.message;document.getElementById('d-msg').className='msg err';return;}
  closeDrawer();await load();
}

document.getElementById('new-supplier').addEventListener('click',newSupplier);
document.getElementById('d-close').addEventListener('click',closeDrawer);
document.getElementById('d-cancel').addEventListener('click',closeDrawer);
document.getElementById('overlay').addEventListener('click',closeDrawer);
document.getElementById('d-save').addEventListener('click',save);
document.getElementById('d-del').addEventListener('click',del);
document.getElementById('cmod-cancel').addEventListener('click',()=>document.getElementById('confirm-ov').classList.remove('open'));
document.getElementById('cmod-ok').addEventListener('click',doDelete);
document.getElementById('search').addEventListener('input',render);
const _lo=document.getElementById('logout-btn');if(_lo)_lo.addEventListener('click',()=>signOut());
load();
