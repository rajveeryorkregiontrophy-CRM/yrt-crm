<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — YRT CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;--sidebar:#0a0c0f;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#c4cad6;--text-3:#9098a8;
    --brass:#e7ebf3;--brass-2:#f4f6fb;
    --art:#ff6b35;--due:#ffb627;--approved:#3ddc84;--process:#3da5ff;--invoice:#b06bff;
    --radius:11px;--radius-sm:8px;
    --fd:'Archivo',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;}
  body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg);}
  .brand{padding:22px 20px 18px;border-bottom:1px solid var(--line);}
  .brand .mark{font-family:var(--fd);font-weight:900;font-size:17px;color:#fff;line-height:1.12;text-transform:uppercase;}
  .brand .mark .amp{color:var(--brass-2);}
  .nav{padding:14px 12px;flex:1;overflow-y:auto;}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:var(--radius-sm);color:var(--text-2);text-decoration:none;font-weight:500;font-size:13.5px;margin-bottom:2px;transition:.13s;}
  .nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:#aab0c0;padding:20px 10px 8px;font-weight:700;}
  .nav-label:first-child{padding-top:8px;}
  .nav a:hover{background:var(--bg-3);color:#fff;}
  .nav a.active{background:linear-gradient(90deg,#f4f6fb,#cfd6e3);color:#15171c;font-weight:700;}
  .nav a .ico{width:17px;height:17px;flex-shrink:0;}
  .sidebar-foot{padding:13px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .logout-btn{margin-left:auto;background:var(--bg-3);border:1px solid var(--line-2);color:var(--text-3);width:32px;height:32px;border-radius:8px;cursor:pointer;display:grid;place-items:center;transition:.13s;}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}
  .logout-btn svg{width:16px;height:16px;}
  .avatar{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;display:grid;place-items:center;font-weight:900;font-size:10px;}
  .main{display:flex;flex-direction:column;min-width:0;}
  .topbar{height:62px;background:var(--bg-2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 26px;position:sticky;top:0;z-index:20;}
  .topbar h1{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;}
  .content{padding:24px 26px 70px;max-width:1400px;width:100%;}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);padding:16px 17px;position:relative;overflow:hidden;}
  .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--brass);}
  .kpi .l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#aab0c0;font-weight:700;}
  .kpi .v{font-family:var(--fd);font-size:27px;font-weight:900;margin-top:7px;color:#fff;}
  .kpi .v small{font-size:15px;color:var(--text-2);}
  .kpi .sub{font-size:11.5px;color:var(--text-3);margin-top:2px;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
  @media(max-width:980px){.row{grid-template-columns:1fr;}.kpis{grid-template-columns:repeat(2,1fr);}}
  .panel{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);overflow:hidden;}
  .panel-head{padding:15px 18px;border-bottom:2px solid var(--line-2);}
  .panel-head h2{font-family:var(--fd);font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
  .panel-b{padding:18px;}
  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:13px;}
  .bar-row .lbl{width:120px;font-size:12.5px;color:var(--text-2);font-weight:600;flex-shrink:0;text-align:right;}
  .bar-track{flex:1;height:24px;background:var(--bg-3);border-radius:6px;overflow:hidden;position:relative;}
  .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 9px;font-family:var(--fm);font-size:11px;font-weight:700;color:#15171c;min-width:30px;}
  .stat-list .s-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
  .stat-list .s-row:last-child{border-bottom:none;}
  .stat-list .s-name{font-weight:600;}.stat-list .s-val{font-family:var(--fm);font-weight:700;color:#b9c1d2;}
  .stat-list .s-rank{font-family:var(--fm);color:var(--text-3);width:24px;}
  .donut-wrap{display:flex;align-items:center;gap:22px;}
  .legend{display:flex;flex-direction:column;gap:9px;}
  .legend .li{display:flex;align-items:center;gap:9px;font-size:12.5px;}
  .legend .li .dot{width:11px;height:11px;border-radius:3px;}
  .legend .li .n{margin-left:auto;font-family:var(--fm);font-weight:700;color:var(--text-2);}
  .state{padding:40px;text-align:center;color:var(--text-3);}
  @media(max-width:880px){.app{grid-template-columns:1fr;}.sidebar{display:none;}}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;transition:grid-template-columns .32s cubic-bezier(.4,0,.2,1);}
  .app.collapsed{grid-template-columns:68px 1fr;}
  .sidebar{background:var(--sidebar);color:var(--text-2);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--line);width:240px;transition:width .32s cubic-bezier(.4,0,.2,1);z-index:50;overflow:hidden;}
  .app.collapsed .sidebar{width:68px;}
  .app.collapsed .sidebar:hover{width:240px;box-shadow:10px 0 36px -8px rgba(0,0,0,.65);}
  /* keep inner blocks at full width so text never squishes — the sidebar clips it */
  .sidebar .brand,.sidebar .nav,.sidebar .sidebar-foot{width:240px;flex-shrink:0;}
  /* labels/sub-text fade out only; layout width is fixed so nothing mushes */
  .nav a span.lbl,.nav a .badge,.brand .sub,.brand .mark,.sidebar-foot .foot-text,.nav-label{transition:opacity .32s cubic-bezier(.4,0,.2,1);}
  .app.collapsed .sidebar .brand .sub,
  .app.collapsed .sidebar .brand .mark,
  .app.collapsed .sidebar .nav-label,
  .app.collapsed .sidebar .nav a span.lbl,
  .app.collapsed .sidebar .nav a .badge,
  .app.collapsed .sidebar .sidebar-foot .foot-text{opacity:0;pointer-events:none;}
  .app.collapsed .sidebar:hover .brand .sub,
  .app.collapsed .sidebar:hover .brand .mark,
  .app.collapsed .sidebar:hover .nav-label,
  .app.collapsed .sidebar:hover .nav a span.lbl,
  .app.collapsed .sidebar:hover .nav a .badge,
  .app.collapsed .sidebar:hover .sidebar-foot .foot-text{opacity:1;pointer-events:auto;}
  /* compact "YRT" marks shown only while collapsed (and not hovered) */
  .brand-mini{display:none;position:absolute;top:20px;left:0;width:68px;text-align:center;font-family:var(--fd);font-weight:900;font-size:15px;color:#fff;letter-spacing:.04em;}
  .app.collapsed .sidebar .brand-mini{display:block;}
  .app.collapsed .sidebar:hover .brand-mini{display:none;}
  .app.collapsed .sidebar:not(:hover) .nav a span.lbl,
  .app.collapsed .sidebar:not(:hover) .brand .mark,
  .app.collapsed .sidebar:not(:hover) .sidebar-foot .foot-text{visibility:hidden;}
  .brand{position:relative;}
  .nav a{overflow:hidden;}
  .app.collapsed .sidebar:not(:hover) .nav a{padding-left:14px;padding-right:14px;}
  .app.collapsed .sidebar:not(:hover) .nav a.active{background:transparent;}
  .app.collapsed .sidebar:not(:hover) .nav a.active .ico{color:#fff;}
  .app.collapsed .sidebar:not(:hover) .brand{padding-left:0;padding-right:0;}
</style>
</head>
<body>
<div class="app collapsed">
  <aside class="sidebar">

    <div class="brand"><div class="brand-mini">YRT</div><div class="mark">York Region<br>Trophy <span class="amp">&amp;</span> Promotion</div><div class="sub">Operations</div></div>
    <nav class="nav">
      <div class="nav-label">Workspace</div>
      <a href="index.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span class="lbl">Sales Timeline</span></a>
      <a href="clients.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="lbl">Clients</span></a>
      <a href="products.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="lbl">Products</span></a>
      <a href="suppliers.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9h18M9 21V9M3 5h18v16H3z"/></svg><span class="lbl">Suppliers</span></a>
      <a href="po-list.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h3"/></svg><span class="lbl">Purchase Orders</span></a>
      <a href="invoices.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg><span class="lbl">Invoices</span></a>
      <div class="nav-label">Production</div>
      <a href="production.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span class="lbl">Production Lineup</span></a>
      <a href="reports.html" class="active"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg><span class="lbl">Reports</span></a>
    </nav>
    <div class="sidebar-foot"><div class="avatar">YRT</div><div class="foot-text"><div style="color:var(--text);font-weight:700;">YRT CRM</div><div style="font-size:11px;color:var(--text-3);">Operations Suite</div></div><button class="logout-btn" id="logout-btn" title="Sign out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></div>
  </aside>
  <div class="main">
    <header class="topbar"><h1>Reports</h1></header>
    <div class="content" id="content"><div class="state">Crunching numbers…</div></div>
  </div>
</div>
<script type="module">
import { supabase as db, requireAuth, signOut, currentUser } from './auth.js';
await requireAuth();
const money=n=>'$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:0});
const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};
const STAGE_COLOR={send_art:'var(--art)',approval_due:'var(--due)',approved:'var(--approved)',in_process:'var(--process)',invoice:'var(--invoice)'};
const STAGE_LABEL={send_art:'Send Art',approval_due:'Approval Due',approved:'Approved',in_process:'In Process',invoice:'Invoice'};
async function load(){
  const [{data:orders},{data:invoices},{data:clients}]=await Promise.all([
    db.from('quotes').select('*, clients(company_name)').eq('record_type','order'),
    db.from('invoices').select('*'),
    db.from('clients').select('id,company_name')
  ]);
  render(orders||[],invoices||[],clients||[]);
}
function render(orders,invoices,clients){
  const openVal=orders.filter(o=>o.active_status!=='completed').reduce((s,o)=>s+Number(o.grand_total||0),0);
  const invoiced=invoices.reduce((s,i)=>s+Number(i.grand_total||0),0);
  const collected=invoices.reduce((s,i)=>s+Number(i.amount_paid||0),0);
  const outstanding=invoices.reduce((s,i)=>s+Number(i.balance_due||0),0);

  // stage breakdown
  const stageCounts={};orders.forEach(o=>{stageCounts[o.art_status]=(stageCounts[o.art_status]||0)+1;});
  const totalOrders=orders.length||1;

  // top clients by order value
  const byClient={};orders.forEach(o=>{const n=o.clients?.company_name||'—';byClient[n]=(byClient[n]||0)+Number(o.grand_total||0);});
  const topClients=Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxClient=topClients.length?topClients[0][1]:1;

  document.getElementById('content').innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="l">Open Order Value</div><div class="v"><small>$</small>${Math.round(openVal).toLocaleString('en-CA')}</div><div class="sub">${orders.length} active orders</div></div>
      <div class="kpi"><div class="l">Total Invoiced</div><div class="v"><small>$</small>${Math.round(invoiced).toLocaleString('en-CA')}</div><div class="sub">${invoices.length} invoices</div></div>
      <div class="kpi"><div class="l">Collected</div><div class="v"><small>$</small>${Math.round(collected).toLocaleString('en-CA')}</div><div class="sub">received payments</div></div>
      <div class="kpi"><div class="l">Outstanding</div><div class="v"><small>$</small>${Math.round(outstanding).toLocaleString('en-CA')}</div><div class="sub">awaiting payment</div></div>
    </div>
    <div class="row">
      <div class="panel"><div class="panel-head"><h2>Orders by Stage</h2></div><div class="panel-b">
        ${Object.keys(STAGE_LABEL).map(k=>{const c=stageCounts[k]||0;const pct=Math.round(c/totalOrders*100);return `
          <div class="bar-row"><div class="lbl">${STAGE_LABEL[k]}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(pct,4)}%;background:${STAGE_COLOR[k]}">${c}</div></div></div>`;}).join('')}
      </div></div>
      <div class="panel"><div class="panel-head"><h2>Top Clients by Order Value</h2></div><div class="panel-b">
        ${topClients.length?topClients.map(([n,v])=>`
          <div class="bar-row"><div class="lbl">${esc(n.length>16?n.slice(0,15)+'…':n)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(Math.round(v/maxClient*100),8)}%;background:linear-gradient(90deg,var(--brass-2),var(--brass))">${money(v)}</div></div></div>`).join(''):'<div class="state">No order data yet.</div>'}
      </div></div>
    </div>
    <div class="row">
      <div class="panel"><div class="panel-head"><h2>Payment Status</h2></div><div class="panel-b">
        <div class="stat-list">
          <div class="s-row"><span class="s-name">Paid invoices</span><span class="s-val">${invoices.filter(i=>i.paid_status==='paid').length}</span></div>
          <div class="s-row"><span class="s-name">Partially paid</span><span class="s-val">${invoices.filter(i=>i.paid_status==='partial').length}</span></div>
          <div class="s-row"><span class="s-name">Unpaid</span><span class="s-val">${invoices.filter(i=>i.paid_status==='unpaid').length}</span></div>
          <div class="s-row"><span class="s-name">Collection rate</span><span class="s-val">${invoiced>0?Math.round(collected/invoiced*100):0}%</span></div>
        </div>
      </div></div>
      <div class="panel"><div class="panel-head"><h2>At a Glance</h2></div><div class="panel-b">
        <div class="stat-list">
          <div class="s-row"><span class="s-name">Total clients</span><span class="s-val">${clients.length}</span></div>
          <div class="s-row"><span class="s-name">Active orders</span><span class="s-val">${orders.length}</span></div>
          <div class="s-row"><span class="s-name">Avg order value</span><span class="s-val">${money(orders.length?openVal/orders.length:0)}</span></div>
          <div class="s-row"><span class="s-name">Jobs needing art</span><span class="s-val">${stageCounts['send_art']||0}</span></div>
        </div>
      </div></div>
    </div>`;
}
const _lo=document.getElementById('logout-btn');if(_lo)_lo.addEventListener('click',()=>signOut());
load();
</script>
</body>
</html>
