<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchase Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;--sidebar:#0a0c0f;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#c4cad6;--text-3:#9098a8;
    --brass:#e7ebf3;--brass-2:#f4f6fb;--danger:#ff4d4d;--approved:#3ddc84;--process:#3da5ff;--due:#ffb627;
    --radius:11px;--radius-sm:8px;
    --fd:'Archivo',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;}
  body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg);}
  .brand{padding:22px 20px 18px;border-bottom:1px solid var(--line);}
  .brand .mark{font-family:var(--fd);font-weight:900;font-size:17px;color:#fff;line-height:1.12;text-transform:uppercase;}
  .brand .mark .amp{color:var(--brass-2);}
  .nav{padding:14px 12px;flex:1;overflow-y:auto;}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:var(--radius-sm);color:var(--text-2);text-decoration:none;font-weight:500;font-size:13.5px;margin-bottom:2px;transition:.13s;}
  .nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:#aab0c0;padding:20px 10px 8px;font-weight:700;}
  .nav-sep{height:1px;background:var(--line);margin:14px 14px;opacity:.7;}
  .nav-label:first-child{padding-top:8px;}
  .nav a:hover{background:var(--bg-3);color:#fff;}
  .nav a.active{background:linear-gradient(90deg,#f4f6fb,#cfd6e3);color:#15171c;font-weight:700;}
  .nav a .ico{width:17px;height:17px;flex-shrink:0;}
  .nav a .badge{margin-left:auto;background:var(--bg-4);color:var(--text);font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;font-family:var(--fm);}
  .sidebar-foot{padding:13px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .logout-btn{margin-left:auto;background:var(--bg-3);border:1px solid var(--line-2);color:var(--text-3);width:32px;height:32px;border-radius:8px;cursor:pointer;display:grid;place-items:center;transition:.13s;}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}.logout-btn svg{width:16px;height:16px;}
  .avatar{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#f4f6fb,#cfd6e3);color:#15171c;display:grid;place-items:center;font-weight:900;font-size:10px;}
  .main{display:flex;flex-direction:column;min-width:0;}
  .topbar{height:62px;background:var(--bg-2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 26px;position:sticky;top:0;z-index:20;}
  .topbar h1{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;}
  .btn-primary{margin-left:auto;background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;padding:10px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .btn-primary:hover{filter:brightness(1.08);}
  .content{padding:24px 26px 70px;max-width:1560px;width:100%;}
  .tabs{display:flex;gap:6px;margin-bottom:18px;}
  .tab{font-size:12.5px;padding:8px 15px;border-radius:7px;border:1px solid var(--line-2);background:var(--bg-2);color:var(--text-2);cursor:pointer;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:8px;}
  .tab:hover{border-color:var(--text-3);color:var(--text);}
  .tab.active{background:#f4f6fb;color:#15171c;border-color:#f4f6fb;font-weight:700;}
  .tab .n{font-family:var(--fm);font-size:10.5px;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.07);}
  .tab.active .n{background:rgba(0,0,0,.15);}
  .rc-intro{font-size:13px;color:var(--text-2);margin-bottom:18px;padding:12px 16px;background:var(--bg-2);border:1px solid var(--line);border-radius:9px;}
  .rc-card{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;margin-bottom:18px;overflow:hidden;}
  .rc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;padding:16px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.015),transparent);}
  .rc-head-l{display:flex;flex-direction:column;gap:3px;}
  .rc-po{font-family:var(--fm);font-weight:800;font-size:15px;color:var(--brass-2);}
  .rc-sup{font-size:13.5px;font-weight:600;color:var(--text);}
  .rc-head-r{display:flex;flex-direction:column;align-items:flex-end;gap:8px;min-width:240px;}
  .rc-dates{font-size:11.5px;color:var(--text-3);}
  .rc-dlabel{text-transform:uppercase;letter-spacing:.04em;font-weight:700;color:var(--text-3);font-size:10px;}
  .rc-progress-wrap{display:flex;align-items:center;gap:10px;width:100%;justify-content:flex-end;}
  .rc-progress{width:120px;height:6px;border-radius:4px;background:var(--bg-4);overflow:hidden;}
  .rc-progress-bar{height:100%;background:#8a92a2;transition:width .3s;}
  .rc-progress-bar.done{background:#3ddc84;}
  .rc-progress-txt{font-size:11px;color:var(--text-3);white-space:nowrap;}
  .rc-progress-txt.done{color:#3ddc84;font-weight:700;}
  .rc-table{width:100%;border-collapse:collapse;}
  .rc-table th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);text-align:left;padding:11px 20px;border-bottom:1px solid var(--line);font-weight:700;}
  .rc-table td{padding:13px 20px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .rc-table tr:last-child td{border-bottom:none;}
  .rc-table .num{text-align:right;}
  .rc-row-received{background:rgba(61,220,132,.04);}
  .rc-row-backordered{background:rgba(176,107,255,.04);}
  .ro{font-size:13px;color:var(--text-2);}
  .ro.mono{font-family:var(--fm);font-size:12.5px;}
  .rc-badge{display:inline-block;font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:.03em;}
  .rc-actcell{text-align:right;}
  .rc-actions{display:inline-flex;gap:7px;justify-content:flex-end;}
  .rc-act{font-size:11px;font-weight:700;padding:6px 12px;border-radius:6px;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text-2);cursor:pointer;font-family:inherit;transition:all .14s;}
  .rc-act:hover{border-color:var(--text-3);color:var(--text);}
  .rc-act.ok{border-color:rgba(61,220,132,.4);color:#3ddc84;}
  .rc-act.ok:hover{background:#3ddc84;color:#0f1115;border-color:#3ddc84;}
  .rc-act.bad{border-color:rgba(176,107,255,.4);color:#b06bff;}
  .rc-act.bad:hover{background:#b06bff;color:#fff;border-color:#b06bff;}
  .rc-act.reset{color:var(--text-3);}
  .rc-foot{padding:12px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;}
  .rc-receive-all{font-size:12px;font-weight:700;padding:8px 16px;border-radius:7px;border:1px solid rgba(61,220,132,.4);background:rgba(61,220,132,.08);color:#3ddc84;cursor:pointer;font-family:inherit;}
  .rc-receive-all:hover{background:#3ddc84;color:#0f1115;}
  .panel{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);overflow:hidden;}
  .panel-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:2px solid var(--line-2);}
  .panel-head h2{font-family:var(--fd);font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
  .panel-head .count{font-family:var(--fd);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);border:1px solid var(--line-2);padding:3px 9px;border-radius:5px;}
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:#aab0c0;font-weight:700;padding:11px 16px;border-bottom:2px solid var(--line-2);background:var(--bg-3);}
  thead th.num{text-align:right;}
  tbody td{padding:13px 16px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr{cursor:pointer;transition:background .1s;}tbody tr:hover{background:var(--bg-3);}
  tbody tr:last-child td{border-bottom:none;}
  .po-num{font-family:var(--fm);font-size:13px;font-weight:700;color:#b9c1d2;}
  .po-supplier{font-weight:700;color:#fff;}
  .po-sub{font-size:12px;color:#8a92a2;margin-top:1px;}
  .badge-st{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.02em;padding:5px 11px;border-radius:7px;white-space:nowrap;text-transform:uppercase;font-family:var(--fd);}
  .badge-st::before{content:'';width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,.4);}
  .st-open{background:var(--due);color:#231803;}.st-sent{background:var(--process);color:#03101f;}
  .st-received{background:var(--approved);color:#04130a;}.st-verified{background:#4ddbd0;color:#06201d;}.st-cancelled{background:#5a6273;color:#fff;}
  .po-items-count{font-family:var(--fm);font-size:12px;color:var(--text-2);}
  .po-total{font-family:var(--fm);font-weight:700;color:#fff;font-size:13.5px;}
  .state{padding:44px;text-align:center;color:var(--text-3);}
  /* modal for new PO */
  .ov{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .ov.open{display:flex;}
  .mod{background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;width:100%;max-width:420px;overflow:hidden;}
  .mod-h{padding:18px 22px;border-bottom:1px solid var(--line);font-family:var(--fd);font-weight:800;text-transform:uppercase;letter-spacing:.03em;font-size:15px;}
  .mod-b{padding:22px;}
  .field{margin-bottom:14px;}label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:700;margin-bottom:6px;}
  .in{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:8px;padding:10px 12px;font-size:13.5px;font-family:inherit;color:var(--text);}
  .in:focus{outline:none;border-color:var(--brass);}
  .mod-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;}
  .btn{padding:10px 16px;border-radius:8px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text);}
  .btn:hover{border-color:var(--brass);}
  .btn-save{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;}
  .msg{font-size:12.5px;color:var(--danger);margin-top:8px;min-height:16px;}
  @media(max-width:880px){.app{grid-template-columns:1fr;}.sidebar{display:none;}}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;transition:grid-template-columns .32s cubic-bezier(.4,0,.2,1);}
  .app.collapsed{grid-template-columns:68px 1fr;}
  .sidebar{background:var(--sidebar);color:var(--text-2);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--line);width:240px;transition:width .32s cubic-bezier(.4,0,.2,1);z-index:50;overflow:hidden;}
  .app.collapsed .sidebar{width:68px;}
  .app.collapsed .sidebar:hover{width:240px;box-shadow:10px 0 36px -8px rgba(0,0,0,.65);}
  /* keep inner blocks at full width so text never squishes — the sidebar clips it */
  .sidebar .brand,.sidebar .nav,.sidebar .sidebar-foot{width:240px;flex-shrink:0;}
  /* labels/sub-text fade out only; layout width is fixed so nothing mushes */
  .nav a span.lbl,.nav a .badge,.brand .sub,.brand .mark,.sidebar-foot .foot-text,.nav-label{transition:opacity .32s cubic-bezier(.4,0,.2,1);}
  .app.collapsed .sidebar .brand .sub,
  .app.collapsed .sidebar .brand .mark,
  .app.collapsed .sidebar .nav-label,
  .app.collapsed .sidebar .nav a span.lbl,
  .app.collapsed .sidebar .nav a .badge,
  .app.collapsed .sidebar .sidebar-foot .foot-text{opacity:0;pointer-events:none;}
  .app.collapsed .sidebar:hover .brand .sub,
  .app.collapsed .sidebar:hover .brand .mark,
  .app.collapsed .sidebar:hover .nav-label,
  .app.collapsed .sidebar:hover .nav a span.lbl,
  .app.collapsed .sidebar:hover .nav a .badge,
  .app.collapsed .sidebar:hover .sidebar-foot .foot-text{opacity:1;pointer-events:auto;}
  /* compact "YRT" marks shown only while collapsed (and not hovered) */
  .brand-mini{display:none;position:absolute;top:20px;left:0;width:68px;text-align:center;font-family:var(--fd);font-weight:900;font-size:15px;color:#fff;letter-spacing:.04em;}
  .app.collapsed .sidebar .brand-mini{display:block;}
  .app.collapsed .sidebar:hover .brand-mini{display:none;}
  .app.collapsed .sidebar:not(:hover) .nav a span.lbl,
  .app.collapsed .sidebar:not(:hover) .brand .mark,
  .app.collapsed .sidebar:not(:hover) .sidebar-foot .foot-text{visibility:hidden;}
  .brand{position:relative;}
  .nav a{overflow:hidden;}
  .app.collapsed .sidebar:not(:hover) .nav a{padding-left:14px;padding-right:14px;}
  .app.collapsed .sidebar:not(:hover) .nav a.active{background:transparent;}
  .app.collapsed .sidebar:not(:hover) .nav a.active .ico{color:#fff;}
  .app.collapsed .sidebar:not(:hover) .brand{padding-left:0;padding-right:0;}
</style>
</head>
<body>
<div class="app collapsed">
  <aside class="sidebar">

    <div class="brand"><div class="brand-mini">YRT</div><div class="mark">York Region<br>Trophy <span class="amp">&amp;</span> Promotion</div></div>
    <nav class="nav">

      <a href="production.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span class="lbl">Production Lineup</span></a>
      <a href="reports.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg><span class="lbl">Sales Reports</span></a>
      <div class="nav-sep"></div>
      <a href="suppliers.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9h18M9 21V9M3 5h18v16H3z"/></svg><span class="lbl">Suppliers</span></a>
      <a href="po-list.html" class="active"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h3"/></svg><span class="lbl">Purchase Timeline</span></a>
      <a href="purchase-invoices.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 7h20v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/><path d="M2 7l3-4h14l3 4"/><path d="M9 13h6"/></svg><span class="lbl">Purchase Invoices</span></a>
      <a href="purchase-reports.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="7"/><rect x="13" y="6" width="3" height="11"/></svg><span class="lbl">Purchase Reports</span></a>

      <div class="nav-sep"></div>
      <a href="database-map.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v6c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 11v6c0 1.66 4.03 3 9 3s9-1.34 9-3v-6"/></svg><span class="lbl">Database Map</span></a>

    <div class="sidebar-foot"><div class="avatar">YRT</div><div class="foot-text"><div style="color:var(--text);font-weight:700;">YRT CRM</div><div style="font-size:11px;color:var(--text-3);">Operations Suite</div></div><button class="logout-btn" id="logout-btn" title="Sign out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></div>
  </aside>
  <div class="main">
    <header class="topbar"><h1>Purchase Orders</h1>
      <button class="btn-primary" id="new-po"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg>New Open PO</button>

    <div class="content">
      <div class="tabs" id="tabs">
        <button class="tab active" data-f="open">Open <span class="n" id="n-open">0</span></button>

        <div class="panel-head"><h2 id="list-title">Open Purchase Orders</h2><span class="count" id="count">—</span></div>

<div class="ov" id="ov">
  <div class="mod">
    <div class="mod-h">New Open PO</div>
    <div class="mod-b">
      <div class="field"><label>Supplier</label><select class="in" id="m-supplier"></select></div>
      <div class="field"><label>Subject (optional)</label><input class="in" id="m-subject" placeholder="e.g. Medal restock"></div>
      <div class="msg" id="m-msg"></div>
    </div>

<script type="module">
import { supabase as db, requireAuth, signOut, subscribeFulfillment } from './auth.js';
await requireAuth();

// ---- shared styled modal (replaces native alert/confirm) ----
function __ensureModal(){
  if(document.getElementById('__sm_ov'))return;
  const css=document.createElement('style');

  document.head.appendChild(css);

const __SM_IC={warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',danger:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'};
function smAlert(msg,title,type){return new Promise(res=>{__ensureModal();type=type||'info';document.getElementById('__sm_ic').className='ic '+type;document.getElementById('__sm_ic').innerHTML=__SM_IC[type]||__SM_IC.info;document.getElementById('__sm_t').textContent=title||'Notice';document.getElementById('__sm_m').textContent=msg||'';const f=document.getElementById('__sm_f');f.innerHTML='<button class="b primary" id="__sm_ok">Got it</button>';const ov=document.getElementById('__sm_ov');const close=()=>{ov.classList.remove('open');res(true);};f.querySelector('#__sm_ok').onclick=close;ov.onclick=e=>{if(e.target===ov)close();};ov.classList.add('open');});}
function smConfirm(msg,title,opts){opts=opts||{};return new Promise(res=>{__ensureModal();const type=opts.type||'warn';document.getElementById('__sm_ic').className='ic '+type;document.getElementById('__sm_ic').innerHTML=__SM_IC[type]||__SM_IC.warn;document.getElementById('__sm_t').textContent=title||'Confirm';document.getElementById('__sm_m').textContent=msg||'';const f=document.getElementById('__sm_f');f.innerHTML='<button class="b plain" id="__sm_no">'+(opts.cancelText||'Cancel')+'</button><button class="b '+(opts.danger?'danger':'primary')+'" id="__sm_yes">'+(opts.confirmText||'Confirm')+'</button>';const ov=document.getElementById('__sm_ov');const close=v=>{ov.classList.remove('open');res(v);};f.querySelector('#__sm_yes').onclick=()=>close(true);f.querySelector('#__sm_no').onclick=()=>close(false);ov.onclick=e=>{if(e.target===ov)close(false);};ov.classList.add('open');});}


const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};
const money=n=>'$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtD=d=>{if(!d)return '—';const x=new Date(d+'T00:00:00');return x.getDate()+' '+MON[x.getMonth()]+' '+x.getFullYear();};
const ST_LABEL={open:'Open',sent:'Sent',received:'Received',verified:'Verified',cancelled:'Cancelled'};

let POS=[],SUPPLIERS=[],FILTER='open';

async function load(){
  const {data:pos,error}=await db.from('purchase_orders').select('*, suppliers(company_name,short_name,supplier_number), po_items(id,part_no,style_number,product_name,description,quantity,amount,ordered_for,status,source_quote_item_id,source_allocation_id)').order('po_number',{ascending:false});
  if(error){document.getElementById('wrap').innerHTML=`<div class="state">Couldn't load — ${error.message}</div>`;return;}
  POS=pos||[];
  const {data:sups}=await db.from('suppliers').select('id,company_name,short_name,supplier_number').order('company_name');
  SUPPLIERS=sups||[];
  document.getElementById('n-open').textContent=POS.filter(p=>p.status==='open').length;
  document.getElementById('n-sent').textContent=POS.filter(p=>p.status==='sent').length;
  const recEl=document.getElementById('n-receiving');if(recEl)recEl.textContent=POS.filter(p=>p.status==='sent').length;
  document.getElementById('n-all').textContent=POS.length;
  const _np=document.getElementById('nav-po');if(_np)_np.textContent=POS.filter(p=>p.status==='open').length;
  render();
}

function render(){
  if(FILTER==='receiving'){ renderReceiving(); return; }
  document.getElementById('list-title').textContent={open:'Open Purchase Orders',sent:'Sent Purchase Orders',all:'All Purchase Orders'}[FILTER];
  let rows=POS.filter(p=>FILTER==='all'?true:p.status===FILTER);
  document.getElementById('count').textContent=rows.length+(rows.length===1?' PO':' POs');
  if(!rows.length){document.getElementById('wrap').innerHTML=`<div class="state">No ${FILTER==='all'?'':FILTER+' '}purchase orders.${FILTER==='open'?' Click “New Open PO”, or save a sales order with a supplier that has an open PO.':''}</div>`;return;}
  document.getElementById('wrap').innerHTML=`<table><thead><tr><th style="width:80px;">PO #</th><th>Supplier</th><th>Subject</th><th style="width:120px;">Date</th><th style="width:90px;">Items</th><th style="width:120px;">Status</th><th class="num" style="width:120px;">Total</th></tr></thead><tbody>${rows.map(p=>{
    const sup=p.suppliers||{};const total=(p.po_items||[]).reduce((s,i)=>s+Number(i.amount||0),0);
    return `<tr data-id="${p.id}"><td><span class="po-num">#${p.po_number}</span></td><td><div class="po-supplier">${esc(sup.company_name||sup.short_name||'—')}</div>${sup.supplier_number?`<div class="po-sub">Supplier #${sup.supplier_number}</div>`:''}</td><td><span class="po-sub" style="color:var(--text-2);">${esc(p.subject||'—')}</span></td><td><span class="po-sub">${fmtD(p.order_date)}</span></td><td><span class="po-items-count">${(p.po_items||[]).length} item${(p.po_items||[]).length===1?'':'s'}</span></td><td><span class="badge-st st-${p.status}">${ST_LABEL[p.status]||p.status}</span></td><td class="num"><span class="po-total">${money(total)}</span></td></tr>`;}).join('')}</tbody></table>`;
  document.querySelectorAll('tbody tr[data-id]').forEach(tr=>tr.addEventListener('click',()=>location.href='po.html?id='+encodeURIComponent(tr.dataset.id)));
}

// ---- Receiving: mark items Received / Back Ordered (separate from the view-only Sent records) ----
const RC_INFO={issued:{label:'Issued',color:'#8a92a2',bg:'rgba(138,146,162,.16)'},received:{label:'Received',color:'#3ddc84',bg:'rgba(61,220,132,.16)'},backordered:{label:'Back Ordered',color:'#b06bff',bg:'rgba(176,107,255,.16)'}};
function rcBadge(s){const i=RC_INFO[s]||RC_INFO.issued;return `<span class="rc-badge" style="color:${i.color};background:${i.bg};">${i.label}</span>`;}
function renderReceiving(){
  document.getElementById('list-title').textContent='Receiving';
  const sentPOs=POS.filter(p=>p.status==='sent');
  document.getElementById('count').textContent=sentPOs.length+(sentPOs.length===1?' PO':' POs');
  if(!sentPOs.length){document.getElementById('wrap').innerHTML='<div class="state">No purchase orders awaiting receiving. Purchase orders appear here once they have been sent to a supplier.</div>';return;}
  document.getElementById('wrap').innerHTML=`<div class="rc-intro">Mark items as received or back ordered as goods arrive. Updates sync instantly to the related sales orders.</div>`+sentPOs.map(p=>{
    const sup=p.suppliers||{};
    const items=(p.po_items||[]);
    const total=items.length;
    const received=items.filter(i=>(i.status||'issued')==='received').length;
    const backordered=items.filter(i=>(i.status||'issued')==='backordered').length;
    const pct=total?Math.round((received/total)*100):0;
    const allDone=total>0&&received===total;
    return `<div class="rc-card">
      <div class="rc-head">
        <div class="rc-head-l">
          <div class="rc-po">PO #${esc(String(p.po_number))}</div>
          <div class="rc-sup">${esc(sup.company_name||sup.short_name||'—')}${sup.supplier_number?` · #${sup.supplier_number}`:''}</div>
        </div>
        <div class="rc-head-r">
          <div class="rc-dates"><span class="rc-dlabel">Ordered</span> ${fmtD(p.order_date)}${p.in_hand_date?` &nbsp;·&nbsp; <span class="rc-dlabel">In&#8209;hand</span> ${fmtD(p.in_hand_date)}`:''}</div>
          <div class="rc-progress-wrap"><div class="rc-progress"><div class="rc-progress-bar ${allDone?'done':''}" style="width:${pct}%"></div></div><span class="rc-progress-txt ${allDone?'done':''}">${received}/${total} received${backordered?` · ${backordered} back ordered`:''}</span></div>
        </div>
      </div>
      <table class="rc-table"><thead><tr><th style="width:100px;">Part No.</th><th>Product</th><th class="num" style="width:60px;">Qty</th><th style="width:130px;">From Order</th><th style="width:130px;">Status</th><th style="width:200px;text-align:right;">Action</th></tr></thead><tbody>
      ${items.map(it=>{const st=it.status||'issued';return `<tr class="rc-row rc-row-${st}"><td><span class="ro mono">${esc(it.part_no||it.style_number||'')}</span></td><td><span class="ro">${esc(it.product_name||it.description||'')}</span></td><td class="num"><span class="ro mono">${it.quantity??''}</span></td><td><span class="ro">${it.ordered_for?'#'+esc(String(it.ordered_for)):'—'}</span></td>
        <td>${rcBadge(st)}</td>
        <td class="rc-actcell">
          <div class="rc-actions">
            ${st!=='received'?`<button class="rc-act ok" data-po="${p.id}" data-item="${it.id}" data-act="received">Receive</button>`:''}
            ${st!=='backordered'?`<button class="rc-act bad" data-po="${p.id}" data-item="${it.id}" data-act="backordered">Back Order</button>`:''}
            ${st!=='issued'?`<button class="rc-act reset" data-po="${p.id}" data-item="${it.id}" data-act="issued">Reset</button>`:''}
          </div>
        </td></tr>`;}).join('')}
      </tbody></table>
      ${received<total?'':''}
    </div>`;
  }).join('');
  document.querySelectorAll('.rc-act').forEach(b=>b.addEventListener('click',()=>markReceiving(b.dataset.item,b.dataset.act,b.dataset.po)));
}

async function markReceiving(itemId,status,poId,skipRender){
  const patch={status};
  if(status==='received'){patch.verified_at=new Date().toISOString();}
  const {error}=await db.from('po_items').update(patch).eq('id',itemId);
  if(error){await smAlert('Could not update: '+error.message,'Error','danger');return;}
  const po=POS.find(p=>p.id===poId);
  const it=po&&(po.po_items||[]).find(x=>x.id===itemId);
  if(it){
    it.status=status;
    if(it.source_allocation_id){
      // update this allocation, then recompute the PARENT line from ALL its orders
      await db.from('quote_item_allocations').update({status}).eq('id',it.source_allocation_id);
      const {data:al}=await db.from('quote_item_allocations').select('quote_item_id,status').eq('id',it.source_allocation_id).single();
      if(al&&al.quote_item_id){ await recomputeParentLine(al.quote_item_id); }
    }else if(it.source_quote_item_id){
      await recomputeParentLine(it.source_quote_item_id, status);
    }
  }
  if(!skipRender) renderReceiving();
}

// Recompute a sales line's status from ALL its orders (allocations + direct PO lines),
// accounting for partial ordering (ordered < order qty must not look fully done).
async function recomputeParentLine(quoteItemId, directStatus){
  const {data:qi}=await db.from('quote_items').select('id,quantity').eq('id',quoteItemId).single();
  if(!qi)return;
  const {data:allocs}=await db.from('quote_item_allocations').select('quantity,status').eq('quote_item_id',quoteItemId);
  const {data:pis}=await db.from('po_items').select('quantity,status,source_allocation_id').eq('source_quote_item_id',quoteItemId);
  const directPis=(pis||[]).filter(p=>!p.source_allocation_id);
  const ordered=(allocs||[]).reduce((s,a)=>s+(Number(a.quantity)||0),0)+directPis.reduce((s,p)=>s+(Number(p.quantity)||0),0);
  const need=Number(qi.quantity)||0;
  const statuses=[...(allocs||[]).map(a=>a.status), ...directPis.map(p=>p.status)];
  let fs=aggregateStatus(statuses);
  // partial guard: can't be "received"/"issued" if the whole order qty isn't even on POs yet
  if(ordered<need && (fs==='received'||fs==='issued')){ fs='in_po'; }
  await db.from('quote_items').update({fulfillment_status:fs}).eq('id',quoteItemId);
}

// Combine allocation statuses into one parent line status
function aggregateStatus(statuses){
  const s=statuses.filter(Boolean);
  if(!s.length)return 'none';
  const uniq=[...new Set(s.map(x=>x==='pending'?'in_po':x))];
  if(uniq.length===1)return uniq[0];
  if(uniq.includes('backordered'))return 'backordered';   // surface backorder
  // otherwise report the least-advanced stage so it doesn't look "done" prematurely
  const order=['in_po','issued','received'];
  for(const st of order){ if(uniq.includes(st))return st; }
  return uniq[0];
}

// New PO modal
function openModal(){
  const sel=document.getElementById('m-supplier');
  sel.innerHTML='<option value="">— Select supplier —</option>'+SUPPLIERS.map(s=>`<option value="${s.id}">${esc(s.company_name||s.short_name||'')} (#${s.supplier_number||''})</option>`).join('');
  document.getElementById('m-subject').value='';document.getElementById('m-msg').textContent='';
  document.getElementById('ov').classList.add('open');
}
function closeModal(){document.getElementById('ov').classList.remove('open');}
document.getElementById('new-po').addEventListener('click',openModal);
document.getElementById('m-cancel').addEventListener('click',closeModal);
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeModal();});

document.getElementById('m-create').addEventListener('click',async()=>{
  const supplier_id=document.getElementById('m-supplier').value;
  if(!supplier_id){document.getElementById('m-msg').textContent='Please choose a supplier.';return;}
  // Multiple open POs for the same supplier ARE allowed — when items are synced,
  // the user is asked which open PO to use (handled on the order side).
  const subject=document.getElementById('m-subject').value.trim()||null;
  document.getElementById('m-msg').textContent='Creating…';document.getElementById('m-msg').style.color='var(--text-3)';
  const {data:newPO,error}=await db.from('purchase_orders').insert({supplier_id,subject,status:'open'}).select().single();
  if(error){document.getElementById('m-msg').textContent=error.message;document.getElementById('m-msg').style.color='var(--danger)';return;}

  // ---- AUTO-PULL: gather existing sales-order line items for this supplier ----
  // Step 1: which quotes are Sales Orders? (we only pull from orders)
  const {data:orderQuotes}=await db.from('quotes').select('id,stage_id').eq('record_type','order');
  const orderMap={}; (orderQuotes||[]).forEach(q=>{orderMap[q.id]=q.stage_id;});
  const orderIds=Object.keys(orderMap);
  if(orderIds.length){
    // Step 2: line items for this supplier, not already in a PO, belonging to those orders
    const {data:pending}=await db.from('quote_items')
      .select('*')
      .eq('supplier_id',supplier_id)
      .eq('in_po',false)
      .in('quote_id',orderIds);
    // which of these items are split (have allocations)? those go via allocations, not the parent.
    const pendingIds=(pending||[]).map(it=>it.id);
    let allocByItem={};
    if(pendingIds.length){
      const {data:allocs}=await db.from('quote_item_allocations').select('*').in('quote_item_id',pendingIds).eq('in_po',false);
      (allocs||[]).forEach(a=>{ (allocByItem[a.quote_item_id]=allocByItem[a.quote_item_id]||[]).push(a); });
    }
    // parent items WITHOUT a split, qty>0 (qty 0 = in stock)
    const toPull=(pending||[]).filter(it=>{
      if(allocByItem[it.id]) return false;   // split -> handled below
      const sq=it.supplier_quantity!=null?Number(it.supplier_quantity):Number(it.quantity);
      return sq>0;
    });
    const poRows=[];
    toPull.forEach(it=>{
      const sq=it.supplier_quantity!=null?Number(it.supplier_quantity):Number(it.quantity);
      poRows.push({
        po_id:newPO.id, source_quote_item_id:it.id, source_allocation_id:null,
        style_number:it.style_number||null, category_name:it.category_name||null,
        part_no:it.style_number||null, product_name:it.description||null, description:it.description||null,
        quantity:sq, rate:Number(it.unit_price)||0, amount:sq*(Number(it.unit_price)||0),
        ordered_for:orderMap[it.quote_id]?String(orderMap[it.quote_id]):null, status:'issued'
      });
    });
    // allocations: pull those assigned to THIS new PO, or unassigned (po_id null)
    const allocToPull=[];
    Object.values(allocByItem).flat().forEach(a=>{
      if(Number(a.quantity)<=0) return;
      if(a.po_id && a.po_id!==newPO.id) return;   // assigned to a different PO -> leave it
      const parent=(pending||[]).find(it=>it.id===a.quote_item_id)||{};
      allocToPull.push({a, parent});
    });
    allocToPull.forEach(({a,parent})=>{
      poRows.push({
        po_id:newPO.id, source_quote_item_id:null, source_allocation_id:a.id,
        style_number:parent.style_number||null, category_name:parent.category_name||null,
        part_no:parent.style_number||null, product_name:parent.description||null, description:parent.description||null,
        quantity:Number(a.quantity), rate:Number(parent.unit_price)||0, amount:Number(a.quantity)*(Number(parent.unit_price)||0),
        ordered_for:orderMap[parent.quote_id]?String(orderMap[parent.quote_id]):null, status:'issued'
      });
    });
    poRows.forEach((r,idx)=>r.line_order=idx+1);
    if(poRows.length){
      const {error:pe}=await db.from('po_items').insert(poRows);
      if(!pe){
        const itemIds=toPull.map(it=>it.id);
        if(itemIds.length) await db.from('quote_items').update({in_po:true,po_id:newPO.id,fulfillment_status:'in_po'}).in('id',itemIds);
        const allocIds=allocToPull.map(x=>x.a.id);
        if(allocIds.length){
          await db.from('quote_item_allocations').update({in_po:true,po_id:newPO.id,status:'in_po'}).in('id',allocIds);
          // mark each split parent in_po so its line colours, and recompute its status
          const parentIds=[...new Set(allocToPull.map(x=>x.parent.id).filter(Boolean))];
          if(parentIds.length) await db.from('quote_items').update({in_po:true,po_id:newPO.id,fulfillment_status:'in_po'}).in('id',parentIds);
        }
      }
    }
  }

  closeModal();location.href='po.html?id='+encodeURIComponent(newPO.id);
});
