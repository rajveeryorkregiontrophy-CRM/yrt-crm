<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YRT CRM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f1419;
    color: #e8e8e8;
    padding: 2rem;
    min-height: 100vh;
    line-height: 1.5;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header {
    border-bottom: 1px solid #2a2f38;
    padding-bottom: 1.25rem;
    margin-bottom: 2rem;
  }
  h1 { font-size: 1.5rem; font-weight: 600; color: #fff; }
  .subtitle { color: #8a92a3; font-size: 0.875rem; margin-top: 0.25rem; }

  .card {
    background: #151a21;
    border: 1px solid #2a2f38;
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .card h2 {
    font-size: 0.875rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: #c9a961;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  form {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
  }
  input {
    background: #0f1419;
    border: 1px solid #2a2f38;
    color: #e8e8e8;
    padding: 0.625rem 0.75rem;
    border-radius: 6px;
    font-size: 0.875rem;
    font-family: inherit;
  }
  input:focus { outline: none; border-color: #c9a961; }
  input::placeholder { color: #5a6273; }

  button {
    background: #c9a961;
    color: #0f1419;
    border: none;
    padding: 0.625rem 1.25rem;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.875rem;
    font-family: inherit;
  }
  button:hover { background: #d4b876; }
  .form-submit { grid-column: span 2; justify-self: start; padding-inline: 1.5rem; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }
  th {
    text-align: left;
    padding: 0.625rem 0.75rem;
    color: #8a92a3;
    font-weight: 500;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid #2a2f38;
  }
  td {
    padding: 0.875rem 0.75rem;
    border-bottom: 1px solid #1a1f27;
    color: #d4d8de;
  }
  tr:hover td { background: #1a1f27; }
  td .muted { color: #5a6273; }

  .btn-delete {
    background: transparent;
    color: #ef6464;
    border: 1px solid #2a2f38;
    padding: 0.3rem 0.7rem;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .btn-delete:hover {
    background: #ef6464;
    color: #fff;
    border-color: #ef6464;
  }

  .status {
    font-size: 0.875rem;
    color: #8a92a3;
    padding: 1rem 0;
  }
  .error { color: #ef6464; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>York Region Trophy CRM</h1>
    <p class="subtitle">v0.1 &middot; internal build</p>
  </header>

  <div class="card">
    <h2>Add new client</h2>
    <form id="client-form">
      <input name="company_name" placeholder="Company name *" required>
      <input name="contact_name" placeholder="Contact name">
      <input name="email" type="email" placeholder="Email">
      <input name="phone" placeholder="Phone">
      <button type="submit" class="form-submit">Add client</button>
    </form>
  </div>

  <div class="card">
    <h2>All clients</h2>
    <div id="status" class="status">Loading&hellip;</div>
    <table id="clients-table" style="display:none;">
      <thead>
        <tr>
          <th>Company</th>
          <th>Contact</th>
          <th>Email</th>
          <th>Phone</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="clients-tbody"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'https://hhnoldgvtjsmjxlowgaq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ZpLMMKMw_SaImF-dWAS1vg_yyMUOW_f';

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const statusEl = document.getElementById('status');
const tableEl = document.getElementById('clients-table');
const tbodyEl = document.getElementById('clients-tbody');
const formEl = document.getElementById('client-form');

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function cell(value) {
  return value ? escapeHtml(value) : '<span class="muted">&mdash;</span>';
}

async function loadClients() {
  statusEl.textContent = 'Loading\u2026';
  statusEl.classList.remove('error');
  statusEl.style.display = 'block';
  tableEl.style.display = 'none';

  const { data, error } = await supabase
    .from('clients')
    .select('*')
    .order('company_name');

  if (error) {
    statusEl.textContent = 'Error loading clients: ' + error.message;
    statusEl.classList.add('error');
    return;
  }

  if (!data || data.length === 0) {
    statusEl.textContent = 'No clients yet. Add one above.';
    return;
  }

  tbodyEl.innerHTML = data.map(c => `
    <tr>
      <td>${escapeHtml(c.company_name)}</td>
      <td>${cell(c.contact_name)}</td>
      <td>${cell(c.email)}</td>
      <td>${cell(c.phone)}</td>
      <td><button class="btn-delete" data-id="${c.id}">Delete</button></td>
    </tr>
  `).join('');

  statusEl.style.display = 'none';
  tableEl.style.display = 'table';
}

formEl.addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(formEl);
  const client = Object.fromEntries(formData);

  // Strip empty strings to null so they store as NULL not ""
  Object.keys(client).forEach(k => { if (!client[k]) client[k] = null; });

  const { error } = await supabase.from('clients').insert(client);
  if (error) {
    alert('Error adding client: ' + error.message);
    return;
  }

  formEl.reset();
  loadClients();
});

document.addEventListener('click', async (e) => {
  if (!e.target.classList.contains('btn-delete')) return;
  const id = e.target.dataset.id;
  if (!confirm('Delete this client?')) return;

  const { error } = await supabase.from('clients').delete().eq('id', id);
  if (error) {
    alert('Error deleting client: ' + error.message);
    return;
  }
  loadClients();
});

loadClients();
</script>
</body>
</html>
