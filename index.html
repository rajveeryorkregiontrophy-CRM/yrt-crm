<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>York Region Trophy — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;--sidebar:#0a0c0f;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#c4cad6;--text-3:#9098a8;
    --accent:#e7ebf3;--accent-2:#f4f6fb;
    --art:#ff6b35;--art-ink:#1a0f08;--due:#ffb627;--due-ink:#231803;--approved:#3ddc84;--approved-ink:#04130a;
    --process:#3da5ff;--process-ink:#03101f;--invoice:#b06bff;--invoice-ink:#15071f;--nodata:#5a6273;--danger:#ff4d4d;
    --radius:11px;--radius-sm:8px;
    --fd:'Archivo',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;}
  body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg);}
  /* collapsed: thin icon rail */
  /* hover-reveal: when collapsed, hovering slides the full sidebar out as an overlay */
  /* hide labels/badges/sub-text when collapsed & not hovered */
  .brand{padding:22px 20px 18px;border-bottom:1px solid var(--line);}
  .brand .mark{font-family:var(--fd);font-weight:900;font-size:17px;color:#fff;line-height:1.12;text-transform:uppercase;}
  .brand .mark .amp{color:var(--accent-2);}
  .nav{padding:14px 12px;flex:1;overflow-y:auto;}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:var(--radius-sm);color:var(--text-2);text-decoration:none;font-weight:500;font-size:13.5px;margin-bottom:2px;transition:.13s;}
  .nav a:hover{background:var(--bg-3);color:#fff;}
  .nav a.active{background:linear-gradient(90deg,#f4f6fb,#cfd6e3);color:#15171c;font-weight:700;}
  .nav a .ico{width:17px;height:17px;flex-shrink:0;}
  .nav a .badge{margin-left:auto;background:var(--bg-4);color:var(--text);font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;font-family:var(--fm);}
  .nav a.active .badge{background:rgba(0,0,0,.22);color:#15171c;}
  .nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:#aab0c0;padding:20px 10px 8px;font-weight:700;}
  .nav-sep{height:1px;background:var(--line);margin:14px 14px;opacity:.7;}
  .nav-label:first-child{padding-top:8px;}
  .sidebar-foot{padding:13px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .logout-btn{margin-left:auto;background:var(--bg-3);border:1px solid var(--line-2);color:var(--text-3);width:32px;height:32px;border-radius:8px;cursor:pointer;display:grid;place-items:center;transition:.13s;}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}
  .logout-btn svg{width:16px;height:16px;}
  .avatar{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#f4f6fb,#cfd6e3);color:#15171c;display:grid;place-items:center;font-weight:900;font-size:10px;}
  .main{display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden;}
  /* ── Topbar: refined, date as a subtle pill ── */
  .topbar{height:64px;background:var(--bg-2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 28px;flex-shrink:0;z-index:20;}
  .topbar h1{font-family:var(--fd);font-size:19px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;}
  .topbar .date{font-size:11.5px;color:var(--text-2);font-weight:600;letter-spacing:.02em;background:var(--bg-3);border:1px solid var(--line-2);padding:5px 11px;border-radius:20px;margin-left:2px;}
  .search{margin-left:auto;position:relative;width:290px;}
  .search input{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:9px;padding:9px 12px 9px 36px;font-size:13px;font-family:inherit;color:var(--text);transition:.15s;}
  .search input:focus{outline:none;border-color:var(--accent);background:var(--bg-2);}.search input::placeholder{color:var(--text-3);}
  .search svg{position:absolute;left:12px;top:10px;width:15px;height:15px;color:var(--text-3);}
  .btn-primary{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;padding:10px 17px;border-radius:9px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .btn-primary:hover{filter:brightness(1.04);}
  .content{padding:20px 28px;width:100%;flex:1;min-height:0;display:flex;flex-direction:column;}

  /* ── Stat tabs: corporate KPI cards with bottom accent ── */
  .stage-tabs{display:flex;gap:14px;margin-bottom:18px;flex-shrink:0;}
  .stage-tab{flex:1;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);padding:16px 20px 14px;cursor:pointer;transition:.16s;position:relative;text-align:left;display:flex;flex-direction:column;gap:10px;overflow:hidden;}
  .stage-tab::after{content:'';position:absolute;left:0;right:0;bottom:0;height:3px;background:transparent;transition:.18s;}
  .stage-tab:hover{border-color:var(--line-2);background:var(--bg-3);}
  .stage-tab.on{background:var(--bg-3);border-color:var(--line-2);}
  .stage-tab.t-inquiry.on::after{background:var(--due);}
  .stage-tab.t-quote.on::after{background:var(--process);}
  .stage-tab.t-order.on::after{background:var(--approved);}
  .stage-tab .st-top{display:flex;align-items:center;gap:9px;}
  .stage-tab .st-dot{width:8px;height:8px;border-radius:2px;background:var(--line-2);flex-shrink:0;transition:.16s;}
  .stage-tab.t-inquiry .st-dot{background:var(--due);}
  .stage-tab.t-quote .st-dot{background:var(--process);}
  .stage-tab.t-order .st-dot{background:var(--approved);}
  .stage-tab:not(.on) .st-dot{opacity:.4;}
  .stage-tab .st-name{font-family:var(--fd);font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);}
  .stage-tab.on .st-name{color:var(--text);}
  .stage-tab .st-meta{display:flex;align-items:baseline;gap:8px;}
  .stage-tab .st-count{font-family:var(--fd);font-size:28px;font-weight:900;color:var(--text-2);line-height:1;letter-spacing:-.01em;}
  .stage-tab.on .st-count{color:#fff;}
  .stage-tab .st-sub{font-size:11px;color:var(--text-3);font-weight:500;}

  /* ── Panel ── */
  .panel{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column;}
  .panel-head{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:15px 24px;border-bottom:1px solid var(--line-2);background:linear-gradient(180deg,var(--bg-3),var(--bg-2));}
  .panel-head h2{font-family:var(--fd);font-size:13.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;}
  .panel-head .count{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--text-2);background:var(--bg-4);padding:3px 10px;border-radius:20px;}
  .panel-head .filters{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;}
  .chip{font-size:11.5px;padding:6px 13px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--text-3);cursor:pointer;font-weight:600;font-family:inherit;letter-spacing:.01em;transition:.13s;}
  .chip:hover{background:var(--bg-3);color:var(--text);}
  .chip.active{background:var(--accent-2);color:#15171c;font-weight:700;}
  #wrap{flex:1;min-height:0;overflow-y:auto;}
  #wrap::-webkit-scrollbar{width:10px;}#wrap::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg-2);}
  #wrap thead th{position:sticky;top:0;z-index:5;}

  /* ── Table: restructured rows with left status rail ── */
  /* ── Table rebuilt: uniform spacing system ── */
  table{width:100%;border-collapse:collapse;}
  /* shared horizontal padding rhythm: 20px between cells, 28px at the rail edge, 24px at the far edge */
  thead th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#7e8696;font-weight:700;padding:14px 20px;border-bottom:1px solid var(--line-2);background:var(--bg-2);white-space:nowrap;}
  thead th:first-child{padding-left:28px;}
  thead th:last-child{padding-right:24px;}
  tbody td{padding:16px 20px;border-bottom:1px solid rgba(50,58,72,.55);vertical-align:middle;}
  tbody td:first-child{padding-left:28px;position:relative;}
  tbody td:last-child{padding-right:24px;}
  /* pickup column (orders tab) aligns right */
  thead th.th-pickup,tbody td.td-pickup{text-align:right;}
  /* gap between Fulfillment and Pickup Date */
  thead th.th-gap,tbody td.td-gap{padding-right:40px;}
  /* left status rail */
  tbody td:first-child::before{content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:0 3px 3px 0;background:var(--line-2);}
  tbody tr.r-inquiry td:first-child::before{background:var(--due);}
  tbody tr.r-quote td:first-child::before{background:var(--process);}
  tbody tr.r-order td:first-child::before{background:var(--approved);}
  tbody td.client-cell,tbody td .subject-tag{overflow:hidden;text-overflow:ellipsis;}
  tbody tr{cursor:pointer;transition:background .12s ease;}
  tbody tr:hover{background:var(--bg-3);}
  tbody tr:last-child td{border-bottom:none;}
  .stage-id{font-family:var(--fm);font-size:12px;font-weight:600;color:#aeb6c6;letter-spacing:.01em;}
  .client-cell .name{font-weight:700;color:#f3f5f9;font-size:13.5px;line-height:1.4;}
  .client-cell .sub{font-size:11.5px;color:#8b94a6;margin-top:2px;font-weight:500;}
  .subject-tag{font-size:13px;color:#c4cad6;line-height:1.5;display:block;}
  .tl-col{width:185px;}
  .money-cell{font-family:var(--fm);font-weight:700;font-size:13.5px;color:#fff;}
  .q-date{font-family:var(--fb);font-size:13px;color:#e8ebf1;font-weight:700;white-space:nowrap;}
  /* Pickup Date — plain coloured text (no box); four priority levels */
  .pk-pill{display:inline-block;font-family:var(--fb);font-size:13px;font-weight:700;white-space:nowrap;}
  .pk-far{color:#c4cad6;}
  .pk-soon{color:#e2c46a;}
  .pk-urgent{color:#e8995a;}
  .pk-overdue{color:#ff6b6b;font-weight:800;}
  .pk-none{color:#5a6273;}

  /* ── Stage picker modal ── */
  #stage-picker{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;}
  #stage-picker .sp-back{position:absolute;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(3px);animation:sp-fade .14s ease;}
  #stage-picker .sp-card{position:relative;background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;width:440px;max-width:calc(100vw - 32px);box-shadow:0 24px 60px rgba(0,0,0,.55);animation:sp-pop .18s cubic-bezier(.2,.9,.3,1.2);}
  #stage-picker .sp-head{padding:22px 24px 18px;border-bottom:1px solid var(--line);position:relative;}
  #stage-picker .sp-title{font-family:var(--fd);font-size:17px;font-weight:800;letter-spacing:.02em;color:#fff;}
  #stage-picker .sp-sub{font-size:12.5px;color:var(--text-3);margin-top:4px;}
  #stage-picker .sp-x{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--text-3);font-size:24px;cursor:pointer;width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;line-height:1;}
  #stage-picker .sp-x:hover{background:var(--bg-3);color:#fff;}
  #stage-picker .sp-opts{padding:14px;display:flex;flex-direction:column;gap:8px;}
  #stage-picker .sp-opt{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:10px;cursor:pointer;color:var(--text);text-align:left;transition:.14s;font-family:inherit;width:100%;}
  #stage-picker .sp-opt:hover{background:#22252d;border-color:var(--text-3);transform:translateY(-1px);}
  #stage-picker .sp-opt:disabled{opacity:.5;cursor:wait;}
  #stage-picker .sp-opt.sp-busy{border-color:var(--accent);}
  #stage-picker .sp-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  #stage-picker .sp-text{flex:1;display:flex;flex-direction:column;gap:3px;}
  #stage-picker .sp-name{font-family:var(--fd);font-size:14px;font-weight:800;letter-spacing:.02em;color:#fff;text-transform:uppercase;}
  #stage-picker .sp-explain{font-size:12px;color:var(--text-3);font-weight:500;}
  #stage-picker .sp-arrow{width:16px;height:16px;color:var(--text-3);flex-shrink:0;}
  #stage-picker .sp-opt:hover .sp-arrow{color:var(--accent-2);}
  #stage-picker .sp-foot{padding:12px 24px 18px;font-size:11px;color:var(--text-3);text-align:center;border-top:1px solid var(--line);}
  @keyframes sp-fade{from{opacity:0}to{opacity:1}}
  @keyframes sp-pop{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

  /* Reuse picker — list of abandoned records */
  #stage-picker .sp-reuse{width:500px;}
  #stage-picker .sp-list{padding:10px 14px;display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto;}
  #stage-picker .sp-list::-webkit-scrollbar{width:8px;}
  #stage-picker .sp-list::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:5px;}
  #stage-picker .sp-row{display:grid;grid-template-columns:74px 1fr auto 16px;align-items:center;gap:14px;padding:11px 14px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:8px;cursor:pointer;color:var(--text);text-align:left;transition:.13s;font-family:inherit;}
  #stage-picker .sp-row:hover{background:#22252d;border-color:var(--text-3);}
  #stage-picker .sp-rid{font-family:var(--fm);font-size:12.5px;font-weight:700;color:var(--accent);}
  #stage-picker .sp-rstage{display:inline-flex;align-items:center;gap:8px;font-family:var(--fd);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#fff;}
  #stage-picker .sp-rstage .sp-dot{width:8px;height:8px;border-radius:2px;}
  #stage-picker .sp-rdate{font-size:11.5px;color:var(--text-3);font-weight:600;}
  #stage-picker .sp-row .sp-arrow{width:14px;height:14px;color:var(--text-3);}
  #stage-picker .sp-row:hover .sp-arrow{color:var(--accent-2);}
  #stage-picker .sp-actions{padding:10px 14px 16px;border-top:1px solid var(--line);display:flex;justify-content:center;}
  #stage-picker .sp-ghost{background:transparent;border:1px solid var(--line-2);color:var(--text-2);padding:9px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.13s;font-family:inherit;}
  #stage-picker .sp-ghost:hover{background:var(--bg-3);color:#fff;border-color:var(--text-3);}

  /* ── Inquiry / Quotation: professional card list ── */
  .card-list{display:flex;flex-direction:column;padding:12px 18px 18px;gap:10px;}
  .record-card{display:flex;align-items:stretch;background:var(--bg-3);border:1px solid var(--line-2);border-radius:10px;overflow:hidden;cursor:pointer;transition:.14s ease;position:relative;}
  .record-card:hover{border-color:var(--text-3);background:#22252d;transform:translateY(-1px);}
  .rc-rail{width:4px;flex-shrink:0;background:var(--line-2);}
  .record-card.acc-inquiry .rc-rail{background:var(--due);}
  .record-card.acc-quote .rc-rail{background:var(--process);}
  .rc-body{flex:1;padding:16px 20px;min-width:0;}
  .rc-meta{display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--text-3);font-weight:600;letter-spacing:.02em;margin-bottom:8px;}
  .rc-id{font-family:var(--fm);color:#aeb6c6;}
  .rc-date{color:#cdd3df;}
  .rc-contact{color:var(--text-3);}
  .rc-dot{color:#4a5160;}
  .rc-client{font-size:15px;font-weight:700;color:#f3f5f9;margin-bottom:6px;line-height:1.3;}
  .rc-subject{font-size:13px;color:#c4cad6;line-height:1.5;}
  .rc-action{display:flex;align-items:center;justify-content:center;padding:0 20px;color:var(--text-3);transition:.14s;}
  .record-card:hover .rc-action{color:var(--accent-2);}
  .rc-action svg{width:18px;height:18px;}
  /* Sales Order cards: green rail + ops (Pickup / Status / Fulfillment) on the right */
  .record-card.acc-order .rc-rail{background:var(--approved);}
  /* right-aligned field stack that mirrors the left body's top-down hierarchy */
  .rc-ops{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:13px;padding:16px 24px 16px 26px;flex-shrink:0;width:184px;position:relative;}
  .rc-ops::before{content:'';position:absolute;left:0;top:16px;bottom:16px;width:1px;background:var(--line-2);}
  .rc-op{display:flex;flex-direction:column;align-items:flex-end;gap:5px;line-height:1;}
  /* headings: bold, bright, corporate — not dull grey */
  .rc-op-lbl{font-family:var(--fd);font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#d3d8e2;line-height:1;}
  .rc-op-val{display:inline-flex;align-items:center;}
  /* pickup date is the visual anchor: larger value on the top row */
  .rc-op-pickup .pk-pill{font-size:15px;font-weight:800;letter-spacing:.005em;}
  /* status + fulfillment pills: matched sizing, tinted (not solid) */
  .rc-op .badge-st{min-width:0;padding:4px 12px;font-size:10px;letter-spacing:.05em;border-radius:6px;box-shadow:none;font-weight:800;}
  .rc-op .fs-pill{font-size:10px;padding:4px 11px;border-radius:6px;letter-spacing:.05em;font-weight:800;border:1px solid transparent;}
  .rc-op .fs-none{color:#5a6273;font-size:12px;font-weight:600;}
  @media(max-width:880px){
    /* narrow: card stacks, ops become a horizontal row of label-over-value fields under the body */
    .record-card.acc-order{flex-direction:column;}
    .rc-ops{flex-direction:row;flex-wrap:wrap;align-items:flex-start;justify-content:flex-start;gap:22px;width:100%;padding:13px 16px;border-top:1px solid var(--line-2);}
    .rc-ops::before{display:none;}
    .rc-op{align-items:flex-start;}
    .rc-action{display:none;}
  }

  .badge-st{display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;letter-spacing:.02em;padding:7px 13px;border-radius:8px;white-space:nowrap;text-transform:uppercase;font-family:var(--fd);min-width:108px;text-align:center;}
  .col-status .badge-st{min-width:0;width:100%;padding:6px 8px;font-size:10.5px;}
  .fs-pill{display:inline-block;font-size:10.5px;font-weight:800;padding:5px 10px;border-radius:7px;text-transform:uppercase;letter-spacing:.02em;cursor:pointer;white-space:nowrap;}
  .fs-pill:hover{filter:brightness(1.15);}
  .fs-none{color:#5a6273;}
  .fs-popup-ov{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:300;padding:20px;}
  .fs-popup-ov.open{display:flex;}
  .fs-popup{background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;width:100%;max-width:460px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
  .fsp-head{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line);}
  .fsp-head h3{font-family:var(--fd);font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:.03em;}
  .fsp-x{margin-left:auto;background:var(--bg-4);border:none;color:var(--text-2);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:17px;}
  .fsp-list{padding:12px 20px 18px;overflow-y:auto;}
  .fsp-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
  .fsp-row:last-child{border-bottom:none;}
  .fsp-desc{flex:1;font-size:13px;color:var(--text);}
  .fsp-detail{display:block;font-size:11px;color:#e0883a;font-weight:600;margin-top:2px;}
  .fsp-empty{padding:20px;text-align:center;color:var(--text-3);}
  /* status pills: muted, tinted corporate chips (colored text + soft tint + hairline) */
  .st-send_art{background:rgba(198,131,88,.13);color:#d29a72;border:1px solid rgba(198,131,88,.34);}
  .st-approval_due{background:rgba(199,163,93,.13);color:#d3b26a;border:1px solid rgba(199,163,93,.34);}
  .st-approved{background:rgba(104,166,128,.13);color:#7cbb95;border:1px solid rgba(104,166,128,.34);}
  .st-in_process{background:rgba(106,152,196,.13);color:#82a6cf;border:1px solid rgba(106,152,196,.34);}
  .st-invoice{background:rgba(150,127,192,.13);color:#a58ecd;border:1px solid rgba(150,127,192,.34);}

<script type="module">
import { supabase as db, requireAuth, signOut, currentUser, subscribeFulfillment } from './auth.js';
await requireAuth();

// ---- shared styled modal (replaces native alert/confirm) ----
function __ensureModal(){
  if(document.getElementById('__sm_ov'))return;
  const css=document.createElement('style');
  css.textContent='#__sm_ov{position:fixed;inset:0;background:rgba(8,10,14,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:9000;padding:20px;}#__sm_ov.open{display:flex;}#__sm{background:#16181d;border:1px solid #414a5c;border-radius:14px;width:100%;max-width:410px;overflow:hidden;font-family:Inter,system-ui,sans-serif;}#__sm .h{display:flex;gap:13px;align-items:flex-start;padding:22px 24px 0;}#__sm .ic{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;}#__sm .ic.warn{background:rgba(255,182,39,.15);color:#ffb627;}#__sm .ic.info{background:rgba(61,165,255,.15);color:#3da5ff;}#__sm .ic.danger{background:rgba(255,77,77,.15);color:#ff4d4d;}#__sm .ic svg{width:22px;height:22px;}#__sm .t{font-family:Archivo,sans-serif;font-weight:800;font-size:16px;color:#eef0f4;margin-bottom:5px;}#__sm .m{font-size:13.5px;color:#c4cad6;line-height:1.5;}#__sm .f{display:flex;gap:10px;padding:20px 24px 22px;justify-content:flex-end;}#__sm .b{padding:10px 17px;border-radius:8px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid #414a5c;background:#1f2229;color:#eef0f4;}#__sm .b:hover{border-color:#9098a8;}#__sm .b.primary{background:#f4f6fb;color:#15171c;border-color:#f4f6fb;}#__sm .b.danger{background:#ff4d4d;color:#fff;border-color:#ff4d4d;}#__sm .b.plain{background:transparent;border-color:transparent;color:#9098a8;}';
  document.head.appendChild(css);
  const ov=document.createElement('div');ov.id='__sm_ov';
  ov.innerHTML='<div id="__sm"><div class="h"><div class="ic warn" id="__sm_ic"></div><div><div class="t" id="__sm_t"></div><div class="m" id="__sm_m"></div></div></div><div class="f" id="__sm_f"></div></div>';
  document.body.appendChild(ov);
}
const __SM_IC={warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',danger:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'};
function smAlert(msg,title,type){return new Promise(res=>{__ensureModal();type=type||'info';document.getElementById('__sm_ic').className='ic '+type;document.getElementById('__sm_ic').innerHTML=__SM_IC[type]||__SM_IC.info;document.getElementById('__sm_t').textContent=title||'Notice';document.getElementById('__sm_m').textContent=msg||'';const f=document.getElementById('__sm_f');f.innerHTML='<button class="b primary" id="__sm_ok">Got it</button>';const ov=document.getElementById('__sm_ov');const close=()=>{ov.classList.remove('open');res(true);};f.querySelector('#__sm_ok').onclick=close;ov.onclick=e=>{if(e.target===ov)close();};ov.classList.add('open');});}
function smConfirm(msg,title,opts){opts=opts||{};return new Promise(res=>{__ensureModal();const type=opts.type||'warn';document.getElementById('__sm_ic').className='ic '+type;document.getElementById('__sm_ic').innerHTML=__SM_IC[type]||__SM_IC.warn;document.getElementById('__sm_t').textContent=title||'Confirm';document.getElementById('__sm_m').textContent=msg||'';const f=document.getElementById('__sm_f');f.innerHTML='<button class="b plain" id="__sm_no">'+(opts.cancelText||'Cancel')+'</button><button class="b '+(opts.danger?'danger':'primary')+'" id="__sm_yes">'+(opts.confirmText||'Confirm')+'</button>';const ov=document.getElementById('__sm_ov');const close=v=>{ov.classList.remove('open');res(v);};f.querySelector('#__sm_yes').onclick=()=>close(true);f.querySelector('#__sm_no').onclick=()=>close(false);ov.onclick=e=>{if(e.target===ov)close(false);};ov.classList.add('open');});}

const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const today=new Date();today.setHours(0,0,0,0);
document.getElementById('today').textContent=DOW[today.getDay()]+', '+today.getDate()+' '+MON[today.getMonth()]+' '+today.getFullYear();
const fmtDate=d=>{if(!d)return '—';const x=new Date(d+'T00:00:00');return DOW[x.getDay()]+', '+x.getDate()+' '+MON[x.getMonth()];};
const fmtShort=d=>{if(!d)return '—';const x=new Date(d+'T00:00:00');return x.getDate()+' '+MON[x.getMonth()]+' '+x.getFullYear();};
const daysUntil=d=>{if(!d)return null;const x=new Date(d+'T00:00:00');return Math.round((x-today)/86400000);};
const money=n=>'$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};
const ST_LABEL={send_art:'Send Art',approval_due:'Approval Due',approved:'Approved',in_process:'In Process',invoice:'Invoice',no_data:'No Data'};
const TAB_TITLE={inquiry:'Inquiries',quote:'Quotations',order:'Sales Orders'};
const TAB_NEW={inquiry:'New Inquiry',quote:'New Quote',order:'New Order'};

let DATA={inquiry:[],quote:[],order:[]};let TAB='order',FILTER='all';

function datesCell(pickup,event){
  const n=daysUntil(pickup);let dd=n===null?'d4':n<0?'d0':n<=1?'d1':n===2?'d2':n===3?'d3':'d4';
  const chip=n===null?'':`<span class="dot-days ${dd}">${n<0?'!':n}</span>`;
  return `<div class="dates"><div class="date-line"><span class="tag">Pick</span><span class="d">${fmtDate(pickup)}</span>${chip}</div>${event?`<div class="date-line event"><span class="tag">Event</span><span class="d">${fmtDate(event)}</span></div>`:''}</div>`;
}

// Pickup Date cell with priority background:
//  overdue (date already passed) -> strong red (.pk-overdue)
//  due in 2 days or fewer (incl. today) -> orange/urgent (.pk-urgent)
//  due in exactly 3 days -> yellow (.pk-soon)
//  more than 3 days away -> soft neutral (.pk-far)
function pickupCell(pickup){
  if(!pickup) return '<span class="pk-none">—</span>';
  const n=daysUntil(pickup);
  let cls='pk-far';
  if(n<0) cls='pk-overdue';
  else if(n<=2) cls='pk-urgent';
  else if(n===3) cls='pk-soon';
  return `<span class="pk-pill ${cls}">${fmtDate(pickup)}</span>`;
}

async function load(){
  const {data,error}=await db.from('quotes').select('*, clients(company_name), contacts(first_name,last_name)').in('record_type',['inquiry','quote','order']).order('quote_date',{ascending:false});
  if(error){document.getElementById('wrap').innerHTML=`<div class="state">Couldn't load — ${error.message}</div>`;return;}
  DATA={inquiry:[],quote:[],order:[]};
  (data||[]).forEach(r=>{(DATA[r.record_type]||DATA.order).push(r);});
  document.getElementById('c-inquiry').textContent=DATA.inquiry.length;
  document.getElementById('c-quote').textContent=DATA.quote.length;
  document.getElementById('c-order').textContent=DATA.order.length;
  // load fulfillment statuses for all sales-order line items (for the dashboard rollup)
  await loadFulfillment();
  render();
}

// Map each sales order -> array of its line-item fulfillment statuses
let FULFILL_BY_ORDER={};
async function loadFulfillment(){
  FULFILL_BY_ORDER={};
  const orderIds=DATA.order.map(o=>o.id);
  if(!orderIds.length)return;
  const {data:items}=await db.from('quote_items').select('id,quote_id,fulfillment_status,supplier_id,quantity,in_po,description,style_number').in('quote_id',orderIds);
  const itemIds=(items||[]).map(it=>it.id);
  // pull allocations AND direct po_items so "ordered" reflects every PO line for the item
  let allocByItem={}, directByItem={}, statusByItem={};
  if(itemIds.length){
    const {data:allocs}=await db.from('quote_item_allocations').select('quote_item_id,quantity,status').in('quote_item_id',itemIds);
    (allocs||[]).forEach(a=>{ (allocByItem[a.quote_item_id]=allocByItem[a.quote_item_id]||[]).push(a); });
    // direct po_items (sourced from the quote_item, not an allocation)
    const {data:pis}=await db.from('po_items').select('source_quote_item_id,quantity,status,source_allocation_id').in('source_quote_item_id',itemIds);
    (pis||[]).forEach(p=>{ if(!p.source_allocation_id){ (directByItem[p.source_quote_item_id]=directByItem[p.source_quote_item_id]||[]).push(p); } });
  }
  (items||[]).forEach(it=>{
    const al=allocByItem[it.id]||[];
    const dir=directByItem[it.id]||[];
    const ordered=al.reduce((s,a)=>s+(Number(a.quantity)||0),0)+dir.reduce((s,p)=>s+(Number(p.quantity)||0),0);
    const need=Number(it.quantity)||0;
    it._ordered=ordered; it._need=need;
    it._partial = need>0 && ordered>0 && ordered<need;     // some, but not all, on a PO
    // collect committed statuses from both allocations and direct PO lines
    const sts=[...al.map(a=>a.status), ...dir.map(p=>p.status)].filter(s=>s&&s!=='pending'&&s!=='in_po');
    it._poStatuses=sts;
    (FULFILL_BY_ORDER[it.quote_id]=FULFILL_BY_ORDER[it.quote_id]||[]).push(it);
  });
}

// Derive a single status for one line item, based on Order Qty.
function itemState(it){
  if(!it.supplier_id) return 'none';
  const sts=it._poStatuses||[];
  // committed states take priority
  if(sts.includes('backordered')) return 'backordered';
  if(sts.length && sts.every(s=>s==='received')) return 'received';
  if(sts.includes('issued')||sts.includes('verified')) return 'issued';
  const ordered=it._ordered||0;
  const need=it._need||0;
  if(ordered<=0) return 'placed';                    // supplier set, nothing ordered yet
  if(ordered<need) return 'partial';                 // partially ordered
  return 'in_po';                                    // fully ordered onto PO(s)
}

const FS_META={
  none:{label:'No Supplier',color:'#a3abb9',bg:'rgba(144,152,168,.12)',bd:'rgba(144,152,168,.3)'},
  placed:{label:'Not Ordered',color:'#c99a6a',bg:'rgba(198,140,82,.13)',bd:'rgba(198,140,82,.32)'},
  partial:{label:'Partly Ordered',color:'#cfae63',bg:'rgba(199,167,88,.14)',bd:'rgba(199,167,88,.32)'},
  in_po:{label:'Ordered',color:'#c67e7e',bg:'rgba(190,112,112,.13)',bd:'rgba(190,112,112,.34)'},
  issued:{label:'Issued',color:'#9aa2b1',bg:'rgba(138,146,162,.14)',bd:'rgba(138,146,162,.3)'},
  received:{label:'Received',color:'#7cbb95',bg:'rgba(104,166,128,.13)',bd:'rgba(104,166,128,.34)'},
  backordered:{label:'Back Ordered',color:'#a58ecd',bg:'rgba(150,127,192,.13)',bd:'rgba(150,127,192,.34)'},
  mixed:{label:'Mixed Status',color:'#82a6cf',bg:'rgba(106,152,196,.13)',bd:'rgba(106,152,196,.34)'}
};
function rollup(orderId){
  const items=FULFILL_BY_ORDER[orderId]||[];
  if(!items.length)return null;
  const withSup=items.filter(it=>it.supplier_id);
  if(!withSup.length)return 'none';
  const states=withSup.map(itemState);
  const uniq=[...new Set(states)];
  if(uniq.length===1)return uniq[0];
  return 'mixed';
}

// quick-view popup: per-line statuses without opening the full order
function openFulfillPopup(orderId){
  const order=DATA.order.find(o=>o.id===orderId);
  const items=FULFILL_BY_ORDER[orderId]||[];
  const ov=document.getElementById('fs-popup');
  document.getElementById('fsp-title').textContent='Order #'+(order?order.stage_id:'')+' — line status';
  const rows=items.map(it=>{
    const s=itemState(it);
    const m=FS_META[s]||FS_META.none;
    const detail=it._partial?`<span class="fsp-detail">${it._ordered} of ${it._need} ordered</span>`:'';
    return `<div class="fsp-row"><div class="fsp-desc">${esc(it.description||it.style_number||'Item')}${detail}</div><span class="fs-pill" style="color:${m.color};background:${m.bg};border:1px solid ${m.bd||'transparent'};">${m.label}</span></div>`;
  }).join('');
  document.getElementById('fsp-body').innerHTML=rows||'<div class="fsp-empty">No line items.</div>';
  ov.classList.add('open');
}
function closeFulfillPopup(){document.getElementById('fs-popup').classList.remove('open');}

function render(){
  document.getElementById('list-title').textContent=TAB_TITLE[TAB];
  document.getElementById('new-label').textContent='New Record';
  // filters only for sales orders (stage pipeline)
  const filtersEl=document.getElementById('filters');
  if(TAB==='order'){
    filtersEl.innerHTML=['all','send_art','approval_due','approved','in_process','invoice'].map(f=>`<button class="chip ${FILTER===f?'active':''}" data-f="${f}">${f==='all'?'All':ST_LABEL[f]}</button>`).join('');
    filtersEl.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{FILTER=c.dataset.f;render();}));
  }else{filtersEl.innerHTML='';}
  const legendEl=document.getElementById('legend');if(legendEl)legendEl.style.display='none';   // legend stays removed

  const q=(document.getElementById('search').value||'').toLowerCase();
  let rows=(DATA[TAB]||[]).filter(o=>{
    if(TAB==='order'&&FILTER!=='all'&&o.art_status!==FILTER)return false;
    if(q){const hay=((o.clients?.company_name||'')+' '+(o.subject||'')+' '+o.stage_id+' '+(o.serviced_by||'')).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  // Sales Orders sort by pickup date ascending (nearest upcoming pickup first; blanks last)
  if(TAB==='order'){
    rows.sort((a,b)=>{
      const pa=a.pickup_date, pb=b.pickup_date;
      if(pa&&pb) return pa<pb?-1:pa>pb?1:0;
      if(pa&&!pb) return -1;
      if(!pa&&pb) return 1;
      return 0;
    });
  }
  const _lc=document.getElementById('list-count');if(_lc)_lc.textContent=rows.length+(rows.length===1?' record':' records');
  if(!rows.length){document.getElementById('wrap').innerHTML=`<div class="state">Nothing in ${TAB_TITLE[TAB]} right now.</div>`;return;}

  let html;
  if(TAB==='order'){
    // Status field only shown on the "All" filter — when filtered, the filter itself implies the stage.
    const showStatus = FILTER==='all';
    html=`<div class="card-list">${rows.map(o=>{
      const ct=o.contacts?((o.contacts.first_name||'')+' '+(o.contacts.last_name||'')).trim():'';
      const fs=rollup(o.id);
      const fsCell=fs?`<span class="fs-pill" data-fs="${o.id}" style="color:${FS_META[fs].color};background:${FS_META[fs].bg};border-color:${FS_META[fs].bd};">${FS_META[fs].label}</span>`:'<span class="fs-none">—</span>';
      const statusCell = showStatus ? `<span class="badge-st st-${o.art_status}">${ST_LABEL[o.art_status]||o.art_status}</span>` : '';
      return `<div class="record-card acc-order rc-order" data-id="${o.id}">
        <div class="rc-rail"></div>
        <div class="rc-body">
          <div class="rc-meta"><span class="rc-id">#${o.stage_id}</span><span class="rc-dot">·</span><span class="rc-date">${fmtShort(o.quote_date)}</span>${ct?`<span class="rc-dot">·</span><span class="rc-contact">${esc(ct)}</span>`:''}</div>
          <div class="rc-client">${esc(o.clients?.company_name||'—')}</div>
          <div class="rc-subject">${esc(o.subject||'—')}</div>
        </div>
        <div class="rc-ops">
          <div class="rc-op rc-op-pickup"><div class="rc-op-lbl">Pickup</div><div class="rc-op-val">${pickupCell(o.pickup_date)}</div></div>
          ${showStatus?`<div class="rc-op"><div class="rc-op-lbl">Status</div><div class="rc-op-val">${statusCell}</div></div>`:''}
          <div class="rc-op"><div class="rc-op-lbl">Fulfillment</div><div class="rc-op-val">${fsCell}</div></div>
        </div>
        <div class="rc-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>`;
    }).join('')}</div>`;
  }else{
    // Inquiries / Quotations: card list (lighter, professional, less empty than a sparse table)
    html=`<div class="card-list">${rows.map(o=>{
      const ct=o.contacts?((o.contacts.first_name||'')+' '+(o.contacts.last_name||'')).trim():'';
      const accentCls=`acc-${TAB}`;
      return `<div class="record-card ${accentCls}" data-id="${o.id}">
        <div class="rc-rail"></div>
        <div class="rc-body">
          <div class="rc-meta"><span class="rc-id">#${o.stage_id}</span><span class="rc-dot">·</span><span class="rc-date">${fmtShort(o.quote_date)}</span>${ct?`<span class="rc-dot">·</span><span class="rc-contact">${esc(ct)}</span>`:''}</div>
          <div class="rc-client">${esc(o.clients?.company_name||'—')}</div>
          <div class="rc-subject">${esc(o.subject||'—')}</div>
        </div>
        <div class="rc-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>`;
    }).join('')}</div>`;
  }
  document.getElementById('wrap').innerHTML=html;
  document.querySelectorAll('tbody tr[data-id], .record-card[data-id]').forEach(el=>el.addEventListener('click',()=>location.href='order.html?id='+encodeURIComponent(el.dataset.id)));
  // fulfillment pill -> open status popup instead of navigating
  document.querySelectorAll('.fs-pill').forEach(p=>p.addEventListener('click',e=>{e.stopPropagation();openFulfillPopup(p.dataset.fs);}));
  const fx=document.getElementById('fsp-x');if(fx)fx.onclick=closeFulfillPopup;
  const fov=document.getElementById('fs-popup');if(fov)fov.onclick=e=>{if(e.target===fov)closeFulfillPopup();};
}

document.querySelectorAll('.stage-tab').forEach(t=>t.addEventListener('click',()=>{
  TAB=t.dataset.tab;FILTER='all';
  document.querySelectorAll('.stage-tab').forEach(x=>x.classList.toggle('on',x.dataset.tab===TAB));
  document.getElementById('search').value='';render();
}));
document.getElementById('search').addEventListener('input',render);

document.getElementById('new-record').addEventListener('click', async ()=>{
  const btn=document.getElementById('new-record');
  btn.disabled=true; btn.style.opacity=.6;
  try{
    // Check for abandoned records: any quotes row with no client_id
    const {data:abandoned,error}=await db.from('quotes')
      .select('id,stage_id,record_type,quote_date,subject,created_at')
      .is('client_id',null)
      .order('stage_id',{ascending:true});
    if(error){ console.error(error); openStagePicker(); return; }
    if(abandoned && abandoned.length){
      openReusePicker(abandoned);
    }else{
      openStagePicker();
    }
  } finally {
    btn.disabled=false; btn.style.opacity=1;
  }
});

const STAGE_META={inquiry:{name:'Inquiry',c:'var(--due)'},quote:{name:'Quotation',c:'var(--process)'},order:{name:'Sales Order',c:'var(--approved)'}};

function openReusePicker(records){
  const existing=document.getElementById('stage-picker'); if(existing)existing.remove();
  const m=document.createElement('div');
  m.id='stage-picker';
  m.innerHTML=`
    <div class="sp-back"></div>
    <div class="sp-card sp-reuse">
      <div class="sp-head">
        <div class="sp-title">Reuse an Unused Record</div>
        <div class="sp-sub">${records.length} record${records.length===1?'':'s'} ${records.length===1?'was':'were'} created earlier but never assigned to a client. Use one of them instead of creating a new ID.</div>
        <button class="sp-x" aria-label="Close">&times;</button>
      </div>
      <div class="sp-list">
        ${records.map(r=>{
          const meta=STAGE_META[r.record_type]||{name:r.record_type,c:'var(--text-3)'};
          const created=r.created_at?new Date(r.created_at).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}):'';
          return `<button class="sp-row" data-id="${r.id}">
            <span class="sp-rid">#${r.stage_id}</span>
            <span class="sp-rstage"><span class="sp-dot" style="background:${meta.c};"></span>${meta.name}</span>
            <span class="sp-rdate">${created}</span>
            <svg class="sp-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>`;
        }).join('')}
      </div>
      <div class="sp-actions">
        <button class="sp-ghost" id="sp-create-new">Create a new record instead</button>
      </div>
    </div>`;
  document.body.appendChild(m);
  const close=()=>m.remove();
  m.querySelector('.sp-back').addEventListener('click',close);
  m.querySelector('.sp-x').addEventListener('click',close);
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',esc);}});
  m.querySelectorAll('.sp-row').forEach(btn=>btn.addEventListener('click',()=>{
    location.href='order.html?id='+encodeURIComponent(btn.dataset.id);
  }));
  m.querySelector('#sp-create-new').addEventListener('click',()=>{
    close();
    openStagePicker();
  });
}

function openStagePicker(){
  // Build the modal markup (single-use; rebuilt each click)
  const existing=document.getElementById('stage-picker'); if(existing)existing.remove();
  const STAGES=[
    {key:'inquiry', name:'Inquiry',     sub:'Initial lead, no quote yet',  c:'var(--due)',      art:'no_data'},
    {key:'quote',   name:'Quotation',   sub:'Pricing prepared for client', c:'var(--process)',  art:'approval_due'},
    {key:'order',   name:'Sales Order', sub:'Confirmed, in the shop',      c:'var(--approved)', art:'send_art'}
  ];
  const m=document.createElement('div');
  m.id='stage-picker';
  m.innerHTML=`
    <div class="sp-back"></div>
    <div class="sp-card">
      <div class="sp-head">
        <div class="sp-title">Create a New Record</div>
        <div class="sp-sub">Which stage should this record start in?</div>
        <button class="sp-x" aria-label="Close">&times;</button>
      </div>
      <div class="sp-opts">
        ${STAGES.map(s=>`
          <button class="sp-opt" data-stage="${s.key}" data-art="${s.art}">
            <span class="sp-dot" style="background:${s.c};"></span>
            <span class="sp-text"><span class="sp-name">${s.name}</span><span class="sp-explain">${s.sub}</span></span>
            <svg class="sp-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        `).join('')}
      </div>
      <div class="sp-foot">A serial number is assigned when the record is created.</div>
    </div>`;
  document.body.appendChild(m);
  const close=()=>m.remove();
  m.querySelector('.sp-back').addEventListener('click',close);
  m.querySelector('.sp-x').addEventListener('click',close);
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',esc);}});
  m.querySelectorAll('.sp-opt').forEach(btn=>btn.addEventListener('click',async()=>{
    m.querySelectorAll('.sp-opt').forEach(b=>b.disabled=true);
    btn.classList.add('sp-busy');
    const stage=btn.dataset.stage, art=btn.dataset.art;
    const payload={record_type:stage,art_status:art,sent_status:'not_sent',active_status:'active',
      quote_date:new Date().toISOString().slice(0,10),
      subject:'',serviced_by:'',client_id:null};
    const {data,error}=await db.from('quotes').insert(payload).select().single();
    if(error){close();await smAlert('Could not create: '+error.message,'Error','danger');return;}
    location.href='order.html?id='+encodeURIComponent(data.id);
  }));
}
const _lo=document.getElementById('logout-btn');if(_lo)_lo.addEventListener('click',()=>signOut());
load();
// live sync: refresh the fulfillment column whenever anything changes anywhere
// Realtime: reload fulfillment state when PO/allocation changes; reload the full list when a quote row itself changes.
subscribeFulfillment(async()=>{ await loadFulfillment(); render(); });
subscribeFulfillment(async()=>{ await load(); }, { tables:['quotes'] });
// Fallback: if the user comes back from another tab (e.g. the order detail), refresh once.
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') load(); });
</script>
