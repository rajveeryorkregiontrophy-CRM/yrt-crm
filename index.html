<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>York Region Trophy — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;--bg-2:#16181d;--bg-3:#1f2229;--bg-4:#2a2e37;--sidebar:#0a0c0f;
    --line:#323a48;--line-2:#414a5c;--text:#eef0f4;--text-2:#c4cad6;--text-3:#9098a8;
    --accent:#e7ebf3;--accent-2:#f4f6fb;
    --art:#ff6b35;--art-ink:#1a0f08;--due:#ffb627;--due-ink:#231803;--approved:#3ddc84;--approved-ink:#04130a;
    --process:#3da5ff;--process-ink:#03101f;--invoice:#b06bff;--invoice-ink:#15071f;--nodata:#5a6273;--danger:#ff4d4d;
    --radius:11px;--radius-sm:8px;
    --fd:'Archivo',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;}
  body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:2px solid var(--bg);}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
  .sidebar{background:var(--sidebar);color:var(--text-2);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--line);}
  .brand{padding:22px 20px 18px;border-bottom:1px solid var(--line);}
  .brand .mark{font-family:var(--fd);font-weight:900;font-size:17px;color:#fff;line-height:1.12;text-transform:uppercase;}
  .brand .mark .amp{color:var(--accent-2);}
  .brand .sub{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#aab0c0;margin-top:6px;font-weight:600;}
  .nav{padding:14px 12px;flex:1;overflow-y:auto;}
  .nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:#aab0c0;padding:14px 10px 6px;font-weight:700;}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:var(--radius-sm);color:var(--text-2);text-decoration:none;font-weight:500;font-size:13.5px;margin-bottom:2px;transition:.13s;}
  .nav a:hover{background:var(--bg-3);color:#fff;}
  .nav a.active{background:linear-gradient(90deg,#f4f6fb,#cfd6e3);color:#15171c;font-weight:700;}
  .nav a .ico{width:17px;height:17px;flex-shrink:0;}
  .nav a .badge{margin-left:auto;background:var(--bg-4);color:var(--text);font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;font-family:var(--fm);}
  .nav a.active .badge{background:rgba(0,0,0,.22);color:#15171c;}
  .sidebar-foot{padding:13px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .avatar{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#f4f6fb,#cfd6e3);color:#15171c;display:grid;place-items:center;font-weight:900;font-size:10px;}
  .main{display:flex;flex-direction:column;min-width:0;}
  .topbar{height:62px;background:var(--bg-2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 26px;position:sticky;top:0;z-index:20;}
  .topbar h1{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;}
  .topbar .date{font-size:12.5px;color:var(--text-3);font-family:var(--fm);}
  .search{margin-left:auto;position:relative;width:280px;}
  .search input{width:100%;border:1px solid var(--line-2);background:var(--bg);border-radius:var(--radius-sm);padding:9px 12px 9px 34px;font-size:13px;font-family:inherit;color:var(--text);}
  .search input:focus{outline:none;border-color:var(--accent);}.search input::placeholder{color:var(--text-3);}
  .search svg{position:absolute;left:11px;top:10px;width:15px;height:15px;color:var(--text-3);}
  .btn-primary{background:linear-gradient(135deg,#f4f6fb,#d4dae6);color:#15171c;border:none;padding:10px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .btn-primary:hover{filter:brightness(1.04);}
  .content{padding:22px 26px 70px;max-width:1560px;width:100%;}

  /* big stage tabs */
  .stage-tabs{display:flex;gap:10px;margin-bottom:20px;}
  .stage-tab{flex:1;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:.14s;position:relative;overflow:hidden;text-align:left;}
  .stage-tab::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--line-2);transition:.14s;}
  .stage-tab:hover{border-color:var(--text-3);}
  .stage-tab.on{border-color:var(--accent);background:var(--bg-3);}
  .stage-tab.on.t-inquiry::before{background:var(--due);}
  .stage-tab.on.t-quote::before{background:var(--process);}
  .stage-tab.on.t-order::before{background:var(--approved);}
  .stage-tab .st-name{font-family:var(--fd);font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--text);}
  .stage-tab .st-meta{display:flex;align-items:baseline;gap:8px;margin-top:7px;}
  .stage-tab .st-count{font-family:var(--fd);font-size:26px;font-weight:900;color:#fff;line-height:1;}
  .stage-tab.on .st-count{color:var(--accent-2);}
  .stage-tab .st-sub{font-size:11.5px;color:var(--text-3);}

  .panel{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--radius);overflow:hidden;}
  .panel-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:2px solid var(--line-2);}
  .panel-head h2{font-family:var(--fd);font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
  .panel-head .count{font-family:var(--fm);font-size:12px;color:var(--text-2);background:var(--bg-4);padding:2px 9px;border-radius:20px;}
  .panel-head .filters{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;}
  .chip{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid var(--line-2);background:var(--bg-3);color:var(--text-2);cursor:pointer;font-weight:600;font-family:inherit;}
  .chip:hover{border-color:var(--accent);color:var(--text);}
  .chip.active{background:var(--accent-2);color:#15171c;border-color:var(--accent-2);}

  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:#aab0c0;font-weight:700;padding:11px 14px;border-bottom:2px solid var(--line-2);background:var(--bg-3);}
  thead th.num{text-align:right;}
  tbody td{padding:14px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr{cursor:pointer;transition:background .1s;}tbody tr:hover{background:var(--bg-3);}
  tbody tr:last-child td{border-bottom:none;}
  .stage-id{font-family:var(--fm);font-size:12px;font-weight:700;color:#b9c1d2;}
  .client-cell .name{font-weight:700;color:#fff;}
  .client-cell .sub{font-size:12.5px;color:#aab0c0;margin-top:2px;font-weight:500;}
  .subject-tag{font-size:12.5px;color:var(--text-2);}
  .money-cell{font-family:var(--fm);font-weight:700;font-size:13.5px;color:#fff;}
  .q-date{font-family:var(--fm);font-size:12.5px;color:var(--text-2);}

  .badge-st{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.02em;padding:7px 13px;border-radius:8px;white-space:nowrap;text-transform:uppercase;font-family:var(--fd);}
  .badge-st::before{content:'';width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,.45);}
  .st-send_art{background:var(--art);color:var(--art-ink);}
  .st-approval_due{background:var(--due);color:var(--due-ink);}
  .st-approved{background:var(--approved);color:var(--approved-ink);}
  .st-in_process{background:var(--process);color:var(--process-ink);}
  .st-invoice{background:var(--invoice);color:var(--invoice-ink);}
  .st-no_data{background:var(--nodata);color:#fff;}

  .dates{display:flex;flex-direction:column;gap:6px;min-width:200px;}
  .date-line{display:flex;align-items:center;gap:9px;font-size:12.5px;white-space:nowrap;}
  .date-line .tag{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;width:40px;color:#9aa2b2;font-family:var(--fd);flex-shrink:0;}
  .date-line .d{font-family:var(--fm);font-weight:600;color:var(--text);}
  .date-line.event .d{color:var(--accent-2);}
  .dot-days{display:inline-grid;place-items:center;min-width:24px;height:22px;padding:0 7px;border-radius:6px;font-size:11px;font-weight:800;font-family:var(--fm);flex-shrink:0;}
  .dot-days.d0{background:var(--danger);color:#fff;}.dot-days.d1{background:var(--art);color:#1a0f08;}
  .dot-days.d2{background:var(--due);color:#231803;}.dot-days.d3{background:#4a5160;color:#fff;}.dot-days.d4{background:var(--bg-4);color:var(--text-3);}

  .state{padding:50px;text-align:center;color:var(--text-3);font-size:13.5px;}
  .skeleton{padding:14px;}.sk-row{height:46px;background:linear-gradient(90deg,var(--bg-2) 25%,var(--bg-3) 50%,var(--bg-2) 75%);background-size:200% 100%;animation:sh 1.2s infinite;border-radius:7px;margin-bottom:8px;}
  @keyframes sh{to{background-position:-200% 0;}}
  .legend{display:flex;gap:16px;flex-wrap:wrap;padding:12px 18px;border-top:1px solid var(--line);background:var(--bg-3);}
  .legend span{font-size:11.5px;color:var(--text-3);display:inline-flex;align-items:center;gap:6px;}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;}
  @media(max-width:880px){.app{grid-template-columns:1fr;}.sidebar{display:none;}.stage-tabs{flex-direction:column;}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="mark">York Region<br>Trophy <span class="amp">&amp;</span> Promotion</div><div class="sub">Operations</div></div>
    <nav class="nav">
      <div class="nav-label">Workspace</div>
      <a href="index.html" class="active"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Sales Inbox</a>
      <a href="clients.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Clients</a>
      <a href="products.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Products</a>
      <a href="invoices.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>Invoices</a>
      <div class="nav-label">Production</div>
      <a href="production.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Production Lineup</a>
      <a href="reports.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>Reports</a>
    </nav>
    <div class="sidebar-foot"><div class="avatar">YRT</div><div><div style="color:var(--text);font-weight:700;">YRT CRM</div><div style="font-size:11px;color:var(--text-3);">Operations Suite</div></div></div>
  </aside>
  <div class="main">
    <header class="topbar">
      <h1>Sales Inbox</h1><span class="date" id="today"></span>
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" id="search" placeholder="Search this tab…"></div>
      <button class="btn-primary" id="new-record"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg><span id="new-label">New Order</span></button>
    </header>
    <div class="content">
      <div class="stage-tabs" id="stage-tabs">
        <button class="stage-tab t-inquiry" data-tab="inquiry"><div class="st-name">Inquiries</div><div class="st-meta"><span class="st-count" id="c-inquiry">–</span><span class="st-sub">open leads</span></div></button>
        <button class="stage-tab t-quote" data-tab="quote"><div class="st-name">Quotations</div><div class="st-meta"><span class="st-count" id="c-quote">–</span><span class="st-sub">quoted, awaiting</span></div></button>
        <button class="stage-tab t-order on" data-tab="order"><div class="st-name">Sales Orders</div><div class="st-meta"><span class="st-count" id="c-order">–</span><span class="st-sub">in the shop</span></div></button>
      </div>
      <section class="panel">
        <div class="panel-head"><h2 id="list-title">Sales Orders</h2><span class="count" id="list-count">—</span>
          <div class="filters" id="filters"></div>
        </div>
        <div id="wrap"><div class="skeleton"><div class="sk-row"></div><div class="sk-row"></div><div class="sk-row"></div></div></div>
        <div class="legend" id="legend" style="display:none;">
          <span><i style="background:var(--danger)"></i>Overdue</span><span><i style="background:var(--art)"></i>1 day</span>
          <span><i style="background:var(--due)"></i>2 days</span><span><i style="background:#4a5160"></i>3 days</span>
          <span><i style="background:var(--bg-4)"></i>4+ days</span><span style="margin-left:auto;color:var(--accent-2)"><i style="background:var(--accent-2)"></i>Event date</span>
        </div>
      </section>
    </div>
  </div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const db = createClient('https://hhnoldgvtjsmjxlowgaq.supabase.co','sb_publishable_ZpLMMKMw_SaImF-dWAS1vg_yyMUOW_f');
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const today=new Date();today.setHours(0,0,0,0);
document.getElementById('today').textContent=DOW[today.getDay()]+', '+today.getDate()+' '+MON[today.getMonth()]+' '+today.getFullYear();
const fmtDate=d=>{if(!d)return '—';const x=new Date(d+'T00:00:00');return DOW[x.getDay()]+', '+x.getDate()+' '+MON[x.getMonth()];};
const fmtShort=d=>{if(!d)return '—';const x=new Date(d+'T00:00:00');return x.getDate()+' '+MON[x.getMonth()]+' '+x.getFullYear();};
const daysUntil=d=>{if(!d)return null;const x=new Date(d+'T00:00:00');return Math.round((x-today)/86400000);};
const money=n=>'$'+Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};
const ST_LABEL={send_art:'Send Art',approval_due:'Approval Due',approved:'Approved',in_process:'In Process',invoice:'Invoice',no_data:'No Data'};
const TAB_TITLE={inquiry:'Inquiries',quote:'Quotations',order:'Sales Orders'};
const TAB_NEW={inquiry:'New Inquiry',quote:'New Quote',order:'New Order'};

let DATA={inquiry:[],quote:[],order:[]};let TAB='order',FILTER='all';

function datesCell(pickup,event){
  const n=daysUntil(pickup);let dd=n===null?'d4':n<0?'d0':n<=1?'d1':n===2?'d2':n===3?'d3':'d4';
  const chip=n===null?'':`<span class="dot-days ${dd}">${n<0?'!':n}</span>`;
  return `<div class="dates"><div class="date-line"><span class="tag">Pick</span><span class="d">${fmtDate(pickup)}</span>${chip}</div>${event?`<div class="date-line event"><span class="tag">Event</span><span class="d">${fmtDate(event)}</span></div>`:''}</div>`;
}

async function load(){
  const {data,error}=await db.from('quotes').select('*, clients(company_name), contacts(first_name,last_name)').in('record_type',['inquiry','quote','order']).order('quote_date',{ascending:false});
  if(error){document.getElementById('wrap').innerHTML=`<div class="state">Couldn't load — ${error.message}</div>`;return;}
  DATA={inquiry:[],quote:[],order:[]};
  (data||[]).forEach(r=>{(DATA[r.record_type]||DATA.order).push(r);});
  document.getElementById('c-inquiry').textContent=DATA.inquiry.length;
  document.getElementById('c-quote').textContent=DATA.quote.length;
  document.getElementById('c-order').textContent=DATA.order.length;
  render();
}

function render(){
  document.getElementById('list-title').textContent=TAB_TITLE[TAB];
  document.getElementById('new-label').textContent=TAB_NEW[TAB];
  // filters only for sales orders (stage pipeline)
  const filtersEl=document.getElementById('filters');
  if(TAB==='order'){
    filtersEl.innerHTML=['all','send_art','approval_due','approved','in_process','invoice'].map(f=>`<button class="chip ${FILTER===f?'active':''}" data-f="${f}">${f==='all'?'All':ST_LABEL[f]}</button>`).join('');
    filtersEl.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{FILTER=c.dataset.f;render();}));
  }else{filtersEl.innerHTML='';}
  document.getElementById('legend').style.display=TAB==='order'?'flex':'none';

  const q=(document.getElementById('search').value||'').toLowerCase();
  let rows=(DATA[TAB]||[]).filter(o=>{
    if(TAB==='order'&&FILTER!=='all'&&o.art_status!==FILTER)return false;
    if(q){const hay=((o.clients?.company_name||'')+' '+(o.subject||'')+' '+o.stage_id+' '+(o.serviced_by||'')).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  document.getElementById('list-count').textContent=rows.length+(rows.length===1?' record':' records');
  if(!rows.length){document.getElementById('wrap').innerHTML=`<div class="state">Nothing in ${TAB_TITLE[TAB]} right now.</div>`;return;}

  let html;
  if(TAB==='order'){
    html=`<table><thead><tr><th style="width:58px;">ID</th><th style="width:28%;">Client</th><th>Subject</th><th style="width:140px;">Stage</th><th style="width:230px;">Dates</th><th class="num" style="width:110px;">Total</th></tr></thead><tbody>${rows.map(o=>{
      const ct=o.contacts?((o.contacts.first_name||'')+' '+(o.contacts.last_name||'')).trim():'';
      return `<tr data-id="${o.id}"><td><span class="stage-id">#${o.stage_id}</span></td><td class="client-cell"><div class="name">${esc(o.clients?.company_name||'—')}</div><div class="sub">${esc(ct||o.serviced_by||'')}</div></td><td><span class="subject-tag">${esc(o.subject||'—')}</span></td><td><span class="badge-st st-${o.art_status}">${ST_LABEL[o.art_status]||o.art_status}</span></td><td>${datesCell(o.pickup_date,o.event_date)}</td><td class="num money-cell">${money(o.grand_total)}</td></tr>`;}).join('')}</tbody></table>`;
  }else{
    // simpler rows for inquiries / quotes
    html=`<table><thead><tr><th style="width:58px;">ID</th><th style="width:34%;">Client</th><th>Subject</th><th style="width:150px;">Date</th><th class="num" style="width:120px;">Total</th></tr></thead><tbody>${rows.map(o=>{
      const ct=o.contacts?((o.contacts.first_name||'')+' '+(o.contacts.last_name||'')).trim():'';
      return `<tr data-id="${o.id}"><td><span class="stage-id">#${o.stage_id}</span></td><td class="client-cell"><div class="name">${esc(o.clients?.company_name||'—')}</div><div class="sub">${esc(ct||o.serviced_by||'')}</div></td><td><span class="subject-tag">${esc(o.subject||'—')}</span></td><td><span class="q-date">${fmtShort(o.quote_date)}</span></td><td class="num money-cell">${money(o.grand_total)}</td></tr>`;}).join('')}</tbody></table>`;
  }
  document.getElementById('wrap').innerHTML=html;
  document.querySelectorAll('tbody tr[data-id]').forEach(tr=>tr.addEventListener('click',()=>location.href='order.html?id='+encodeURIComponent(tr.dataset.id)));
}

document.querySelectorAll('.stage-tab').forEach(t=>t.addEventListener('click',()=>{
  TAB=t.dataset.tab;FILTER='all';
  document.querySelectorAll('.stage-tab').forEach(x=>x.classList.toggle('on',x.dataset.tab===TAB));
  document.getElementById('search').value='';render();
}));
document.getElementById('search').addEventListener('input',render);

document.getElementById('new-record').addEventListener('click',async()=>{
  const btn=document.getElementById('new-record');btn.disabled=true;btn.style.opacity=.6;
  const defaults={inquiry:{art_status:'no_data'},quote:{art_status:'approval_due'},order:{art_status:'send_art'}};
  const {data:cl}=await db.from('clients').select('id').order('company_name').limit(1);
  const payload={record_type:TAB,sent_status:'not_sent',active_status:'active',quote_date:new Date().toISOString().slice(0,10),
    subject:'New '+TAB,serviced_by:'',client_id:cl&&cl[0]?cl[0].id:null,...defaults[TAB]};
  const {data,error}=await db.from('quotes').insert(payload).select().single();
  btn.disabled=false;btn.style.opacity=1;
